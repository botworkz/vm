type: botforge/build
name: botwork-base
image: "@debian-base"
output: botwork-base.qcow2
disk_size: 10G

cloud_init:
  # Keep apt/dpkg scratch mounts in bootcmd (not cloud_init.mounts): on
  # type: build, mounts are committed to fstab in the output image.
  bootcmd:
  - - cloud-init-per
    - once
    - apt-cache-tmpfs
    - sh
    - -c
    - >-
      install -d -m 0755 /var/cache/apt && mountpoint -q /var/cache/apt ||
      mount -t tmpfs -o size=512M,nodev,nosuid tmpfs /var/cache/apt
  - - cloud-init-per
    - once
    - apt-lists-tmpfs
    - sh
    - -c
    - >-
      install -d -m 0755 /var/lib/apt/lists && mountpoint -q /var/lib/apt/lists
      || mount -t tmpfs -o size=256M,nodev,nosuid tmpfs /var/lib/apt/lists
  - - cloud-init-per
    - once
    - debconf-cache-tmpfs
    - sh
    - -c
    - >-
      install -d -m 0755 /var/cache/debconf && mountpoint -q /var/cache/debconf
      || mount -t tmpfs -o size=64M,nodev,nosuid tmpfs /var/cache/debconf
  - - cloud-init-per
    - once
    - dpkg-no-locales
    - sh
    - -c
    - >-
      printf
      'path-exclude=/usr/share/locale/*\npath-include=/usr/share/locale/en*\npath-include=/usr/share/locale/C*\npath-include=/usr/share/locale/locale.alias\n'
      > /etc/dpkg/dpkg.cfg.d/99-no-locales
  - - cloud-init-per
    - once
    - apt-services-mask
    - sh
    - -c
    - >-
      systemctl stop unattended-upgrades.service apt-daily.service
      apt-daily-upgrade.service 2>/dev/null || true; systemctl disable
      unattended-upgrades.service apt-daily.timer apt-daily-upgrade.timer
      2>/dev/null || true; systemctl mask unattended-upgrades.service
      apt-daily.service apt-daily-upgrade.service 2>/dev/null || true
  - - cloud-init-per
    - once
    - apt-no-recommends
    - sh
    - -c
    - >-
      printf 'APT::Install-Recommends "false";\nAPT::Install-Suggests "false";\n'
      > /etc/apt/apt.conf.d/00no-recommends
  - - cloud-init-per
    - once
    - bot-group
    - sh
    - -c
    - >-
      getent group bot >/dev/null 2>&1 || groupadd --gid 2000 bot
  package_update: true
  package_upgrade: true
  packages:
  - btop
  - byobu
  - ca-certificates
  - curl
  - emacs-nox
  - git
  - gnupg
  - jq
  - openssh-server
  - python3
  - python3-yaml
  - qemu-guest-agent
  - sudo
  - unattended-upgrades
  write_files:
  - path: /etc/apt/apt.conf.d/52botwork-unattended-upgrades
    owner: root:root
    permissions: "0644"
    content: |
      // Run unattended-upgrades on the apt-daily-upgrade.timer.
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

      // Security-only origins. The Debian-shipped 50unattended-upgrades file
      // lists ${distro_id}:${distro_codename}-security as the default; this
      // file deliberately RE-DECLARES the Origins-Pattern as security-only
      // so we win against any future change to the shipped defaults (the
      // 52-prefix sorts after 50 so the last-write-wins semantics of
      // apt.conf.d picks our value).
      Unattended-Upgrade::Origins-Pattern {
        "origin=Debian,codename=${distro_codename},label=Debian-Security";
        "origin=Debian,codename=${distro_codename}-security,label=Debian-Security";
      };

      // Never reboot from inside the guest. The VM is part of botspace's
      // managed redeploy flow; an in-guest reboot would race the host-side
      // deploy lock and is the wrong thing in this topology.
      Unattended-Upgrade::Automatic-Reboot "false";
  - path: /etc/sudoers.d/90-botwork
    owner: root:root
    permissions: "0440"
    content: |
      debian ALL=(ALL) NOPASSWD:ALL
      bot    ALL=(ALL) NOPASSWD:ALL
  users:
  - name: bot
    uid: 2000
    primary_group: bot
    shell: /bin/bash
    lock_passwd: true
  runcmd:
  - [systemctl, unmask, unattended-upgrades.service, apt-daily.service, apt-daily-upgrade.service]
  - [systemctl, enable, unattended-upgrades.service, apt-daily.timer, apt-daily-upgrade.timer]
  - [systemctl, enable, ssh]

compress:
  enabled: true
  compressor_args:
    cluster_size: "1M"
  compressor_opts: -T0 -19
  reclaim: fstrim

steps:
- name: Bot workdir
  run: |
    install -d -m 0755 -o bot -g bot /home/bot/workdir

- name: Cleanup (vim)
  run: |
    apt-get purge -y vim vim-runtime || :
- uses: "@://shared/cleanup.steps.yaml"
  with:
    docker-prune: "false"
- uses: "@://shared/report.steps.yaml"
