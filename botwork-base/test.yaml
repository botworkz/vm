type: botforge/test
name: botwork-base
image: "@artifact://botwork-base/botwork-base.qcow2"

assert:
  users:
    bot:
      shell: /bin/bash
  packages:
    ca-certificates:
    curl:
    git:
    jq:
    openssh-server:
    python3:
    unattended-upgrades:
  files:
    /etc/apt/apt.conf.d/52botwork-unattended-upgrades:
    /etc/sudoers.d/90-botwork:
      mode: "0440"
  services:
    apt-daily.timer:
    apt-daily-upgrade.timer:
    unattended-upgrades:
