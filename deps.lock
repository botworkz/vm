# botworkz/vm dependency lock file.
# Single source of truth for dependency versions and immutable artifact pins.
# Image digest pins live in deps/container/*.Dockerfile (FROM <image>:<tag>@sha256:<digest>).
# After bumping any *_VERSION_LOCK value, run ./scripts/update-deps.sh to refresh the
# managed binary sha256 pins, and hand-update the digest in the matching deps/container/*.Dockerfile.

# botworkz/botwork (session-broker image + botwork-launcher/botwork-tools binaries)
