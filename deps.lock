BOTWORK_TOOLS_VERSION_LOCK=0.0.1
# TODO: confirm published version
BOTWORK_TOOLS_IMAGES_VERSION_LOCK=0.0.1
BOTWORK_TOOLS_SHA256_botwork_launcher=
BOTWORK_TOOLS_SHA256_botwork_tools=

# botworkz/tools (packer-tools image)
