type: test
steps:
- on: guest
  name: base-goss
  uploads:
  - src: build/goss-0.4.9
    dest: /tmp/goss
  - src: images/botwork-base/test/goss.yaml
    dest: /tmp/goss.yaml
  run: |
    sudo install -m 0755 /tmp/goss /usr/local/bin/goss \
      && sudo goss -g /tmp/goss.yaml validate
diagnostics_units:
- ssh
