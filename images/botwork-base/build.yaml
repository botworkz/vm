# Spec consumed by `botforge build`. Driven by scripts/pack.sh which walks
# images/manifest.yaml's parent DAG and invokes `botforge build` per link.
#
# Source qcow2 is the upstream Debian cloud image fetched into build/cache/
# by scripts/pack.sh; output is build/images/botwork-base.qcow2.
#
# Migrated from `botforge build-legacy` (offline virt-customize) to the booted
# `botforge build` model: the source image is booted under KVM, provisioned
# over SSH, and committed on clean shutdown.
#
# The `truncate:`/`delete:` machine-id steps from the legacy spec are dropped:
# 99-cleanup.sh already performs the same truncation + symlink recreation.
type: build
disk_size: 10G
memsize: 4096
smp: 4

steps:
- on: guest
  name: base
  uploads:
  - src: images/botwork-base/provisioners/00-base.sh
    dest: /tmp/00-base.sh
  run: sudo bash /tmp/00-base.sh
- on: guest
  name: bot-user
  uploads:
  - src: images/botwork-base/provisioners/10-bot-user.sh
    dest: /tmp/10-bot-user.sh
  run: sudo bash /tmp/10-bot-user.sh
- on: guest
  name: cleanup
  uploads:
  - src: images/botwork-base/provisioners/99-cleanup.sh
    dest: /tmp/99-cleanup.sh
  run: sudo bash /tmp/99-cleanup.sh
