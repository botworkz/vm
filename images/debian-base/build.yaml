# Spec consumed by `botforge build`. Driven by scripts/pack.sh which walks
# images/manifest.yaml's parent DAG and invokes `botforge build` per link.
#
# Source qcow2 is the upstream Debian cloud image fetched into build/cache/
# by scripts/pack.sh; output is build/images/debian-base.qcow2.
disk_size: 10G
memsize: 4096
smp: 4

steps:
- run: images/_shared/provisioners/00-base.sh
- run: images/_shared/provisioners/10-bot-user.sh
- run: images/_shared/provisioners/99-cleanup.sh
# machine-id hygiene: belt-and-braces vs the same lines inside 99-cleanup.sh,
# so the final image is identity-clean even if cleanup is reordered later.
- truncate: /etc/machine-id
- delete: /var/lib/dbus/machine-id
