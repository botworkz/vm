# Spec consumed by `botforge build` to provision the botwork-docker image.
#
# Boot source: the parent botwork-base qcow2 produced by scripts/pack.sh is
# passed via `--source`; `base-image` remains as the same debian-base fallback
# botforge expects for modern build specs when no explicit source is supplied.
# Output is build/images/debian-13-botwork-docker.qcow2.
#
# Provisioning uses botforge's ephemeral installer user (botforge-<uuid>,
# created via cloud-init with passwordless sudo, removed before power-off).
#
# Migrated from `botforge build-legacy` (offline virt-customize) to the booted
# `botforge build` model: the parent qcow2 is booted under KVM, provisioned
# over SSH, and committed on clean shutdown.
#
# The `truncate:`/`delete:` machine-id steps from the legacy spec are dropped:
# 99-cleanup.sh already performs the same truncation + symlink recreation.
type: build
image: >-
  @debian-base
disk_size: 12G
memsize: 4096
smp: 4

steps:
- on: guest
  name: docker
  uploads:
  - src: images/botwork-docker/provisioners/15-docker.sh
    dest: /tmp/15-docker.sh
  run: sudo bash /tmp/15-docker.sh
- on: guest
  name: cleanup
  uploads:
  - src: images/botwork-docker/provisioners/99-cleanup.sh
    dest: /tmp/99-cleanup.sh
  run: sudo bash /tmp/99-cleanup.sh
