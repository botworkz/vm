user:
  bot:
    exists: true
    shell: /bin/bash
    groups:
    - bot
    - docker
  debian:
    exists: true

package:
  docker-ce:
    installed: true

service:
  docker:
    enabled: true
  ssh:
    enabled: true
  unattended-upgrades:
    enabled: true

file:
  /etc/apt/apt.conf.d/52botwork-unattended-upgrades:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0644"
  /etc/sudoers.d/90-botwork:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0440"

command:
  systemd_apt_daily_timer_enabled:
    exec: /bin/systemctl is-enabled apt-daily.timer
    exit-status: 0
    stdout:
    - enabled
  systemd_apt_daily_upgrade_timer_enabled:
    exec: /bin/systemctl is-enabled apt-daily-upgrade.timer
    exit-status: 0
    stdout:
    - enabled
