# images/manifest.yaml — image set declaration.
#
# Each image lives under images/<name>/ with:
#   - build.sh             virt-customize driver for this image
#   - payload/             files baked into the resulting qcow2 (envoy/, systemd/, …)
#   - test/                per-image goss spec + botforge smoke-test plan
#
# parent: null means this image starts from the upstream Debian cloud image
# fetched into build/cache/ by scripts/pack.sh.
#
# A non-null parent means this image's source disk is the qcow2 produced by
# building <parent> first.
images:
  debian-base:
    parent: null
    output: debian-base.qcow2
  botwork:
    parent: debian-base
    output: debian-13-botwork.qcow2
