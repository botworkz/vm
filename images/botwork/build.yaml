type: build
image: >-
  @debian-base
disk_size: 16G
memsize: 4096
smp: 4

compression:
  enabled: true
  reclaim: fstrim

uploads:
- src: build/botwork-build-context.tar
  dest: /tmp/botwork-build-context.tar
- src: images/botwork/provisioners/20-botwork-stack.sh
  dest: /tmp/20-botwork-stack.sh
- src: images/botwork/provisioners/99-cleanup.sh
  dest: /tmp/99-cleanup.sh

steps:
- on: guest
  name: stage-context
  run: |
    sudo mkdir -p /tmp/botwork-build-context
    sudo tar -xf /tmp/botwork-build-context.tar -C /tmp/botwork-build-context
- on: guest
  name: botwork-stack
  run: sudo bash /tmp/20-botwork-stack.sh
- on: guest
  name: cleanup
  run: sudo bash /tmp/99-cleanup.sh
