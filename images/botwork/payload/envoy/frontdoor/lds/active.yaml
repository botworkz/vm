# frontdoor/lds/active.yaml — live LDS seam for frontdoor.
#
# Envoy subscribes to this path with filesystem xDS. The base image ships it
# identical to listener.yaml; overlays that need to change listener shape or
# inject HTTP filters atomically rename a replacement into this path.
resources:
- "@type": type.googleapis.com/envoy.config.listener.v3.Listener
  name: listener_frontdoor
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 80
  filter_chains:
  - filters:
    - name: envoy.filters.network.http_connection_manager
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
        stat_prefix: frontdoor
        access_log:
        - name: envoy.access_loggers.stdout
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
            log_format:
              text_format_source:
                # yamllint disable-line rule:line-length
                inline_string: "[%START_TIME%] \"%REQ(:METHOD)% %REQ(:PATH)% %PROTOCOL%\" %RESPONSE_CODE% flags=%RESPONSE_FLAGS% details=%RESPONSE_CODE_DETAILS% upstream=%UPSTREAM_HOST% authority=%REQ(:AUTHORITY)% duration=%DURATION%\n"
        http_filters:
        - name: envoy.filters.http.router
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
        rds:
          route_config_name: frontdoor_routes
          config_source:
            resource_api_version: V3
            path_config_source:
              path: /etc/envoy/rds/active.yaml
- "@type": type.googleapis.com/envoy.config.listener.v3.Listener
  name: listener_frontdoor_https
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 443
  filter_chains:
  - transport_socket:
      name: envoy.transport_sockets.tls
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
        common_tls_context:
          tls_certificate_sds_secret_configs:
          - name: frontdoor_tls_certificate
            sds_config:
              resource_api_version: V3
              path_config_source:
                path: /etc/envoy/sds/active.yaml
    filters:
    - name: envoy.filters.network.http_connection_manager
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
        stat_prefix: frontdoor_https
        access_log:
        - name: envoy.access_loggers.stdout
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
            log_format:
              text_format_source:
                # yamllint disable-line rule:line-length
                inline_string: "[%START_TIME%] \"%REQ(:METHOD)% %REQ(:PATH)% %PROTOCOL%\" %RESPONSE_CODE% flags=%RESPONSE_FLAGS% details=%RESPONSE_CODE_DETAILS% upstream=%UPSTREAM_HOST% authority=%REQ(:AUTHORITY)% duration=%DURATION%\n"
        http_filters:
        - name: envoy.filters.http.router
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
        route_config:
          name: frontdoor_https_routes
          virtual_hosts:
          - name: frontdoor_https
            domains: ["*"]
            routes:
            - match:
                prefix: "/"
              response_headers_to_add:
              - header:
                  key: content-type
                  value: "text/plain; charset=utf-8"
                keep_empty_value: false
              direct_response:
                status: 503
                body:
                  inline_string: "TLS not yet configured\n"
