resources:
- "@type": type.googleapis.com/envoy.config.route.v3.RouteConfiguration
  # This is the spigot file. The base default serves a holding page via
  # Envoy direct_response — no upstream required. Overlays (botworkz/space)
  # swap this file (atomic mv) to route to the ingress cluster when the
  # stack is ready to serve.
  name: frontdoor_routes
  virtual_hosts:
  - name: frontdoor
    domains: ["*"]
    routes:
    - match:
        prefix: "/"
      response_headers_to_add:
      - header:
          key: content-type
          value: "text/html; charset=utf-8"
        keep_empty_value: false
      direct_response:
        status: 200
        body:
          inline_string: |
            <!doctype html><meta charset=utf-8>
            <title>botwork frontdoor</title>
            <h1>frontdoor: hello world</h1>
            <p>Base holding content. Override by swapping rds/active.yaml.</p>
