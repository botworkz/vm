# frontdoor/envoy.yaml — immutable Envoy bootstrap for the frontdoor instance.
#
# Frontdoor is deliberately NOT wired to control-plane. Control-plane lives
# inside the botwork stack; frontdoor must be able to serve when the stack is
# down (masked, restarting, broken). So frontdoor stays FS-xDS forever.
#
# Runtime config loaded from filesystem xDS files; overlays can swap files
# by path without editing this bootstrap:
#   - LDS  /etc/botwork/envoy/frontdoor/lds/active.yaml
#   - CDS  /etc/botwork/envoy/frontdoor/cds/clusters.yaml
#   - RDS  referenced by name from the listener; file path resolved via the
#          route_config_source in the HCM (see lds/listener.yaml)
#
# Top-level bootstrap_extensions are consumed only at process start in Envoy
# v1.38, so the systemd unit renders an effective bootstrap from this
# immutable file plus /etc/botwork/envoy/frontdoor/bootstrap_extensions.yaml
# before the container starts. Overlays swap the fragment file, then restart
# botwork-envoy-frontdoor.service.

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9903

node:
  id: frontdoor
  cluster: botwork-frontdoor

# Optional overlay-provided bootstrap extension fragment is inserted here by
# /usr/local/sbin/botwork-render-frontdoor-envoy at service start.
# __BOTWORK_BOOTSTRAP_EXTENSIONS__

dynamic_resources:
  lds_config:
    resource_api_version: V3
    path_config_source:
      path: /etc/envoy/lds/active.yaml
  cds_config:
    resource_api_version: V3
    path_config_source:
      path: /etc/envoy/cds/clusters.yaml
