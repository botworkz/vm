resources:
- "@type": type.googleapis.com/envoy.config.listener.v3.Listener
  name: listener_http
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 8080
  filter_chains:
  - filters:
    - name: envoy.filters.network.http_connection_manager
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
        stat_prefix: ingress_mcp
        # Log every request Envoy handles to stdout.
        # %RESPONSE_FLAGS% and %RESPONSE_CODE_DETAILS% are the key debugging
        # fields: they name *why* envoy returned a given status (e.g.
        # `empty_host_header`, `dns_resolution_failure`,
        # `no_healthy_upstream`). %REQ(X-SESSION-UPSTREAM)% surfaces the
        # value the broker's ext_proc set as the routing target.
        access_log:
        - name: envoy.access_loggers.stdout
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
            log_format:
              text_format_source:
                inline_string: "[%START_TIME%] \"%REQ(:METHOD)% %REQ(:PATH)% %PROTOCOL%\" %RESPONSE_CODE% flags=%RESPONSE_FLAGS% details=%RESPONSE_CODE_DETAILS% upstream=%UPSTREAM_HOST% authority=%REQ(:AUTHORITY)% x-session-upstream=%REQ(X-SESSION-UPSTREAM)% duration=%DURATION%\n"
        http_filters:
        # AUTH SEAM (fixed contract): this slot is permanently reserved in base
        # before lua. Overlay swaps /etc/envoy/ecds/ext_authz.yaml only.
        - name: envoy.filters.http.ext_authz
          config_discovery:
            config_source:
              path_config_source:
                path: /etc/envoy/ecds/ext_authz.yaml
            type_urls:
            - type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz

        # ── 1. Edge strip + static tenant inject + bearer strip ────────────
        - name: envoy.filters.http.lua
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
            inline_code: |
              function envoy_on_request(request_handle)
                -- SECURITY: x-session-upstream is an SSRF primitive for
                -- dynamic_forward_proxy and x-botwork-tenant is tenant spoofing.
                -- Client-supplied copies are stripped before anything trusts them.
                -- Do not remove.
                request_handle:headers():remove("x-session-upstream")
                request_handle:headers():remove("x-botwork-tenant")
                request_handle:headers():remove("x-envoy-original-path")
                -- Untenanted demo URL shape: client sends /<tenant>/<plugin>, but
                -- session-broker post 0.0.15 requires /<tenant>/<namespace>/<plugin>.
                -- Inject the demo namespace "demo" at edge so the public URL stays
                -- 2-seg without leaking that invariant. Only rewrites paths with
                -- exactly 2 leading segments; 3+-seg paths (already injected or
                -- health probes that don't match) pass through unchanged.
                local path = request_handle:headers():get(":path")
                if path then
                  local seg1, seg2, rest = path:match("^/([^/?#]+)/([^/?#]+)(.*)$")
                  if seg1 and seg2 then
                    if rest == "" or rest:sub(1,1) == "?" or rest:sub(1,1) == "#" then
                      request_handle:headers():replace(":path", "/" .. seg1 .. "/demo/" .. seg2 .. rest)
                    end
                  end
                end
                -- SECURITY: this base stack has NO authentication; tenant
                -- identity is a fixed server-set constant (mcp), never client
                -- derived. Overlay replaces this with ext_authz-derived tenant.
                -- Order matters: strip MUST precede inject.
                request_handle:headers():replace("x-botwork-tenant", "mcp")
                -- Keep bearer stripped before any upstream routing.
                request_handle:headers():remove("authorization")
              end

        # ── 2. MCP filter ──────────────────────────────────────────────────
        - name: envoy.filters.http.mcp
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.mcp.v3.Mcp
            traffic_mode: REJECT_NO_MCP

        # ── 3. ext_proc (gRPC) ─────────────────────────────────────────────
        - name: envoy.filters.http.ext_proc
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
            grpc_service:
              envoy_grpc:
                cluster_name: session_broker_grpc
              timeout: 30s
            processing_mode:
              request_header_mode: SEND
              response_header_mode: SEND
              request_body_mode: BUFFERED
              response_body_mode: NONE
              request_trailer_mode: SKIP
              response_trailer_mode: SKIP
            message_timeout: 15s
            failure_mode_allow: false

        # ── 4. Dynamic forward proxy ──────────────────────────────────────
        - name: envoy.filters.http.dynamic_forward_proxy
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.dynamic_forward_proxy.v3.FilterConfig
            dns_cache_config:
              name: dynamic_forward_proxy_cache_config
              dns_lookup_family: V4_ONLY

        # ── 5. Router ──────────────────────────────────────────────────────
        - name: envoy.filters.http.router
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

        route_config:
          name: mcp_route
          virtual_hosts:
          - name: mcp_backend
            domains: ["*"]
            routes:
            # Route tenant/plugin paths to the upstream chosen by the broker.
            # NOTE: tenant path segment "/mcp/<plugin>" and broker upstream
            # rewrite prefix "/mcp..." share text but are unrelated concerns.
            # The dynamic_forward_proxy filter reads the upstream host from the
            # x-session-upstream header via its PerRouteConfig — the route-level
            # host_rewrite_header alone is not enough because the forward proxy
            # filter resolves DNS before generic route host rewriting runs.
            - match:
                prefix: /
              route:
                cluster: dynamic_forward_proxy_cluster
                timeout: 0s
                idle_timeout: 600s
              typed_per_filter_config:
                envoy.filters.http.dynamic_forward_proxy:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.dynamic_forward_proxy.v3.PerRouteConfig
                  host_rewrite_header: x-session-upstream
