# RFE #101 PR2: bootstrap.yaml carries the full tenants/workspaces/plugins
# tree. botwork-bootstrap reads this at every boot and idempotently upserts
# tenant / workspace / plugin / workspace_plugin rows; config-broker reads
# the result over postgres on every /resolve.
#
# The file in the base image is the seed for the VM-smoke topology only,
# pinned to the (tenant, workspace, plugin) triple the edge bootstrap
# injects in lds/listener.yaml:
#
#   1. client hits envoy on /<tenant>/<plugin>
#   2. lua at the edge strips bearer/auth headers and rewrites the path
#      to /<tenant>/demo/<plugin>, then forces x-botwork-tenant=mcp
#   3. session-broker reads /<tenant>/<workspace>/<plugin> off the path
#      and asks config-broker to resolve (tenant=mcp, workspace=demo,
#      plugin=<name>).
#
# The seed below MUST match what step 3 will ask for, or every smoke
# request 404s in config-broker. Downstream overlays (space) rewrite
# both this file AND the edge bootstrap to use their own identity
# scheme (e.g. ext_authz-derived tenant); the base smoke deliberately
# stays on the fixed "mcp/demo" identity that has no auth attached so
# what's exercised here is the plumbing, not the auth model.
tenants:
- name: mcp
  workspaces:
  - name: demo
    plugins:
    - name: echo
      # Sentinel per-binding `config:` block. The smoke test parses the
      # spawned echo container's environment and asserts a structural
      # deep-match against this fixture so regressions in:
      #
      #   bootstrap.yaml → bootstrap (write) → DB → config-broker (read)
      #     → session-broker → launcher → container env
      #
      # all surface as a single failed assertion.
      #
      # The shape is deliberately a mix of string/integer/array/nested-
      # object so that "only top-level scalars survived" or "JSON got
      # double-encoded" bugs produce a visible diff. Keep the marker
      # string stable; the smoke test greps for it as a fast prelude to
      # the structural compare.
      config:
        vm_smoke_marker: "vm-base-config-injection-ok"
        version: 1
        modes:
        - default
        - verbose
        nested:
          kind: structured
          flag: true

plugins:
- name: echo
  image: botwork/mcp-echo:local
  path: /mcp
  # botwork 0.1.9+ (config-broker default-deny) made `egress:` mandatory
  # on every plugin; PR2 (RFE #101) moved the validator into bootstrap
  # but kept the same rule. echo is a smoke-only plugin that doesn't
  # talk to external services, but the vm base smoke is intentionally
  # minimal — all this needs to do is keep the existing fixture working
  # through the plumbing test. The explicit `all` form preserves current
  # behaviour (no egress restriction) without committing to a policy
  # shape; space/ (and any downstream) makes its own policy decisions
  # per plugin.
  egress: all
