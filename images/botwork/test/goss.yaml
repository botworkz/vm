user:
  debian:
    exists: true
  bot:
    exists: true
    shell: /bin/bash
    groups:
    - bot
    - docker

package:
  git:
    installed: true
  curl:
    installed: true
  ca-certificates:
    installed: true
  python3:
    installed: true
  jq:
    installed: true
  openssh-server:
    installed: true
  unattended-upgrades:
    installed: true
  docker-ce:
    installed: true

service:
  ssh:
    enabled: true
  unattended-upgrades:
    enabled: true
  docker:
    enabled: true
  botwork-image-loader:
    enabled: true
  botwork-network:
    enabled: true
  # ── Persistence layer (RFE 97 / botwork #97) ────────────────────────
  # botwork-db-init renders the random POSTGRES_PASSWORD +
  # BOTWORK_DATABASE_URL into /var/lib/botwork-db/secret.env on first boot;
  # botwork-postgres runs the long-lived DB container; botwork-db-migrate
  # is a oneshot (RemainAfterExit=yes) that runs `Migrator::up` against
  # the empty migrations vec, which still creates the seaql_migrations
  # bookkeeping table — the on-disk evidence asserted further down.
  botwork-db-init:
    enabled: true
  botwork-postgres:
    enabled: true
  botwork-db-migrate:
    enabled: true
  # RFE #106 PR4 (botwork#118 + this PR): replaces botwork-bootstrap
  # with a host-side oneshot that calls `botwork-tools bootstrap`
  # against api. Same yaml shape, same idempotent-upsert
  # semantics; the write side now goes through HTTP+JSON instead
  # of sea-orm-directly.
  botwork-import:
    enabled: true
  botwork-api:
    enabled: true
  botwork-ui:
    enabled: true
  botwork-launcher:
    enabled: true
  botwork-config-broker:
    enabled: true
  botwork-control-plane:
    enabled: true
  botwork-session-broker:
    enabled: true
  botwork-envoy:
    enabled: true

file:
  /etc/botwork/bootstrap.yaml:
    exists: true
    filetype: file
  /etc/apt/apt.conf.d/52botwork-unattended-upgrades:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0644"
  /usr/local/bin/botwork-launcher:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0755"
  /usr/local/bin/botwork-tools:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0755"
  # First-boot image loader script still ships and remains enabled so child
  # layers can stage additional tarballs under /usr/share/botwork/images/.
  /usr/local/sbin/botwork-image-loader:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0755"
  /usr/share/botwork/images/session-broker.tar:
    exists: false
  /usr/share/botwork/images/config-broker.tar:
    exists: false
  /usr/share/botwork/images/control-plane.tar:
    exists: false
  /usr/share/botwork/images/db-migrate.tar:
    exists: false
  # RFE #106 PR4 (botwork#118 + this PR): bootstrap.tar retires
  # alongside the legacy bootstrap container. The host-side
  # `botwork-import.service` replaces it with `botwork-tools bootstrap`.
  /usr/share/botwork/images/api.tar:
    exists: false
  # ui image tarball (RFE #106 follow-up). Loaded by the
  # image-loader oneshot like every other broker image.
  /usr/share/botwork/images/ui.tar:
    exists: false
  /usr/share/botwork/images/postgres.tar:
    exists: false
  /usr/share/botwork/images/mcp-echo.tar:
    exists: false
  # curl baked so the api goss probes can `docker run … botwork/curl:local`
  # without pulling docker.io live (intermittent Docker Hub anonymous-token
  # 404s were the source of the recent main-branch flake).
  /usr/share/botwork/images/curl.tar:
    exists: false
  # botwork-db-init's script — paired with the unit; runs every boot.
  /usr/local/sbin/botwork-db-init:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0755"
  # Vendor units now live under /usr/lib/systemd/system/ (was
  # /etc/systemd/system/). This is the whole point of this PR: /etc is
  # left free for admin overrides and mask symlinks, so `systemctl mask`
  # works without a move-aside. The `command:` check below proves it.
  /usr/lib/systemd/system/botwork-launcher.socket:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0644"
  /usr/lib/systemd/system/botwork-config-broker.service:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0644"
  /usr/lib/systemd/system/botwork-control-plane.service:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0644"

command:
  botwork-images-present-in-docker-store:
    exec: |
      set -e
      for svc in session-broker config-broker control-plane db-migrate api ui postgres mcp-echo curl; do
        sudo -n docker image inspect "botwork/${svc}:local" >/dev/null
      done
    exit-status: 0
    timeout: 10000
  # Prove masking works without a move-aside now that vendor units live in
  # /usr/lib/systemd/system/ and /etc/systemd/system/ is free for the mask
  # symlink. goss commands run as the unprivileged smoke user, so mask/unmask
  # (which edit /etc) need sudo; bot/debian are NOPASSWD sudo (10-bot-user.sh).
  # Use botwork-egress-iptables.service as the guinea pig — it's enabled but
  # nothing in the active graph Requires= it, so mask+unmask can't disturb a
  # running container. Assert is-enabled reports `masked` (the observable
  # post-state of a successful bare `systemctl mask`), then unmask to restore.
  botwork-mask-without-move-aside:
    exec: |
      set -e
      sudo -n systemctl mask botwork-egress-iptables.service >/dev/null 2>&1
      state="$(systemctl is-enabled botwork-egress-iptables.service 2>/dev/null || true)"
      sudo -n systemctl unmask botwork-egress-iptables.service >/dev/null 2>&1
      echo "$state"
    exit-status: 0
    stdout:
    - masked
    timeout: 10000
