user:
  debian:
    exists: true
  bot:
    exists: true
    shell: /bin/bash
    groups:
    - bot
    - docker

package:
  git:
    installed: true
  curl:
    installed: true
  ca-certificates:
    installed: true
  python3:
    installed: true
  jq:
    installed: true
  openssh-server:
    installed: true
  unattended-upgrades:
    installed: true
  docker-ce:
    installed: true

service:
  ssh:
    enabled: true
  unattended-upgrades:
    enabled: true
  docker:
    enabled: true
  botwork-image-loader:
    enabled: true
  botwork-network:
    enabled: true
  # ── Persistence layer (RFE 97 / botwork #97) ─────────────────────────────
  # botwork-db-init renders the random POSTGRES_PASSWORD +
  # BOTWORK_DATABASE_URL into /var/lib/botwork-db/secret.env on first boot;
  # botwork-postgres runs the long-lived DB container; botwork-db-migrate
  # is a oneshot (RemainAfterExit=yes) that runs `Migrator::up` against
  # the empty migrations vec, which still creates the seaql_migrations
  # bookkeeping table — the on-disk evidence asserted further down.
  botwork-db-init:
    enabled: true
  botwork-postgres:
    enabled: true
  botwork-db-migrate:
    enabled: true
  # RFE #106 PR4 (botwork#118 + this PR): replaces botwork-bootstrap
  # with a host-side oneshot that calls `botwork-tools bootstrap`
  # against api. Same yaml shape, same idempotent-upsert
  # semantics; the write side now goes through HTTP+JSON instead
  # of sea-orm-directly.
  botwork-import:
    enabled: true
  botwork-api:
    enabled: true
  botwork-ui:
    enabled: true
  botwork-launcher:
    enabled: true
  botwork-config-broker:
    enabled: true
  botwork-control-plane:
    enabled: true
  botwork-session-broker:
    enabled: true
  botwork-envoy:
    enabled: true
  botwork-network-ingress:
    enabled: true
  botwork-envoy-frontdoor:
    enabled: true

file:
  /etc/botwork/bootstrap.yaml:
    exists: true
    filetype: file
  /etc/botwork/envoy/frontdoor/envoy.yaml:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0644"
  /etc/botwork/envoy/frontdoor/lds/listener.yaml:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0644"
  /etc/botwork/envoy/frontdoor/cds/clusters.yaml:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0644"
  /etc/botwork/envoy/frontdoor/rds/active.yaml:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0644"
  /etc/apt/apt.conf.d/52botwork-unattended-upgrades:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0644"
  /usr/local/bin/botwork-launcher:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0755"
  /usr/local/bin/botwork-tools:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0755"
  # First-boot image loader: the script + its baked tarballs must both be
  # present so `botwork-image-loader.service` is self-contained on every
  # boot (no network fetch).
  /usr/local/sbin/botwork-image-loader:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0755"
  /usr/share/botwork/images/session-broker.tar:
    exists: true
    filetype: file
  /usr/share/botwork/images/config-broker.tar:
    exists: true
    filetype: file
  /usr/share/botwork/images/control-plane.tar:
    exists: true
    filetype: file
  /usr/share/botwork/images/db-migrate.tar:
    exists: true
    filetype: file
  # RFE #106 PR4 (botwork#118 + this PR): bootstrap.tar retires
  # alongside the legacy bootstrap container. The host-side
  # `botwork-import.service` replaces it with `botwork-tools bootstrap`.
  /usr/share/botwork/images/api.tar:
    exists: true
    filetype: file
  # ui image tarball (RFE #106 follow-up). Loaded by the
  # image-loader oneshot like every other broker image.
  /usr/share/botwork/images/ui.tar:
    exists: true
    filetype: file
  /usr/share/botwork/images/postgres.tar:
    exists: true
    filetype: file
  /usr/share/botwork/images/mcp-echo.tar:
    exists: true
    filetype: file
  # curl baked so the api goss probes can `docker run … botwork/curl:local`
  # without pulling docker.io live (intermittent Docker Hub anonymous-token
  # 404s were the source of the recent main-branch flake).
  /usr/share/botwork/images/curl.tar:
    exists: true
    filetype: file
  # botwork-db-init's script — paired with the unit; runs every boot.
  /usr/local/sbin/botwork-db-init:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0755"
  /etc/systemd/system/botwork-launcher.socket:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0644"
  /etc/systemd/system/botwork-config-broker.service:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0644"
  /etc/systemd/system/botwork-control-plane.service:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0644"

command:
  systemd_apt_daily_timer_enabled:
    exec: /bin/systemctl is-enabled apt-daily.timer
    exit-status: 0
    stdout:
    - enabled
  systemd_apt_daily_upgrade_timer_enabled:
    exec: /bin/systemctl is-enabled apt-daily-upgrade.timer
    exit-status: 0
    stdout:
    - enabled
  docker-images-local-mcp:
    exec: /usr/bin/docker image ls
    exit-status: 0
    stdout:
    - botwork/mcp-echo

  docker-images-mcp-echo:
    exec: /usr/bin/docker image inspect botwork/mcp-echo:local
    exit-status: 0

  docker-images-config-broker:
    exec: /usr/bin/docker image inspect botwork/config-broker:local
    exit-status: 0

  docker-images-session-broker:
    exec: /usr/bin/docker image inspect botwork/session-broker:local
    exit-status: 0

  docker-images-control-plane:
    exec: /usr/bin/docker image inspect botwork/control-plane:local
    exit-status: 0

  # Persistence-layer images (RFE 97). db-migrate is built from
  # botwork's db/migration crate; postgres is the upstream
  # postgres:16-bookworm digest pinned in shasset.yaml. Both are
  # retagged to botwork/<svc>:local by the image-loader so the
  # systemd units reference a stable local tag.
  docker-images-db-migrate:
    exec: /usr/bin/docker image inspect botwork/db-migrate:local
    exit-status: 0

  # bootstrap image probe retired under RFE #106 PR4 (botwork#118 +
  # this PR): the host-side `botwork-import.service` calls
  # `botwork-tools bootstrap` against api, so the bootstrap
  # container no longer ships and there is no botwork/bootstrap:local
  # tag to assert.

  # api image (RFE #106 PR1). Same retag-to-:local posture as
  # the other broker images; the systemd unit pins
  # botwork/api:local so this assertion catches a missed
  # image-loader entry or a broken shasset digest in one line.
  docker-images-api:
    exec: /usr/bin/docker image inspect botwork/api:local
    exit-status: 0

  # ui image (RFE #106 follow-up). Same retag-to-:local posture
  # as the other broker images; the systemd unit pins
  # botwork/ui:local so this assertion catches a missed
  # image-loader entry or a broken shasset digest in one line.
  docker-images-ui:
    exec: /usr/bin/docker image inspect botwork/ui:local
    exit-status: 0

  docker-images-postgres:
    exec: /usr/bin/docker image inspect botwork/postgres:local
    exit-status: 0

  # ── Service-state diagnostics ─────────────────────────────────────────────
  # When the topology assertions further down fail, goss tells us only that
  # `docker network inspect` didn't list a container we expected. These
  # checks fire *first* so the failure output captures the actual state of
  # each unit + container at goss-time -- which is the difference between
  # "service crashed and is in restart loop" and "service is fine but
  # took 31s to settle and we lost the race".
  #
  # All four are EXPECTED TO PASS in a healthy boot; they fail only when
  # the underlying service is in trouble, and the goss diff in the failure
  # then names the unit + state directly.

  systemd_config_broker_active:
    exec: /bin/systemctl is-active botwork-config-broker.service
    exit-status: 0
    stdout:
    - active

  systemd_control_plane_active:
    exec: /bin/systemctl is-active botwork-control-plane.service
    exit-status: 0
    stdout:
    - active

  systemd_session_broker_active:
    exec: /bin/systemctl is-active botwork-session-broker.service
    exit-status: 0
    stdout:
    - active

  systemd_envoy_active:
    exec: /bin/systemctl is-active botwork-envoy.service
    exit-status: 0
    stdout:
    - active

  # Persistence-layer units (RFE 97). db-init is a oneshot with
  # RemainAfterExit=yes so its "active" state pins the env-file having
  # been rendered; postgres is the long-lived DB; db-migrate is another
  # oneshot whose "active" state is the killer signal that Migrator::up
  # exited 0.
  systemd_db_init_active:
    exec: /bin/systemctl is-active botwork-db-init.service
    exit-status: 0
    stdout:
    - active

  systemd_postgres_active:
    exec: /bin/systemctl is-active botwork-postgres.service
    exit-status: 0
    stdout:
    - active

  systemd_db_migrate_active:
    exec: /bin/systemctl is-active botwork-db-migrate.service
    exit-status: 0
    stdout:
    - active

  # RFE #106 PR4 (botwork#118 + this PR): botwork-bootstrap.service
  # retires in favour of botwork-import.service. The new unit is also
  # `Type=oneshot RemainAfterExit=yes`, so "active" is the killer
  # signal that `botwork-tools bootstrap` completed exit 0 against
  # api. A failed import means /etc/botwork/bootstrap.yaml has
  # validation issues, api was unreachable, or a row got
  # rejected mid-apply — all surface as unit failure.
  systemd_import_active:
    exec: /bin/systemctl is-active botwork-import.service
    exit-status: 0
    stdout:
    - active

  # api (RFE #106 PR1). Long-running server with Restart=always,
  # so "active" here is the killer signal that the binary started
  # cleanly (connected to postgres, bound 0.0.0.0:9400, didn't die).
  # The end-to-end /api/health probe lives further down.
  systemd_api_active:
    exec: /bin/systemctl is-active botwork-api.service
    exit-status: 0
    stdout:
    - active

  # ui (RFE #106 follow-up). Long-running server with
  # Restart=always, so "active" here is the killer signal that the
  # binary started cleanly (bound 0.0.0.0:9500, no DB connection
  # needed). The end-to-end /healthz + /admin/ probes live further
  # down.
  systemd_ui_active:
    exec: /bin/systemctl is-active botwork-ui.service
    exit-status: 0
    stdout:
    - active

  # docker ps view: each of the four broker containers + envoy should
  # appear in the running set. Captures the case where systemd thinks the
  # unit is active but the container under it has exited or is in a
  # restart loop (config-broker parse failure → docker run exits 1 →
  # systemd Restart= cycles forever). `docker ps -a` is used so we *also*
  # see exited containers in the goss diagnostic output -- which is the
  # one diagnostic that would distinguish "never started" from "crashed
  # immediately".
  #
  # No --format flag here: goss renders this file as a go-template before
  # YAML parse, so any literal double-open-brace anywhere in the file
  # (including comments -- yes, even this one) trips the templater with
  # errors like "unexpected <docker> in operand". The default
  # `docker ps -a` table layout puts the name in the final column, which
  # `stdout:` patterns match cleanly.
  containers_running:
    exec: /usr/bin/docker ps -a
    exit-status: 0
    stdout:
    - "botwork-api"
    - "botwork-ui"
    - "botwork-config-broker"
    - "botwork-control-plane"
    - "botwork-envoy"
    - "botwork-postgres"
    - "botwork-session-broker"
    - "botwork-envoy-frontdoor"


  # ── Network topology assertions ────────────────────────────────────────────
  # PR1 of the network split (vm#84) introduces a two-network topology:
  #   botwork-internal  – brokers only
  #   botwork-plugin    – spawned plugin sessions; envoy bridges the two
  # Each assertion below pins one corner of the topology so a future change
  # that collapses, renames, or re-attaches a container surfaces as a single
  # failing check rather than a smoke-test mystery.

  docker_network_internal_exists:
    exec: /usr/bin/docker network inspect botwork-internal
    exit-status: 0

  docker_network_plugin_exists:
    exec: /usr/bin/docker network inspect botwork-plugin
    exit-status: 0

  docker_network_ingress_exists:
    exec: /usr/bin/docker network inspect botwork-ingress
    exit-status: 0

  # The legacy single network must NOT exist post-rename; a stale
  # `botwork` network would silently keep old configs working and mask
  # split regressions.
  docker_network_legacy_botwork_absent:
    exec: /usr/bin/docker network inspect botwork
    exit-status: 1

  # Brokers must be reachable on botwork-internal *only* — never on
  # botwork-plugin. We pipe `docker network inspect` JSON into `jq -e`
  # rather than using docker's `-f` go-template flag, because goss
  # renders the entire gossfile as a go-template (against its TmplVars
  # context) BEFORE parsing it as YAML. That means any literal
  # double-curly-brace pair anywhere in this file — even inside a
  # `#`-prefixed YAML comment, since the templater runs on raw text —
  # is parsed as a template action and fails with errors like
  # "can't evaluate field Containers in type *goss.TmplVars" or
  # "unexpected <.> in operand". So: no double-curly-brace pairs
  # anywhere in this file, comments included.
  config_broker_on_internal_network:
    exec: |
      /usr/bin/docker network inspect botwork-internal \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-config-broker")'
    exit-status: 0

  session_broker_on_internal_network:
    exec: |
      /usr/bin/docker network inspect botwork-internal \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-session-broker")'
    exit-status: 0

  config_broker_not_on_plugin_network:
    # `index` returns null when absent; `| not` flips that to true, and
    # `jq -e` then exits 0. If present, `index` returns the numeric
    # position, `not` flips it to false, and jq exits non-zero.
    exec: |
      /usr/bin/docker network inspect botwork-plugin \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-config-broker") | not'
    exit-status: 0

  # session-broker MUST be on botwork-plugin: it needs DNS+TCP
  # reachability to spawned `mcp_session_<token>` containers (those
  # live on botwork-plugin) to run its cold-start readiness probe
  # (`probe_ready` in launcher.rs). Without this, every first request
  # to a plugin times out as a 504 because the probe can't connect.
  #
  # Note this is an asymmetric crossing: session-broker initiates to
  # plugin sessions, but plugin sessions must NOT be able to initiate
  # back to session-broker (no `--network-alias session_broker` on the
  # plugin side, and PR3 enforces this with iptables). config-broker
  # stays internal-only because nothing on the plugin side needs to
  # reach it.
  session_broker_on_plugin_network:
    exec: |
      /usr/bin/docker network inspect botwork-plugin \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-session-broker")'
    exit-status: 0

  # control-plane must be reachable on botwork-internal only -- it is
  # consumed by session-broker (on both networks) and by the future
  # egress-envoy (on internal), and nothing on the plugin network
  # initiates to it. Same posture as config-broker.
  control_plane_on_internal_network:
    exec: |
      /usr/bin/docker network inspect botwork-internal \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-control-plane")'
    exit-status: 0

  # api joins botwork-internal only (RFE #106 PR1). Same posture
  # as config-broker / control-plane: nothing on the plugin network
  # needs to reach it, and the eventual operator-facing exposure goes
  # through the ingress envoy's ext_authz seam (separate overlay PR).
  api_on_internal_network:
    exec: |
      /usr/bin/docker network inspect botwork-internal \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-api")'
    exit-status: 0

  api_not_on_plugin_network:
    exec: |
      /usr/bin/docker network inspect botwork-plugin \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-api") | not'
    exit-status: 0

  # api MUST NOT publish 9400 to the host (same posture as every
  # other broker). The eventual operator-facing exposure comes from
  # the ingress envoy adding an `/api/*` route; api itself
  # stays behind the docker network until that overlay lands.
  api_not_published_to_host:
    exec: /usr/bin/docker port botwork-api 9400/tcp
    exit-status: 1

  # ui joins botwork-internal only (RFE #106 follow-up). Same
  # posture as api / config-broker / control-plane: nothing on
  # the plugin network needs to reach the operator-facing chrome, and
  # the eventual external exposure goes through the ingress envoy's
  # ext_authz seam (separate overlay PR).
  ui_on_internal_network:
    exec: |
      /usr/bin/docker network inspect botwork-internal \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-ui")'
    exit-status: 0

  ui_not_on_plugin_network:
    exec: |
      /usr/bin/docker network inspect botwork-plugin \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-ui") | not'
    exit-status: 0

  # ui MUST NOT publish 9500 to the host. Same posture as
  # api: the trust boundary is the docker network and the
  # eventual operator-facing exposure comes from the ingress envoy
  # adding `/admin/*` (UI) and `/api/*` (JSON) routes in front
  # of the existing ext_authz seam.
  ui_not_published_to_host:
    exec: /usr/bin/docker port botwork-ui 9500/tcp
    exit-status: 1

  control_plane_not_on_plugin_network:
    exec: |
      /usr/bin/docker network inspect botwork-plugin \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-control-plane") | not'
    exit-status: 0

  # envoy is the only allowed crossing: it MUST appear on both networks.
  envoy_on_internal_network:
    exec: |
      /usr/bin/docker network inspect botwork-internal \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-envoy")'
    exit-status: 0

  envoy_on_plugin_network:
    exec: |
      /usr/bin/docker network inspect botwork-plugin \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-envoy")'
    exit-status: 0

  # Ingress envoy admin port is NOT published to the host (no more 9901 host-publish).
  # Reachable only via `docker exec`. Assert docker port returns exit 1.
  envoy_admin_not_published_to_host:
    exec: /usr/bin/docker port botwork-envoy 9901/tcp
    exit-status: 1

  # Ingress envoy 8080 is NOT published to the host (frontdoor is now the only
  # public-facing port). Assert docker port returns exit 1.
  envoy_ingress_port_not_published_to_host:
    exec: /usr/bin/docker port botwork-envoy 8080/tcp
    exit-status: 1

  # Launcher must announce its default plugin network via environment, since
  # botwork 0.1.4 makes BOTWORK_LAUNCHER_DEFAULT_NETWORK a required env var.
  # `systemctl show -p Environment` returns the resolved environment block.
  launcher_default_network_env_set:
    exec: /usr/bin/systemctl show -p Environment botwork-launcher.service
    exit-status: 0
    stdout:
    - BOTWORK_LAUNCHER_DEFAULT_NETWORK=botwork-plugin

  # Assert the rust session-broker reached the point of binding its gRPC
  # listener on 0.0.0.0:9001. We grep its own startup log line rather than
  # TCP-probing, because:
  #   - the broker image has no shell tools (no python, no nc, no bash);
  #   - goss runs `exec:` via /bin/sh, so bash-only features like `[[ ]]`
  #     and `</dev/tcp/...` cannot be used reliably here;
  #   - the broker is on botwork-internal with no host port-publish, so
  #     probing from the host needs network discovery.
  # The log line below is emitted by the broker the moment it starts
  # serving, which is exactly what this check is meant to verify.
  session_broker_listens_on_9001:
    timeout: 30000
    exec: |
      i=0
      while [ "$i" -lt 40 ]; do
        if docker logs botwork-session-broker 2>&1 \
            | grep -q 'starting gRPC ext_proc service on 0.0.0.0:9001'; then
          exit 0
        fi
        i=$((i + 1))
        sleep 0.5
      done
      exit 1
    exit-status: 0

  # config-broker emits its bind log after the DB pool has connected
  # (post-RFE #101 PR2; pre-cutover this fired after parsing
  # plugins.yaml). Passing this doubles as evidence that
  # BOTWORK_DATABASE_URL is well-formed and the credential is correct
  # — a bad DSN or unreachable postgres makes the binary exit with a
  # specific non-zero code before the bind log is ever emitted. Same
  # image-tooling caveats as session-broker apply.
  config_broker_listens_on_9200:
    timeout: 30000
    exec: |
      i=0
      while [ "$i" -lt 40 ]; do
        if docker logs botwork-config-broker 2>&1 \
            | grep -q 'starting on 0\.0\.0\.0:9200'; then
          exit 0
        fi
        i=$((i + 1))
        sleep 0.5
      done
      exit 1
    exit-status: 0

  # session-broker logs its resolved config-broker endpoint at startup; this
  # confirms env-var + default agree and the value session-broker will
  # actually call points at the alias config-broker registers.
  session_broker_logs_config_broker_endpoint:
    timeout: 30000
    exec: |
      i=0
      while [ "$i" -lt 40 ]; do
        if docker logs botwork-session-broker 2>&1 \
            | grep -q 'config-broker endpoint: http://config_broker:9200'; then
          exit 0
        fi
        i=$((i + 1))
        sleep 0.5
      done
      exit 1
    exit-status: 0

  # control-plane emits two bind logs immediately after constructing the
  # router and the xDS gRPC service. Passing both proves the image started
  # cleanly (and -- since `main.rs` exits non-zero on bind failure for
  # either transport -- that both ports are actually bound and reachable
  # at 0.0.0.0:9300 / 0.0.0.0:9301 from inside the container).
  #
  # Wording changed in botwork 0.2.1 (control-plane xDS landed):
  # the "starting on 0.0.0.0:9300" log split into "starting HTTP …" +
  # "starting xDS gRPC …" once the binary started two transports.
  # Pinning both forms here so a future revert of either is a fail-fast.
  #
  # Same shell-tooling caveat as config-broker / session-broker applies.
  control_plane_listens_on_9300:
    timeout: 30000
    exec: |
      i=0
      while [ "$i" -lt 40 ]; do
        if docker logs botwork-control-plane 2>&1 \
            | grep -q 'starting HTTP on 0\.0\.0\.0:9300'; then
          exit 0
        fi
        i=$((i + 1))
        sleep 0.5
      done
      exit 1
    exit-status: 0

  # New in botwork 0.2.1: control-plane runs a second listener for the
  # ADS / xDS gRPC service consumed by the (future) egress envoy. Same
  # trust boundary as 9300; both alias as `control_plane` on
  # botwork-internal. The egress envoy bootstrap (lands in a follow-up
  # vm PR for cycle 2B) pins `control_plane:9301` as its
  # api_config_source endpoint, so a missing or moved 9301 bind would
  # surface there as a silent "envoy never gets a Listener pushed";
  # this assertion fires loudly at boot time instead.
  control_plane_listens_on_9301_xds:
    timeout: 30000
    exec: |
      i=0
      while [ "$i" -lt 40 ]; do
        if docker logs botwork-control-plane 2>&1 \
            | grep -q 'starting xDS gRPC on 0\.0\.0\.0:9301'; then
          exit 0
        fi
        i=$((i + 1))
        sleep 0.5
      done
      exit 1
    exit-status: 0

  # control-plane's cold-start recovery sync. botwork 0.1.8 (#87)
  # introduced it as an HTTP poll against session-broker's
  # `GET /control-plane/sessions` admin endpoint; botwork#135
  # (RFE #105 round-3 final) cut that read over to a direct
  # postgres JOIN (`session_worker` ⨝ `agent_session` ⨝
  # tenant/workspace/plugin). The success log line is unchanged
  # ("cold-start recovery complete: N session(s) seeded") so this
  # assertion keeps working across the cutover — only the path
  # control-plane took to produce it changed.
  #
  # What this probe still proves:
  #   * postgres was reachable from control-plane on the alias
  #     (`postgres` on botwork-internal),
  #   * BOTWORK_DATABASE_URL was rendered correctly by
  #     botwork-db-init and surfaced via EnvironmentFile=,
  #   * the JOIN ran without DbErr (no schema drift),
  #   * control-plane is starting with a known (possibly empty)
  #     store, not the silent "empty by guess" mode that would
  #     break the xDS feeder.
  #
  # We match ANY non-negative count, not specifically 0. goss.yaml is
  # re-validated post-restart by loader-redeploy-simulation (this same
  # spec runs twice), and at that point control-plane's recovery is
  # rehydrating the session_worker rows that the prior echo-mcp-smoke
  # left in postgres — so the count is 1, not 0. Pinning ==0 was a
  # fresh-boot-only assumption that worked accidentally before
  # `mcp-echo-smoke` surfaced an agent-session-id; once the smoke
  # started writing real persistence rows, the post-restart re-run
  # caught the count change and failed loudly. The killer signal we
  # actually want here is "the log line fired" — that proves the JOIN
  # ran without DbErr and control-plane bound. The specific count is
  # surface noise.
  #
  # Long timeout (60 × 1s) because the recovery retry interval is 5s
  # in production and we want at least one attempt to land cleanly
  # before failing.
  control_plane_recovery_sync_completed:
    timeout: 60000
    exec: |
      i=0
      while [ "$i" -lt 60 ]; do
        if docker logs botwork-control-plane 2>&1 \
            | grep -Eq 'cold-start recovery complete: [0-9]+ session\(s\) seeded'; then
          exit 0
        fi
        i=$((i + 1))
        sleep 1
      done
      exit 1
    exit-status: 0

  # session-broker logs its resolved control-plane endpoint at startup
  # alongside the config-broker one; this confirms the new
  # BOTWORK_CONTROL_PLANE_ENDPOINT env var defaulting agrees with the
  # alias control-plane registers. Without this, a typo in the default
  # would only surface on the first spawn (as a hard-gate 503), which
  # is much harder to debug than a missing log line at boot.
  session_broker_logs_control_plane_endpoint:
    timeout: 30000
    exec: |
      i=0
      while [ "$i" -lt 40 ]; do
        if docker logs botwork-session-broker 2>&1 \
            | grep -q 'control-plane endpoint: http://control_plane:9300'; then
          exit 0
        fi
        i=$((i + 1))
        sleep 0.5
      done
      exit 1
    exit-status: 0

  # botwork 0.1.9+ (#88) makes `egress:` mandatory on every plugin in
  # plugins.yaml -- config-broker refuses to start without it. Catch
  # missing-egress entries on disk before the broker does so the failure
  # names the plugin instead of bubbling up as a service-failed-to-start
  # in the journal. The valid forms (`all`, `none`, `{ allow: [...] }`)
  # are validated by config-broker itself; here we only assert presence.
  plugins_registry_every_plugin_has_egress:
    # bootstrap.yaml's top-level `plugins:` is a sequence of objects
    # post-RFE #101 PR2 (was a map keyed by name pre-cutover). The
    # bootstrap binary's validator enforces this rule too, but goss
    # surfaces the offender at boot time before the unit fails.
    exec: |
      python3 - <<'PY'
      import pathlib, sys, yaml
      payload = yaml.safe_load(
          pathlib.Path('/etc/botwork/bootstrap.yaml').read_text(encoding='utf-8')
      )
      plugins = payload.get('plugins') or []
      missing = [entry.get('name', '<unnamed>') for entry in plugins
                 if isinstance(entry, dict) and 'egress' not in entry]
      if missing:
          print(f"plugins missing required 'egress:' field: {missing}", file=sys.stderr)
          sys.exit(1)
      sys.exit(0)
      PY
    exit-status: 0

  # plugins-base.yaml must declare a non-empty `config:` block on echo so
  # the smoke test downstream can assert that config injection actually
  # flowed through. This catches the regression where someone trims the
  # fixture back to a bare `image: …` entry.
  plugins_registry_echo_has_config:
    # Per-binding `config:` lives under
    # `tenants[].workspaces[].plugins[].config` in bootstrap.yaml. The
    # base-image smoke fixture pins (tenant=mcp, workspace=demo,
    # binding=echo) so the edge URL-shape lua in lds/listener.yaml
    # resolves cleanly through config-broker on a healthy boot. See
    # envoy/plugins-base.yaml for the matching triple.
    exec: |
      python3 - <<'PY'
      import pathlib, yaml, sys
      payload = yaml.safe_load(
          pathlib.Path('/etc/botwork/bootstrap.yaml').read_text(encoding='utf-8')
      )
      cfg = {}
      for tenant in (payload.get('tenants') or []):
          if tenant.get('name') != 'mcp':
              continue
          for ws in (tenant.get('workspaces') or []):
              if ws.get('name') != 'demo':
                  continue
              for binding in (ws.get('plugins') or []):
                  if binding.get('name') == 'echo':
                      cfg = binding.get('config') or {}
                      break
      sys.exit(0 if cfg.get('vm_smoke_marker') == 'vm-base-config-injection-ok' else 1)
      PY
    exit-status: 0

  # plugins.yaml MUST NOT carry an explicit `network:` field on any plugin
  # entry: botwork 0.1.4 dropped per-plugin network membership in favour of
  # BOTWORK_LAUNCHER_DEFAULT_NETWORK, and config-broker now rejects entries
  # that still set it. This assertion fails fast (before runtime) on any
  # fixture that has drifted.
  plugins_registry_no_per_plugin_network:
    exec: |
      python3 - <<'PY'
      import pathlib, yaml, sys
      payload = yaml.safe_load(
          pathlib.Path('/etc/botwork/bootstrap.yaml').read_text(encoding='utf-8')
      )
      plugins = payload.get('plugins') or []
      offenders = [entry.get('name', '<unnamed>') for entry in plugins
                   if isinstance(entry, dict) and 'network' in entry]
      if offenders:
          print(f"plugins with stale 'network:' field: {offenders}", file=sys.stderr)
          sys.exit(1)
      sys.exit(0)
      PY
    exit-status: 0

  # Payload-agnostic: the base image ships an echo-only registry and the
  # overlay bootstrap expands it to the full plugin set, so we only assert
  # the file is a well-formed `plugins:` mapping rather than its contents.
  # Positive assertions about the expanded registry live in the downstream
  # (botwork) goss-payload spec.
  plugins_registry_yaml_valid:
    # bootstrap.yaml is required to be a well-formed top-level object
    # with a `plugins:` sequence and a `tenants:` sequence. Positive
    # assertions about row counts live in the downstream goss-payload
    # spec.
    exec: |
      python3 - <<'PY'
      import pathlib, sys, yaml
      raw = pathlib.Path('/etc/botwork/bootstrap.yaml').read_text(encoding='utf-8')
      payload = yaml.safe_load(raw)
      ok = (
          isinstance(payload, dict)
          and isinstance(payload.get('plugins'), list)
          and isinstance(payload.get('tenants'), list)
      )
      sys.exit(0 if ok else 1)
      PY
    exit-status: 0

  # ── Frontdoor (botwork-envoy-frontdoor) ──────────────────────────────────
  # Frontdoor is the only public-facing envoy. It joins botwork-ingress only
  # (not botwork-internal or botwork-plugin). :80 is the only host-published
  # port in the stack. The holding page is served via Envoy direct_response
  # (no upstream container) until rds/active.yaml is swapped to route to ingress.

  systemd_network_ingress_active:
    exec: /bin/systemctl is-active botwork-network-ingress.service
    exit-status: 0
    stdout:
    - active

  systemd_envoy_frontdoor_active:
    exec: /bin/systemctl is-active botwork-envoy-frontdoor.service
    exit-status: 0
    stdout:
    - active

  # Frontdoor publishes :80 on 0.0.0.0 — the only host-published port.
  frontdoor_port_80_published_on_wildcard:
    exec: /usr/bin/docker port botwork-envoy-frontdoor 80/tcp
    exit-status: 0
    stdout:
    - "0.0.0.0:80"

  # Frontdoor admin :9903 is NOT published to the host.
  frontdoor_admin_not_published_to_host:
    exec: /usr/bin/docker port botwork-envoy-frontdoor 9903/tcp
    exit-status: 1

  # Frontdoor is on botwork-ingress only.
  frontdoor_on_ingress_network:
    exec: |
      /usr/bin/docker network inspect botwork-ingress \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-envoy-frontdoor")'
    exit-status: 0

  # Ingress envoy (botwork-envoy) also joins botwork-ingress so frontdoor
  # can resolve it via docker DNS.
  envoy_on_ingress_network:
    exec: |
      /usr/bin/docker network inspect botwork-ingress \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-envoy")'
    exit-status: 0

  # curl http://127.0.0.1/ returns 200 with holding-page body served via
  # Envoy direct_response (no upstream container needed).
  frontdoor_curl_hello_world:
    timeout: 30000
    exec: |
      i=0
      while [ "$i" -lt 30 ]; do
        body="$(curl -fsS http://127.0.0.1/ 2>/dev/null || true)"
        if printf '%s' "${body}" | grep -q 'frontdoor: hello world'; then
          exit 0
        fi
        i=$((i + 1))
        sleep 1
      done
      echo "frontdoor did not return hello-world body after 30s" >&2
      curl -v http://127.0.0.1/ >&2 || true
      exit 1
    exit-status: 0

  # Frontdoor admin is reachable from the botwork-ingress network.
  # envoyproxy/envoy:v1.38-latest is distroless (no curl/shell), so we
  # cannot use `docker exec` to run curl inside the container. Instead
  # use a sibling botwork/curl:local container on the same botwork-ingress
  # network — this is sufficient to verify the admin port is up and
  # listening. The container name `botwork-envoy-frontdoor` is resolvable
  # via docker DNS because botwork-ingress is a user-defined network.
  frontdoor_admin_ready_inside_container:
    timeout: 30000
    exec: |
      i=0
      while [ "$i" -lt 30 ]; do
        if /usr/bin/docker run --rm --network botwork-ingress \
            botwork/curl:local \
            curl -fsS http://botwork-envoy-frontdoor:9903/ready >/dev/null 2>&1; then
          exit 0
        fi
        i=$((i + 1))
        sleep 1
      done
      echo "frontdoor admin not ready after 30s" >&2
      exit 1
    exit-status: 0

  # Frontdoor can reach ingress envoy over botwork-ingress via docker DNS.
  # Any HTTP response (even 404/503) proves DNS + TCP reachability.
  # Same reasoning as frontdoor_admin_ready_inside_container: use a sibling
  # botwork/curl:local container on botwork-ingress rather than docker exec
  # into the distroless envoy container.
  frontdoor_reaches_ingress_over_ingress_network:
    timeout: 30000
    exec: |
      i=0
      while [ "$i" -lt 30 ]; do
        code="$(/usr/bin/docker run --rm --network botwork-ingress \
          botwork/curl:local \
          curl -fsS -o /dev/null -w '%{http_code}' http://botwork-envoy:8080/ \
          2>/dev/null || true)"
        if [ -n "${code}" ] && [ "${code}" != "000" ]; then
          exit 0
        fi
        i=$((i + 1))
        sleep 1
      done
      echo "frontdoor could not reach botwork-envoy:8080 after 30s" >&2
      exit 1
    exit-status: 0

  # ── Egress envoy (botwork-launcher 0.2.2+ / cycle 2B) ─────────────────────
  # The egress envoy is the forward proxy plugin containers route their
  # outbound HTTP through. It bridges botwork-plugin (where plugins reach
  # it via the `egress_envoy:3128` alias) to the upstream world via the
  # dynamic_forward_proxy cluster, with RBAC pushed dynamically by
  # control-plane over ADS. Assertions here pin the four wire-contract
  # pieces:
  #   1. the systemd unit + container are alive,
  #   2. the dual-network attachment with alias on botwork-plugin only,
  #   3. the launcher unit is configured to inject HTTPS_PROXY pointing
  #      at us,
  #   4. envoy successfully completed its ADS handshake against
  #      control-plane (the LDS push log is what proves the bootstrap +
  #      control-plane wire shape are in agreement).
  #
  # The iptables lockdown block lives further down -- egress envoy first,
  # because it's the half plugins use cooperatively; iptables is the half
  # that makes the cooperative path the only possible path.

  systemd_egress_envoy_active:
    exec: /bin/systemctl is-active botwork-egress-envoy.service
    exit-status: 0
    stdout:
    - active

  containers_egress_envoy_running:
    exec: /usr/bin/docker ps
    exit-status: 0
    stdout:
    - "botwork-egress-envoy"

  egress_envoy_on_plugin_network:
    exec: |
      /usr/bin/docker network inspect botwork-plugin \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-egress-envoy")'
    exit-status: 0

  # The envoy joins botwork-internal too (so it can dial
  # control_plane:9301 for ADS), but ASYMMETRICALLY: alias only on the
  # plugin network. The alias presence check below confirms the
  # asymmetric attachment landed correctly.
  egress_envoy_on_internal_network:
    exec: |
      /usr/bin/docker network inspect botwork-internal \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-egress-envoy")'
    exit-status: 0

  # `egress_envoy` MUST resolve on botwork-plugin (that's how plugin
  # containers reach it). The alias is set via --network-alias on the
  # initial docker create, which only takes effect on the network the
  # container is created with.
  #
  # We pull this from `docker inspect <container>` rather than `docker
  # network inspect <net>` because aliases live on the container
  # endpoint object (`.NetworkSettings.Networks.<net>.Aliases`), not
  # on the network's Containers list (which only has Name / IP /
  # MAC). The first iteration of this check used the network-side
  # query and was always empty -- failed in CI on PR1.
  #
  # The bracket form `["botwork-plugin"]` is required because jq
  # can't dot-index a key with a hyphen. Same trick as the launcher's
  # docker-inspect format string -- we worked around the equivalent
  # Go-template gotcha in botwork #86.
  egress_envoy_alias_resolves_on_plugin:
    exec: |
      /usr/bin/docker inspect botwork-egress-envoy \
        | /usr/bin/jq -e '.[0].NetworkSettings.Networks["botwork-plugin"].Aliases | index("egress_envoy")'
    exit-status: 0

  # Admin port: egress envoy admin (9902) is NOT published to the host.
  # Reachable only via `docker exec`. Assert docker port returns exit 1.
  egress_envoy_admin_not_published_to_host:
    exec: /usr/bin/docker port botwork-egress-envoy 9902/tcp
    exit-status: 1

  # 3128 must NOT show up in `docker port` output at all (we don't
  # publish it). `docker port <name> <port>` exits non-zero when the
  # port isn't published, which is exactly the result we want.
  egress_envoy_proxy_port_not_published:
    exec: /usr/bin/docker port botwork-egress-envoy 3128/tcp
    exit-status: 1

  # botwork-launcher 0.2.2+ accepts BOTWORK_LAUNCHER_EGRESS_PROXY=<url>
  # and injects HTTPS_PROXY / HTTP_PROXY / NO_PROXY into every spawned
  # plugin container. The vm-side wiring is to set the env on the
  # launcher's systemd unit pointing at the docker alias the egress
  # envoy registers (`egress_envoy:3128`). Missing this env would
  # silently break enforcement -- plugins would still talk directly
  # to the world even though the iptables DROP would catch most of it,
  # so assert it at boot.
  launcher_egress_proxy_env_set:
    exec: /usr/bin/systemctl show -p Environment botwork-launcher.service
    exit-status: 0
    stdout:
    - BOTWORK_LAUNCHER_EGRESS_PROXY=http://egress_envoy:3128

  # The control-plane xDS log line that proves the ADS handshake
  # completed and a Listener was pushed to the egress envoy. The grep
  # is on the control-plane container's log rather than envoy's because
  # the envoy image has no shell tools (no nc/curl/python); docker logs
  # work uniformly. control-plane's xds.rs logs "push LDS to <peer>"
  # for every push; if envoy never connects, this never fires.
  #
  # Long-ish timeout because the envoy → control-plane handshake
  # happens after BOTH containers are up and envoy has parsed its
  # bootstrap. 40 × 1s = 40s budget.
  control_plane_logged_lds_push_to_egress_envoy:
    timeout: 60000
    exec: |
      i=0
      while [ "$i" -lt 40 ]; do
        if docker logs botwork-control-plane 2>&1 \
            | grep -q 'push LDS to'; then
          exit 0
        fi
        i=$((i + 1))
        sleep 1
      done
      exit 1
    exit-status: 0

  # ── Egress iptables lockdown ──────────────────────────────────────────────
  # The egress envoy is the cooperative path: plugins that honour
  # HTTPS_PROXY route through it. The iptables rules below are the
  # enforced path: a plugin that does `curl --noproxy '*'` or anything
  # else that ignores the env var hits DROP at the bridge regardless.
  # Together they make the egress envoy the ONLY way out for plugin
  # traffic, and incidentally prevent inter-plugin communication and
  # plugin → broker callbacks.
  #
  # The unit installs four rules (see firstboot/botwork-egress-iptables);
  # we check the systemd state + the presence of each rule's
  # distinguishing match in `iptables -L` output.

  systemd_egress_iptables_active:
    exec: /bin/systemctl is-active botwork-egress-iptables.service
    exit-status: 0
    stdout:
    - active

  # Rule 1: 169.254.169.254 (cloud metadata) DROP. Applies everywhere,
  # not just the plugin bridge -- if a future container is wired up
  # with weird permissions, this remains the floor.
  iptables_blocks_cloud_metadata:
    exec: /usr/sbin/iptables -L DOCKER-USER -n
    exit-status: 0
    stdout:
    - "DROP"
    - "169.254.169.254"

  # Rules 2-4: scoped to the plugin bridge. We grep the bridge prefix
  # `br-` because the trailing 12-char id is generated by docker and
  # would make the assertion brittle if we hard-coded it. Both ACCEPT
  # (for the egress envoy IP / RELATED,ESTABLISHED) and DROP must be
  # present.
  iptables_plugin_bridge_rules_present:
    exec: /usr/sbin/iptables -L DOCKER-USER -n -v
    exit-status: 0
    stdout:
    - "br-"
    - "DROP"
    - "ACCEPT"

  # Conntrack rule for response packets to envoy-initiated MCP
  # connections (ingress envoy reaching into a plugin via ext_proc).
  # Without it the catch-all plugin-side DROP would also drop these
  # response packets, breaking the MCP flow.
  iptables_conntrack_related_established_present:
    exec: |
      /usr/sbin/iptables -L DOCKER-USER -n -v \
        | grep -q 'RELATED,ESTABLISHED'
    exit-status: 0

  # ── DB readiness + topology + on-disk evidence (RFE 97) ────────────────────
  # These assertions are the killer signal that the persistence-layer
  # boot chain converged end-to-end inside the baked VM:
  #
  #   1. The secret env-file exists with the right perms (db-init ran).
  #   2. postgres is reachable on the docker network and accepts the
  #      credential.
  #   3. `seaql_migrations` exists in public schema (db-migrate ran
  #      Migrator::up against postgres, and the bookkeeping table is
  #      the on-disk evidence — even with an empty migrations vec).
  #   4. postgres is on botwork-internal only (same trust-boundary
  #      posture as config-broker / control-plane: nothing on the
  #      plugin network should ever see the DB).

  db_secret_env_present_and_mode:
    exec: |
      set -e
      f=/var/lib/botwork-db/secret.env
      [ -f "${f}" ] || { echo "missing ${f}" >&2; exit 1; }
      perms="$(stat -c '%a %U %G' "${f}")"
      [ "${perms}" = "600 root root" ] || { echo "unexpected perms: ${perms}" >&2; exit 1; }
      grep -q '^POSTGRES_PASSWORD=' "${f}"
      grep -q '^BOTWORK_DATABASE_URL=postgres://botwork:' "${f}"
    exit-status: 0

  # postgres accepts connections under the rendered credential. We
  # don't grep `docker logs` here because the official postgres image
  # produces verbose log lines that may not include the exact "ready
  # to accept connections" string across versions; `pg_isready`
  # against the running container is the contract.
  postgres_accepts_connections:
    timeout: 60000
    exec: |
      i=0
      while [ "$i" -lt 30 ]; do
        if docker exec botwork-postgres pg_isready -U botwork -d botwork >/dev/null 2>&1; then
          exit 0
        fi
        i=$((i + 1))
        sleep 1
      done
      exit 1
    exit-status: 0

  postgres_on_internal_network:
    exec: |
      /usr/bin/docker network inspect botwork-internal \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-postgres")'
    exit-status: 0

  postgres_not_on_plugin_network:
    exec: |
      /usr/bin/docker network inspect botwork-plugin \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-postgres") | not'
    exit-status: 0

  # postgres MUST NOT publish 5432 to the host (same posture as every
  # other broker; the docker network is the trust boundary). `docker
  # port` exits non-zero when the port isn't published, which is
  # exactly the result we want — mirror the egress envoy's proxy
  # port assertion.
  postgres_not_published_to_host:
    exec: /usr/bin/docker port botwork-postgres 5432/tcp
    exit-status: 1

  # The on-disk proof that botwork-db-migrate.service actually
  # connected, ran Migrator::up, and committed the seaql_migrations
  # tracking table. If any of (db-init wrote the env, postgres came
  # up, db-migrate could authenticate, sea-orm-migration's first-run
  # path executed) is broken, this assertion is the one that says so
  # in one line. Mirrors botwork's containers.yml smoke for db-migrate
  # so the cargo-side and image-side proofs are the same shape.
  seaql_migrations_table_exists:
    exec: |
      result="$(docker exec botwork-postgres psql -U botwork -d botwork -tAc \
        "SELECT to_regclass('public.seaql_migrations')")"
      [ "${result}" = "seaql_migrations" ]
    exit-status: 0

  # ── api end-to-end health probe (RFE #106 PR1) ──────────────────────
  # The killer signal that api converged end-to-end inside the
  # baked VM: a curl from a sibling container on the same docker
  # network gets a 200 with the contract response shape. This proves
  # that:
  #
  #   1. the image loaded + the systemd unit started cleanly,
  #   2. api connected to postgres on the alias `postgres` with
  #      the credential rendered by botwork-db-init,
  #   3. the listener bound 0.0.0.0:9400 on the `api` alias,
  #   4. the SELECT 1 health probe round-tripped against the DB.
  #
  # We pull curl from a sibling container rather than the host because
  # api has no published port — the trust boundary is the docker
  # network. Same pattern as the README "hitting it from on the VM"
  # example, just driven by goss.
  api_health_endpoint_responds:
    timeout: 60000
    exec: |
      i=0
      while [ "$i" -lt 30 ]; do
        body="$(/usr/bin/docker run --rm --network botwork-internal \
          botwork/curl:local \
          --fail --silent --show-error \
          http://api:9400/api/health 2>/dev/null || true)"
        if printf '%s' "${body}" | grep -q '"status":"ok"' \
           && printf '%s' "${body}" | grep -q '"db":"reachable"'; then
          exit 0
        fi
        i=$((i + 1))
        sleep 1
      done
      echo "api health did not respond with the contract shape" >&2
      /usr/bin/docker logs botwork-api --tail 50 >&2 || true
      exit 1
    exit-status: 0

  # ── api read endpoints (RFE #106 PR2) ─────────────────────────────
  #
  # The health probe above proves api is up and can SELECT 1.
  # The probes below prove the JOIN-shaped read path agrees with what
  # bootstrap upserted from /etc/botwork/bootstrap.yaml — which is
  # the same chain config-broker exercises. If bootstrap landed but
  # something between SeaORM entity definitions and the wire response
  # broke (column rename, serialisation drift, route registration), a
  # single named failure surfaces here rather than at the first
  # human curl against the deployed service.
  #
  # The seed for the in-image smoke is (tenant=mcp, workspace=demo,
  # plugin=echo) per envoy/plugins-base.yaml; we hard-code that triple
  # below because the seed is the contract.
  #
  # All probes run curl from a sibling container on botwork-internal
  # (api has no published port, same trust-boundary posture as
  # the health probe). jq parses the response so a partial body or a
  # wire-shape regression fails on a specific predicate rather than
  # a vague "got non-zero exit".

  # -- LIST tenants: non-empty + wrapped envelope shape.
  api_lists_tenants:
    timeout: 30000
    exec: |
      body="$(/usr/bin/docker run --rm --network botwork-internal \
        botwork/curl:local \
        --fail --silent --show-error \
        -H 'x-botwork-admin: true' \
        http://api:9400/api/tenants 2>/dev/null || true)"
      if [ -z "${body}" ]; then
        echo "empty body from /tenants" >&2
        /usr/bin/docker logs botwork-api --tail 50 >&2 || true
        exit 1
      fi
      # Envelope shape: {items: [...], total: N} — see api/src/read.rs.
      total="$(printf '%s' "${body}" | /usr/bin/jq -r '.total')"
      have_mcp="$(printf '%s' "${body}" | /usr/bin/jq -r \
        '.items | map(.name) | index("mcp") != null')"
      if [ "${have_mcp}" != "true" ] || [ "${total}" -lt 1 ]; then
        echo "unexpected /tenants body (total=${total}, has-mcp=${have_mcp}): ${body}" >&2
        exit 1
      fi
    exit-status: 0

  # -- GET tenant by id: resolve the seed tenant via list, then look it
  #    up by id and assert the by-id body's name matches. This proves
  #    the by-id route is wired AND that the model's `name` column
  #    round-trips through serialisation.
  api_gets_tenant_by_id:
    timeout: 30000
    exec: |
      list="$(/usr/bin/docker run --rm --network botwork-internal \
        botwork/curl:local \
        --fail --silent --show-error \
        -H 'x-botwork-admin: true' \
        http://api:9400/api/tenants 2>/dev/null || true)"
      id="$(printf '%s' "${list}" | /usr/bin/jq -r \
        '.items[] | select(.name == "mcp") | .id')"
      if [ -z "${id}" ] || [ "${id}" = "null" ]; then
        echo "could not find seed tenant 'mcp' in /tenants: ${list}" >&2
        exit 1
      fi
      body="$(/usr/bin/docker run --rm --network botwork-internal \
        botwork/curl:local \
        --fail --silent --show-error \
        -H 'x-botwork-admin: true' \
        "http://api:9400/api/tenants/${id}" 2>/dev/null || true)"
      name="$(printf '%s' "${body}" | /usr/bin/jq -r '.name')"
      if [ "${name}" != "mcp" ]; then
        echo "GET /tenants/${id} returned name=${name} (expected mcp), body=${body}" >&2
        exit 1
      fi
    exit-status: 0

  # -- LIST workspaces (tenant-scoped): the tenant is implicit in the
  #    path layout. The ?tenant_id= query param is gone; pass the
  #    tenant name in the path and stamp x-botwork-tenant.
  api_lists_workspaces_filtered_by_tenant:
    timeout: 30000
    exec: |
      body="$(/usr/bin/docker run --rm --network botwork-internal \
        botwork/curl:local \
        --fail --silent --show-error \
        -H 'x-botwork-tenant: mcp' \
        http://api:9400/api/tenant/mcp/workspaces 2>/dev/null || true)"
      have_demo="$(printf '%s' "${body}" | /usr/bin/jq -r \
        '.items | map(.name) | index("demo") != null')"
      if [ "${have_demo}" != "true" ]; then
        echo "/api/tenant/mcp/workspaces did not include 'demo': ${body}" >&2
        exit 1
      fi
    exit-status: 0

  # -- LIST plugins: seed plugin 'echo' must be present.
  api_lists_plugins:
    timeout: 30000
    exec: |
      body="$(/usr/bin/docker run --rm --network botwork-internal \
        botwork/curl:local \
        --fail --silent --show-error \
        -H 'x-botwork-admin: true' \
        http://api:9400/api/plugins 2>/dev/null || true)"
      have_echo="$(printf '%s' "${body}" | /usr/bin/jq -r \
        '.items | map(.name) | index("echo") != null')"
      if [ "${have_echo}" != "true" ]; then
        echo "/plugins did not include seed plugin 'echo': ${body}" >&2
        exit 1
      fi
    exit-status: 0

  # -- LIST workspace_plugins: the seed binding ties (mcp, demo, echo);
  #    confirm at least one binding row exists, regardless of which
  #    workspace/plugin uuids the seed wound up with.
  api_lists_workspace_plugins:
    timeout: 30000
    exec: |
      body="$(/usr/bin/docker run --rm --network botwork-internal \
        botwork/curl:local \
        --fail --silent --show-error \
        -H 'x-botwork-tenant: mcp' \
        http://api:9400/api/tenant/mcp/workspace_plugins 2>/dev/null || true)"
      total="$(printf '%s' "${body}" | /usr/bin/jq -r '.total')"
      if [ -z "${total}" ] || [ "${total}" -lt 1 ]; then
        echo "/workspace_plugins returned no rows (total=${total}): ${body}" >&2
        exit 1
      fi
    exit-status: 0

  # -- 404 contract: a syntactically-valid-but-missing UUID returns the
  #    structured error envelope, not a 500 / empty body. Uses the
  #    nil UUID (all zeros) which can't collide with anything the
  #    seed produces.
  api_returns_404_for_missing_id:
    timeout: 30000
    exec: |
      status="$(/usr/bin/docker run --rm --network botwork-internal \
        botwork/curl:local \
        --silent --output /dev/null --write-out '%{http_code}' \
        -H 'x-botwork-admin: true' \
        http://api:9400/api/tenants/00000000-0000-0000-0000-000000000000 \
        2>/dev/null || true)"
      if [ "${status}" != "404" ]; then
        echo "GET /tenants/<missing-uuid> returned ${status} (expected 404)" >&2
        exit 1
      fi
    exit-status: 0

  # -- 400 contract: a garbage-uuid path param returns 400, not 404
  #    (request-shape errors are distinguishable from missing-row
  #    errors in the wire contract).
  api_returns_400_for_garbage_id:
    timeout: 30000
    exec: |
      status="$(/usr/bin/docker run --rm --network botwork-internal \
        botwork/curl:local \
        --silent --output /dev/null --write-out '%{http_code}' \
        -H 'x-botwork-admin: true' \
        http://api:9400/api/tenants/not-a-uuid \
        2>/dev/null || true)"
      if [ "${status}" != "400" ]; then
        echo "GET /tenants/<garbage> returned ${status} (expected 400)" >&2
        exit 1
      fi
    exit-status: 0

  # ── api session-read endpoints (RFE #106 PR4, botwork#131) ────────
  #
  # agent_session and session_worker are read-only on api:
  # session-broker writes them, api exposes them for ui's
  # "what's running right now?" view. PR4 adds 4 routes:
  #
  #   GET /api/tenant/{tenant}/agent_sessions[?state=&live=]
  #   GET /api/tenant/{tenant}/agent_sessions/{id}
  #   GET /api/tenant/{tenant}/session_workers[?agent_session_id=&plugin_id=&live=]
  #   GET /api/tenant/{tenant}/session_workers/{id}
  #
  # The vm-smoke seed does NOT spawn an agent session, so both list
  # endpoints answer "total: 0" on a fresh boot. That is still enough
  # to assert the routes exist + the wire shape is intact; the
  # rows-present case is covered by api's own integration tests
  # in ci.yml. The 400/404 probes do not need rows either — they
  # exercise the request-shape error paths.
  #
  # RFE #105 round-3 follow-up (this PR): the "rows-actually-get-seeded"
  # pair lives in a separate goss spec (`goss-seeded.yaml`) that runs
  # AFTER `echo-mcp-smoke` has spawned a live container. Putting them
  # here would fail every fresh-boot CI run, because base-goss runs
  # before any session has been spawned.

  api_lists_agent_sessions:
    timeout: 30000
    exec: |
      body="$(/usr/bin/docker run --rm --network botwork-internal \
        botwork/curl:local \
        --silent --fail \
        -H 'x-botwork-tenant: mcp' \
        http://api:9400/api/tenant/mcp/agent_sessions \
        2>/dev/null || true)"
      # Wire shape: { "items": [...], "total": N }. Fresh seed has no
      # agent_session rows; assert the envelope is present rather than
      # asserting a row count we would have to fabricate.
      if ! echo "${body}" | /usr/bin/grep -q '"items"'; then
        echo "GET /agent_sessions did not return an items envelope" >&2
        echo "got: ${body}" >&2
        exit 1
      fi
      if ! echo "${body}" | /usr/bin/grep -q '"total"'; then
        echo "GET /agent_sessions did not return a total field" >&2
        echo "got: ${body}" >&2
        exit 1
      fi
    exit-status: 0

  api_lists_session_workers:
    timeout: 30000
    exec: |
      body="$(/usr/bin/docker run --rm --network botwork-internal \
        botwork/curl:local \
        --silent --fail \
        -H 'x-botwork-tenant: mcp' \
        http://api:9400/api/tenant/mcp/session_workers \
        2>/dev/null || true)"
      if ! echo "${body}" | /usr/bin/grep -q '"items"'; then
        echo "GET /session_workers did not return an items envelope" >&2
        echo "got: ${body}" >&2
        exit 1
      fi
      if ! echo "${body}" | /usr/bin/grep -q '"total"'; then
        echo "GET /session_workers did not return a total field" >&2
        echo "got: ${body}" >&2
        exit 1
      fi
    exit-status: 0

  # `?live=` walks the partial UNIQUE index that gates
  # workers-per-(session, plugin). The filter shape itself is what
  # is being asserted — a regression that silently dropped the
  # `live` query parameter would return 200 without exercising the
  # filter, so we check the envelope is the expected zero-row shape.
  #
  # To stay insulated from real-world residue (mcp-echo-smoke
  # spawns a session_worker before this probe in the
  # loader-redeploy-sim re-run; the row legitimately survives the
  # broker restart because that is what the persistence layer is
  # FOR), we combine `live=true` with a non-existent
  # agent_session_id. Both filters AND together; the resulting
  # envelope MUST be empty regardless of what other workers exist
  # on the host.
  api_session_workers_accepts_live_filter:
    timeout: 30000
    exec: |
      missing=00000000-0000-0000-0000-000000000000
      url="http://api:9400/api/tenant/mcp/session_workers?live=true&agent_session_id=${missing}"
      body="$(/usr/bin/docker run --rm --network botwork-internal \
        botwork/curl:local --silent --fail \
        -H 'x-botwork-tenant: mcp' \
        "${url}" 2>/dev/null || true)"
      if ! echo "${body}" | /usr/bin/grep -q '"items":\[\]'; then
        echo "live+missing-agent-session filter did not return an empty items list" >&2
        echo "got: ${body}" >&2
        exit 1
      fi
      if ! echo "${body}" | /usr/bin/grep -q '"total":0'; then
        echo "live+missing-agent-session filter did not return total:0" >&2
        echo "got: ${body}" >&2
        exit 1
      fi
    exit-status: 0

  # 400 contract for the session reads — same shape as the tenant
  # variant above. Garbage UUID on a path param is a request-shape
  # error, not a missing-row error; api distinguishes them.
  api_agent_sessions_garbage_id_returns_400:
    timeout: 30000
    exec: |
      status="$(/usr/bin/docker run --rm --network botwork-internal \
        botwork/curl:local \
        --silent --output /dev/null --write-out '%{http_code}' \
        -H 'x-botwork-tenant: mcp' \
        http://api:9400/api/tenant/mcp/agent_sessions/not-a-uuid \
        2>/dev/null || true)"
      if [ "${status}" != "400" ]; then
        echo "GET /agent_sessions/<garbage> returned ${status} (expected 400)" >&2
        exit 1
      fi
    exit-status: 0

  # 404 contract: well-formed UUID for a row that does not exist.
  # Same envelope shape as the 400 case but different status — the
  # wire contract that distinguishes "bad shape" from "no row".
  api_session_workers_missing_id_returns_404:
    timeout: 30000
    exec: |
      status="$(/usr/bin/docker run --rm --network botwork-internal \
        botwork/curl:local \
        --silent --output /dev/null --write-out '%{http_code}' \
        -H 'x-botwork-tenant: mcp' \
        http://api:9400/api/tenant/mcp/session_workers/00000000-0000-0000-0000-000000000000 \
        2>/dev/null || true)"
      if [ "${status}" != "404" ]; then
        echo "GET /session_workers/<missing-uuid> returned ${status} (expected 404)" >&2
        exit 1
      fi
    exit-status: 0

  # ── api write endpoints (RFE #106 PR3) ────────────────────────────
  #
  # PR3 adds POST/PUT/DELETE handlers, delete-guards with named
  # dependents, optimistic locking via `updated_at`, the live-state
  # gate against control-plane on workspace_plugin mutations, and the
  # extended error envelope (`validation_failed` / `has_dependents`
  # / `stale_write` / `already_exists` / `unavailable`).
  #
  # The probes below run AFTER the read probes (sequential goss
  # ordering) and are written to be idempotent against the seed:
  # any tenant/workspace/plugin/binding created here is deleted in
  # the same probe. The seed tenant/workspace/plugin/binding
  # (mcp/demo/echo) is exercised ONLY through guard probes that
  # expect a 409 (so the seed is never mutated). Downstream
  # mcp-echo-smoke continues to see the seed it expects.
  #
  # Wire convention: every probe captures body + status from a single
  # curl by appending `\n%{http_code}` to the response. We split with
  # `tail -n1` for the status and `head -n -1` for the body. This
  # avoids docker bind-mounts (curlimages/curl runs as `curl_user`
  # uid 100, which can't write to a root-owned mktemp dir) and keeps
  # each probe a single self-contained block. Matches the shape the
  # PR2 read probes have always used.

  # -- CREATE tenant: POST returns 201, GET round-trips, DELETE returns
  #    204. Proves the write path is wired and the response shape
  #    matches the contract.
  api_create_tenant_round_trips_then_deletes:
    timeout: 60000
    exec: |
      base=http://api:9400/api
      resp="$(/usr/bin/docker run --rm --network botwork-internal \
        botwork/curl:local \
        --silent --show-error --write-out '\n%{http_code}' \
        -H 'x-botwork-admin: true' \
        -H 'content-type: application/json' \
        -X POST "${base}/tenants" \
        --data '{"name": "goss-tenant"}' 2>/dev/null || true)"
      status="$(printf '%s' "${resp}" | tail -n1)"
      body="$(printf '%s' "${resp}" | head -n -1)"
      if [ "${status}" != "201" ]; then
        echo "POST /tenants returned ${status} (expected 201): ${body}" >&2
        exit 1
      fi
      id="$(printf '%s' "${body}" | /usr/bin/jq -r '.id')"
      if [ -z "${id}" ] || [ "${id}" = "null" ]; then
        echo "POST /tenants response missing id: ${body}" >&2
        exit 1
      fi
      name="$(/usr/bin/docker run --rm --network botwork-internal \
        botwork/curl:local --fail --silent --show-error \
        -H 'x-botwork-admin: true' \
        "${base}/tenants/${id}" 2>/dev/null | /usr/bin/jq -r '.name')"
      if [ "${name}" != "goss-tenant" ]; then
        echo "GET /tenants/${id} returned name=${name} (expected goss-tenant)" >&2
        exit 1
      fi
      del_status="$(/usr/bin/docker run --rm --network botwork-internal \
        botwork/curl:local \
        --silent --output /dev/null --write-out '%{http_code}' \
        -H 'x-botwork-admin: true' \
        -X DELETE "${base}/tenants/${id}" 2>/dev/null || true)"
      if [ "${del_status}" != "204" ]; then
        echo "DELETE /tenants/${id} returned ${del_status} (expected 204)" >&2
        exit 1
      fi
    exit-status: 0

  # -- 422 contract: invalid tenant name → validation_failed (NOT
  #    bad_request). Pins the distinction between "you typed the
  #    JSON wrong" (400) and "the field doesn't satisfy the rule"
  #    (422).
  api_rejects_invalid_tenant_name_with_422:
    timeout: 30000
    exec: |
      base=http://api:9400/api
      resp="$(/usr/bin/docker run --rm --network botwork-internal \
        botwork/curl:local \
        --silent --show-error --write-out '\n%{http_code}' \
        -H 'x-botwork-admin: true' \
        -H 'content-type: application/json' \
        -X POST "${base}/tenants" \
        --data '{"name": "Has Spaces"}' 2>/dev/null || true)"
      status="$(printf '%s' "${resp}" | tail -n1)"
      body="$(printf '%s' "${resp}" | head -n -1)"
      if [ "${status}" != "422" ]; then
        echo "POST /tenants invalid name returned ${status} (expected 422): ${body}" >&2
        exit 1
      fi
      err="$(printf '%s' "${body}" | /usr/bin/jq -r '.error')"
      if [ "${err}" != "validation_failed" ]; then
        echo "envelope error=${err} (expected validation_failed): ${body}" >&2
        exit 1
      fi
    exit-status: 0

  # -- 400 contract: unknown body field → bad_request (proves
  #    deny_unknown_fields wired through). Distinct from 422 above.
  api_rejects_unknown_tenant_field_with_400:
    timeout: 30000
    exec: |
      base=http://api:9400/api
      resp="$(/usr/bin/docker run --rm --network botwork-internal \
        botwork/curl:local \
        --silent --show-error --write-out '\n%{http_code}' \
        -H 'x-botwork-admin: true' \
        -H 'content-type: application/json' \
        -X POST "${base}/tenants" \
        --data '{"name": "goss-typo", "naem": "x"}' 2>/dev/null || true)"
      status="$(printf '%s' "${resp}" | tail -n1)"
      body="$(printf '%s' "${resp}" | head -n -1)"
      if [ "${status}" != "400" ]; then
        echo "POST /tenants unknown field returned ${status} (expected 400): ${body}" >&2
        exit 1
      fi
      err="$(printf '%s' "${body}" | /usr/bin/jq -r '.error')"
      if [ "${err}" != "bad_request" ]; then
        echo "envelope error=${err} (expected bad_request): ${body}" >&2
        exit 1
      fi
    exit-status: 0

  # -- 409 stale_write: PUT with a wrong if_unmodified_since must
  #    return 409 stale_write. Creates a throwaway tenant, mutates
  #    with a stale lock, asserts, then cleans up.
  api_update_with_stale_lock_returns_409_stale_write:
    timeout: 60000
    exec: |
      base=http://api:9400/api
      cresp="$(/usr/bin/docker run --rm --network botwork-internal \
        botwork/curl:local \
        --silent --show-error --write-out '\n%{http_code}' \
        -H 'x-botwork-admin: true' \
        -H 'content-type: application/json' \
        -X POST "${base}/tenants" \
        --data '{"name": "goss-stale"}' 2>/dev/null || true)"
      cbody="$(printf '%s' "${cresp}" | head -n -1)"
      id="$(printf '%s' "${cbody}" | /usr/bin/jq -r '.id')"
      if [ -z "${id}" ] || [ "${id}" = "null" ]; then
        echo "could not create throwaway tenant: ${cbody}" >&2
        exit 1
      fi
      presp="$(/usr/bin/docker run --rm --network botwork-internal \
        botwork/curl:local \
        --silent --show-error --write-out '\n%{http_code}' \
        -H 'x-botwork-admin: true' \
        -H 'content-type: application/json' \
        -X PUT "${base}/tenants/${id}" \
        --data '{"name": "goss-stale2", "if_unmodified_since": "2000-01-01T00:00:00Z"}' \
        2>/dev/null || true)"
      pstatus="$(printf '%s' "${presp}" | tail -n1)"
      pbody="$(printf '%s' "${presp}" | head -n -1)"
      # Clean up FIRST so a mid-probe failure can't leak the row.
      /usr/bin/docker run --rm --network botwork-internal \
        botwork/curl:local --silent --output /dev/null \
        -H 'x-botwork-admin: true' \
        -X DELETE "${base}/tenants/${id}" >/dev/null 2>&1 || true
      if [ "${pstatus}" != "409" ]; then
        echo "stale PUT returned ${pstatus} (expected 409): ${pbody}" >&2
        exit 1
      fi
      err="$(printf '%s' "${pbody}" | /usr/bin/jq -r '.error')"
      if [ "${err}" != "stale_write" ]; then
        echo "envelope error=${err} (expected stale_write): ${pbody}" >&2
        exit 1
      fi
    exit-status: 0

  # -- 409 has_dependents on seed tenant: DELETE 'mcp' must refuse
  #    because 'demo' workspace is bound. Envelope must include a
  #    dependents array naming the workspace.
  api_delete_seed_tenant_blocks_with_has_dependents:
    timeout: 30000
    exec: |
      base=http://api:9400/api
      list="$(/usr/bin/docker run --rm --network botwork-internal \
        botwork/curl:local --fail --silent --show-error \
        -H 'x-botwork-admin: true' \
        "${base}/tenants" 2>/dev/null || true)"
      id="$(printf '%s' "${list}" | /usr/bin/jq -r \
        '.items[] | select(.name == "mcp") | .id')"
      if [ -z "${id}" ] || [ "${id}" = "null" ]; then
        echo "seed tenant 'mcp' not found in /tenants" >&2
        exit 1
      fi
      resp="$(/usr/bin/docker run --rm --network botwork-internal \
        botwork/curl:local \
        --silent --show-error --write-out '\n%{http_code}' \
        -H 'x-botwork-admin: true' \
        -X DELETE "${base}/tenants/${id}" 2>/dev/null || true)"
      status="$(printf '%s' "${resp}" | tail -n1)"
      body="$(printf '%s' "${resp}" | head -n -1)"
      if [ "${status}" != "409" ]; then
        echo "DELETE seed tenant returned ${status} (expected 409): ${body}" >&2
        exit 1
      fi
      err="$(printf '%s' "${body}" | /usr/bin/jq -r '.error')"
      have_demo="$(printf '%s' "${body}" | /usr/bin/jq -r \
        '.dependents | map(.name) | index("demo") != null')"
      if [ "${err}" != "has_dependents" ] || [ "${have_demo}" != "true" ]; then
        echo "envelope error=${err} have-demo=${have_demo}: ${body}" >&2
        exit 1
      fi
    exit-status: 0

  # -- 409 has_dependents on seed plugin: DELETE 'echo' must refuse
  #    because (mcp, demo, echo) binding still exists.
  api_delete_seed_plugin_blocks_with_named_bindings:
    timeout: 30000
    exec: |
      base=http://api:9400/api
      list="$(/usr/bin/docker run --rm --network botwork-internal \
        botwork/curl:local --fail --silent --show-error \
        -H 'x-botwork-admin: true' \
        "${base}/plugins" 2>/dev/null || true)"
      id="$(printf '%s' "${list}" | /usr/bin/jq -r \
        '.items[] | select(.name == "echo") | .id')"
      if [ -z "${id}" ] || [ "${id}" = "null" ]; then
        echo "seed plugin 'echo' not found in /plugins" >&2
        exit 1
      fi
      resp="$(/usr/bin/docker run --rm --network botwork-internal \
        botwork/curl:local \
        --silent --show-error --write-out '\n%{http_code}' \
        -H 'x-botwork-admin: true' \
        -X DELETE "${base}/plugins/${id}" 2>/dev/null || true)"
      status="$(printf '%s' "${resp}" | tail -n1)"
      body="$(printf '%s' "${resp}" | head -n -1)"
      if [ "${status}" != "409" ]; then
        echo "DELETE seed plugin returned ${status} (expected 409): ${body}" >&2
        exit 1
      fi
      err="$(printf '%s' "${body}" | /usr/bin/jq -r '.error')"
      have_mcp_demo="$(printf '%s' "${body}" | /usr/bin/jq -r \
        '[.dependents[] | select(.tenant == "mcp" and .workspace == "demo")] | length > 0')"
      if [ "${err}" != "has_dependents" ] || [ "${have_mcp_demo}" != "true" ]; then
        echo "envelope error=${err} have-mcp-demo=${have_mcp_demo}: ${body}" >&2
        exit 1
      fi
    exit-status: 0

  # -- 422 on plugin POST: admin-core rejects a plugin spec missing
  #    the required `egress` field. Proves the validator is wired
  #    AND the envelope surfaces the missing field name.
  api_create_plugin_without_egress_returns_422:
    timeout: 30000
    exec: |
      base=http://api:9400/api
      resp="$(/usr/bin/docker run --rm --network botwork-internal \
        botwork/curl:local \
        --silent --show-error --write-out '\n%{http_code}' \
        -H 'x-botwork-admin: true' \
        -H 'content-type: application/json' \
        -X POST "${base}/plugins" \
        --data '{"name": "goss-plug-noegress", "image": "ghcr.io/example/p:1.0"}' \
        2>/dev/null || true)"
      status="$(printf '%s' "${resp}" | tail -n1)"
      body="$(printf '%s' "${resp}" | head -n -1)"
      if [ "${status}" != "422" ]; then
        echo "POST /plugins missing egress returned ${status} (expected 422): ${body}" >&2
        exit 1
      fi
      err="$(printf '%s' "${body}" | /usr/bin/jq -r '.error')"
      mentions_egress="$(printf '%s' "${body}" | /usr/bin/jq -r \
        '.message | tostring | test("egress"; "i")')"
      if [ "${err}" != "validation_failed" ] || [ "${mentions_egress}" != "true" ]; then
        echo "envelope error=${err} mentions-egress=${mentions_egress}: ${body}" >&2
        exit 1
      fi
    exit-status: 0

  # -- End-to-end live-state gate: CREATE tenant/workspace/plugin/
  #    binding, then DELETE the binding. The gate runs against
  #    control-plane: GET /sessions for the (goss-cp, goss-cp-ws,
  #    goss-cp-plug) triple finds zero matches, the DB commits,
  #    and we get 204. Proves:
  #      1. api can reach control-plane via the
  #         `control_plane` alias on botwork-internal,
  #      2. control-plane responds to GET /sessions,
  #      3. the empty-session-set case is the success path,
  #      4. the rollback-on-5xx guard only fires on actual 5xx.
  api_delete_binding_runs_live_state_gate_against_control_plane:
    timeout: 60000
    exec: |
      base=http://api:9400/api
      post_admin() {
        local path="$1" data="$2"
        local r
        r="$(/usr/bin/docker run --rm --network botwork-internal \
          botwork/curl:local \
          --silent --show-error --fail \
          -H 'x-botwork-admin: true' \
          -H 'content-type: application/json' \
          -X POST "${base}${path}" \
          --data "${data}" 2>/dev/null || true)"
        printf '%s' "${r}" | /usr/bin/jq -r '.id // .workspace_id // empty'
      }
      post_tenant() {
        local path="$1" data="$2" tname="$3"
        local r
        r="$(/usr/bin/docker run --rm --network botwork-internal \
          botwork/curl:local \
          --silent --show-error --fail \
          -H "x-botwork-tenant: ${tname}" \
          -H 'content-type: application/json' \
          -X POST "${base}${path}" \
          --data "${data}" 2>/dev/null || true)"
        printf '%s' "${r}" | /usr/bin/jq -r '.id // .workspace_id // empty'
      }
      tid="$(post_admin /tenants '{"name": "goss-cp"}')"
      if [ -z "${tid}" ]; then
        echo "create tenant failed" >&2; exit 1
      fi
      wid="$(post_tenant /tenant/goss-cp/workspaces '{"name": "goss-cp-ws"}' goss-cp)"
      if [ -z "${wid}" ]; then
        echo "create workspace failed" >&2; exit 1
      fi
      pid="$(post_admin /plugins \
        '{"name": "goss-cp-plug", "image": "ghcr.io/example/p:1.0", "egress": "none"}')"
      if [ -z "${pid}" ]; then
        echo "create plugin failed" >&2; exit 1
      fi
      # Binding insert (composite-PK; no single 'id' field returned).
      /usr/bin/docker run --rm --network botwork-internal \
        botwork/curl:local \
        --silent --show-error --fail \
        -H 'x-botwork-tenant: goss-cp' \
        -H 'content-type: application/json' \
        -X POST "${base}/tenant/goss-cp/workspace_plugins" \
        --data "{\"workspace_id\": \"${wid}\", \"plugin_id\": \"${pid}\"}" \
        >/dev/null 2>&1 || { echo "create binding failed" >&2; exit 1; }
      # DELETE binding — runs the live-state gate against control-plane.
      dresp="$(/usr/bin/docker run --rm --network botwork-internal \
        botwork/curl:local \
        --silent --show-error --write-out '\n%{http_code}' \
        -H 'x-botwork-tenant: goss-cp' \
        -X DELETE "${base}/tenant/goss-cp/workspace_plugins/${wid}/${pid}" 2>/dev/null || true)"
      del_status="$(printf '%s' "${dresp}" | tail -n1)"
      del_body="$(printf '%s' "${dresp}" | head -n -1)"
      # Cleanup BEFORE assertions so leftovers can't poison
      # downstream probes if this one fails.
      /usr/bin/docker run --rm --network botwork-internal \
        botwork/curl:local --silent --output /dev/null \
        -H 'x-botwork-admin: true' \
        -X DELETE "${base}/plugins/${pid}" >/dev/null 2>&1 || true
      /usr/bin/docker run --rm --network botwork-internal \
        botwork/curl:local --silent --output /dev/null \
        -H 'x-botwork-tenant: goss-cp' \
        -X DELETE "${base}/tenant/goss-cp/workspaces/${wid}" >/dev/null 2>&1 || true
      /usr/bin/docker run --rm --network botwork-internal \
        botwork/curl:local --silent --output /dev/null \
        -H 'x-botwork-admin: true' \
        -X DELETE "${base}/tenants/${tid}" >/dev/null 2>&1 || true
      if [ "${del_status}" != "204" ]; then
        echo "DELETE binding gate returned ${del_status} expected 204" >&2
        printf '%s\n' "${del_body}" >&2
        echo "api journal:" >&2
        /usr/bin/docker logs botwork-api --tail 30 >&2 || true
        echo "control-plane journal:" >&2
        /usr/bin/docker logs botwork-control-plane --tail 30 >&2 || true
        exit 1
      fi
    exit-status: 0

  # ── ui end-to-end probes (RFE #106 follow-up) ──────────────────────
  # The killer signals that ui converged end-to-end inside the
  # baked VM. Same shape as the api probes above: a curl from a
  # sibling container on the same docker network gets the expected
  # response. This proves that:
  #
  #   1. the image loaded + the systemd unit started cleanly,
  #   2. the listener bound 0.0.0.0:9500 on the `ui` alias,
  #   3. the trunk-built bundle is actually embedded in the binary
  #      (the /admin/ probe greps for a marker string that only
  #      appears when include_dir! saw a populated dist/).
  #
  # ui has no published port — same trust-boundary posture as
  # api. The eventual operator-facing exposure comes from the
  # ingress envoy adding `/admin/*` (UI) + `/api/*` (JSON) routes
  # in front of the existing ext_authz seam (separate overlay PR).
  ui_healthz_responds:
    timeout: 60000
    exec: |
      i=0
      while [ "$i" -lt 30 ]; do
        body="$(/usr/bin/docker run --rm --network botwork-internal \
          botwork/curl:local \
          --fail --silent --show-error \
          http://ui:9500/healthz 2>/dev/null || true)"
        if printf '%s' "${body}" | grep -q '"status":"ok"'; then
          exit 0
        fi
        i=$((i + 1))
        sleep 1
      done
      echo "ui /healthz did not respond with the contract shape" >&2
      /usr/bin/docker logs botwork-ui --tail 50 >&2 || true
      exit 1
    exit-status: 0

  # /admin/ must return the trunk-built shell, not 404. The
  # in-include_dir! bundle is the production fail-mode this catches:
  # if `trunk build --release` didn't run before `cargo build` in the
  # image's Dockerfile (or didn't produce a populated dist/), the
  # server binary still compiles but /admin/ 404s. The grep on the
  # page <title> + the trunk loader marker would then surface as the
  # specific named failure here rather than a vague "operator can't
  # reach the panel".
  ui_admin_root_serves_bundle:
    timeout: 30000
    exec: |
      body="$(/usr/bin/docker run --rm --network botwork-internal \
        botwork/curl:local \
        --fail --silent --show-error \
        http://ui:9500/admin/ 2>/dev/null || true)"
      if [ -z "${body}" ]; then
        echo "empty body from /admin/" >&2
        /usr/bin/docker logs botwork-ui --tail 50 >&2 || true
        exit 1
      fi
      printf '%s' "${body}" | grep -q "botwork admin"
      printf '%s' "${body}" | grep -q "data-trunk"
    exit-status: 0

  # /admin/ sub-resources must serve through ui under the
  # `/admin/` prefix. The bug this catches:
  #
  # Trunk's default `public_url` is `/`. The rendered `index.html` then
  # references its wasm-bindgen JS loader and the `.wasm` blob with
  # root-relative paths (`<link rel="modulepreload" href="/foo.js">`).
  # The HTML shell itself still loads at `/admin/` and the existing
  # probe above is happy, but the browser then requests `/foo.js` —
  # which the ui server doesn't have (it only registers
  # `/admin/*rest`) and which the ingress envoy `/admin/*` route
  # doesn't match (the request falls through to the catch-all MCP
  # route → ext_authz → 401). The operator sees a blank panel and
  # `NS_ERROR_CORRUPTED_CONTENT` in the network panel.
  #
  # We parse the JS + wasm hrefs out of the rendered HTML, assert both
  # start with `/admin/`, then curl each through the `ui` alias
  # and check status + content-type. This is the in-VM mirror of the
  # ui sub-resource smoke in botwork's containers.yml; the
  # space/envoy mirror lives in space/test/goss-payload.yaml.
  ui_bundle_subresources_under_admin_prefix:
    timeout: 30000
    exec: |
      body="$(/usr/bin/docker run --rm --network botwork-internal \
        botwork/curl:local \
        --fail --silent --show-error \
        http://ui:9500/admin/ 2>/dev/null || true)"
      if [ -z "${body}" ]; then
        echo "empty body from /admin/" >&2
        /usr/bin/docker logs botwork-ui --tail 50 >&2 || true
        exit 1
      fi

      js_url="$(printf '%s' "${body}" \
        | grep -oE 'href="[^"]+\.js"' \
        | head -1 \
        | sed -E 's/^href="([^"]+)"$/\1/')"
      if [ -z "${js_url}" ]; then
        echo "could not find a JS bundle href in /admin/ body" >&2
        printf '%s\n' "${body}" >&2
        exit 1
      fi
      case "${js_url}" in
        /admin/*) ;;
        *)
          echo "JS bundle href ${js_url} is not /admin/-prefixed" >&2
          echo "this means the ui image was built without public_url = \"/admin/\"" >&2
          exit 1
          ;;
      esac

      wasm_url="$(printf '%s' "${body}" \
        | grep -oE 'href="[^"]+\.wasm"' \
        | head -1 \
        | sed -E 's/^href="([^"]+)"$/\1/')"
      if [ -z "${wasm_url}" ]; then
        echo "could not find a wasm preload href in /admin/ body" >&2
        printf '%s\n' "${body}" >&2
        exit 1
      fi
      case "${wasm_url}" in
        /admin/*) ;;
        *)
          echo "wasm preload href ${wasm_url} is not /admin/-prefixed" >&2
          echo "this means the ui image was built without public_url = \"/admin/\"" >&2
          exit 1
          ;;
      esac

      # JS loader: 200 + JS-ish content-type. We dump headers to
      # stdout and discard the body — the JS payload is noisy and we
      # only care about the contract.
      hdrs="$(/usr/bin/docker run --rm --network botwork-internal \
        botwork/curl:local \
        --fail --silent --show-error --dump-header - --output /dev/null \
        "http://ui:9500${js_url}" 2>/dev/null || true)"
      if [ -z "${hdrs}" ]; then
        echo "no response from ${js_url} via ui" >&2
        /usr/bin/docker logs botwork-ui --tail 50 >&2 || true
        exit 1
      fi
      printf '%s' "${hdrs}" \
        | tr -d '\r' \
        | awk -F': ' 'tolower($1)=="content-type"{print tolower($2)}' \
        | grep -Eq '^(application/javascript|text/javascript)'

      # wasm blob: 200 + application/wasm.
      hdrs="$(/usr/bin/docker run --rm --network botwork-internal \
        botwork/curl:local \
        --fail --silent --show-error --dump-header - --output /dev/null \
        "http://ui:9500${wasm_url}" 2>/dev/null || true)"
      if [ -z "${hdrs}" ]; then
        echo "no response from ${wasm_url} via ui" >&2
        /usr/bin/docker logs botwork-ui --tail 50 >&2 || true
        exit 1
      fi
      printf '%s' "${hdrs}" \
        | tr -d '\r' \
        | awk -F': ' 'tolower($1)=="content-type"{print tolower($2)}' \
        | grep -q '^application/wasm$'
    exit-status: 0
