user:
  debian:
    exists: true
  bot:
    exists: true
    shell: /bin/bash
    groups:
    - bot
    - docker

package:
  git:
    installed: true
  curl:
    installed: true
  ca-certificates:
    installed: true
  python3:
    installed: true
  python3-venv:
    installed: true
  jq:
    installed: true
  openssh-server:
    installed: true
  docker-ce:
    installed: true

service:
  ssh:
    enabled: true
  docker:
    enabled: true
  botwork-image-loader:
    enabled: true
  botwork-network:
    enabled: true
  # ── Persistence layer (RFE 97 / botwork #97) ─────────────────────────────
  # botwork-db-init renders the random POSTGRES_PASSWORD +
  # BOTWORK_DATABASE_URL into /var/lib/botwork-db/secret.env on first boot;
  # botwork-postgres runs the long-lived DB container; botwork-db-migrate
  # is a oneshot (RemainAfterExit=yes) that runs `Migrator::up` against
  # the empty migrations vec, which still creates the seaql_migrations
  # bookkeeping table — the on-disk evidence asserted further down.
  botwork-db-init:
    enabled: true
  botwork-postgres:
    enabled: true
  botwork-db-migrate:
    enabled: true
  botwork-launcher:
    enabled: true
  botwork-config-broker:
    enabled: true
  botwork-control-plane:
    enabled: true
  botwork-session-broker:
    enabled: true
  botwork-envoy:
    enabled: true

file:
  /etc/botwork/plugins.yaml:
    exists: true
    filetype: file
  /usr/local/bin/botwork-launcher:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0755"
  /usr/local/bin/botwork-tools:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0755"
  # First-boot image loader: the script + its baked tarballs must both be
  # present so `botwork-image-loader.service` is self-contained on every
  # boot (no network fetch).
  /usr/local/sbin/botwork-image-loader:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0755"
  /usr/share/botwork/images/session-broker.tar:
    exists: true
    filetype: file
  /usr/share/botwork/images/config-broker.tar:
    exists: true
    filetype: file
  /usr/share/botwork/images/control-plane.tar:
    exists: true
    filetype: file
  /usr/share/botwork/images/db-migrate.tar:
    exists: true
    filetype: file
  /usr/share/botwork/images/postgres.tar:
    exists: true
    filetype: file
  /usr/share/botwork/images/mcp-echo.tar:
    exists: true
    filetype: file
  # botwork-db-init's script — paired with the unit; runs every boot.
  /usr/local/sbin/botwork-db-init:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0755"
  /etc/systemd/system/botwork-launcher.socket:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0644"
  /etc/systemd/system/botwork-config-broker.service:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0644"
  /etc/systemd/system/botwork-control-plane.service:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0644"

command:
  docker-images-local-mcp:
    exec: /usr/bin/docker image ls
    exit-status: 0
    stdout:
    - botwork/mcp-echo

  docker-images-mcp-echo:
    exec: /usr/bin/docker image inspect botwork/mcp-echo:local
    exit-status: 0

  docker-images-config-broker:
    exec: /usr/bin/docker image inspect botwork/config-broker:local
    exit-status: 0

  docker-images-session-broker:
    exec: /usr/bin/docker image inspect botwork/session-broker:local
    exit-status: 0

  docker-images-control-plane:
    exec: /usr/bin/docker image inspect botwork/control-plane:local
    exit-status: 0

  # Persistence-layer images (RFE 97). db-migrate is built from
  # botwork's db/migration crate; postgres is the upstream
  # postgres:16-bookworm digest pinned in shasset.yaml. Both are
  # retagged to botwork/<svc>:local by the image-loader so the
  # systemd units reference a stable local tag.
  docker-images-db-migrate:
    exec: /usr/bin/docker image inspect botwork/db-migrate:local
    exit-status: 0

  docker-images-postgres:
    exec: /usr/bin/docker image inspect botwork/postgres:local
    exit-status: 0

  # ── Service-state diagnostics ─────────────────────────────────────────────
  # When the topology assertions further down fail, goss tells us only that
  # `docker network inspect` didn't list a container we expected. These
  # checks fire *first* so the failure output captures the actual state of
  # each unit + container at goss-time -- which is the difference between
  # "service crashed and is in restart loop" and "service is fine but
  # took 31s to settle and we lost the race".
  #
  # All four are EXPECTED TO PASS in a healthy boot; they fail only when
  # the underlying service is in trouble, and the goss diff in the failure
  # then names the unit + state directly.

  systemd_config_broker_active:
    exec: /bin/systemctl is-active botwork-config-broker.service
    exit-status: 0
    stdout:
    - active

  systemd_control_plane_active:
    exec: /bin/systemctl is-active botwork-control-plane.service
    exit-status: 0
    stdout:
    - active

  systemd_session_broker_active:
    exec: /bin/systemctl is-active botwork-session-broker.service
    exit-status: 0
    stdout:
    - active

  systemd_envoy_active:
    exec: /bin/systemctl is-active botwork-envoy.service
    exit-status: 0
    stdout:
    - active

  # Persistence-layer units (RFE 97). db-init is a oneshot with
  # RemainAfterExit=yes so its "active" state pins the env-file having
  # been rendered; postgres is the long-lived DB; db-migrate is another
  # oneshot whose "active" state is the killer signal that Migrator::up
  # exited 0.
  systemd_db_init_active:
    exec: /bin/systemctl is-active botwork-db-init.service
    exit-status: 0
    stdout:
    - active

  systemd_postgres_active:
    exec: /bin/systemctl is-active botwork-postgres.service
    exit-status: 0
    stdout:
    - active

  systemd_db_migrate_active:
    exec: /bin/systemctl is-active botwork-db-migrate.service
    exit-status: 0
    stdout:
    - active

  # docker ps view: each of the four broker containers + envoy should
  # appear in the running set. Captures the case where systemd thinks the
  # unit is active but the container under it has exited or is in a
  # restart loop (config-broker parse failure → docker run exits 1 →
  # systemd Restart= cycles forever). `docker ps -a` is used so we *also*
  # see exited containers in the goss diagnostic output -- which is the
  # one diagnostic that would distinguish "never started" from "crashed
  # immediately".
  #
  # No --format flag here: goss renders this file as a go-template before
  # YAML parse, so any literal double-open-brace anywhere in the file
  # (including comments -- yes, even this one) trips the templater with
  # errors like "unexpected <docker> in operand". The default
  # `docker ps -a` table layout puts the name in the final column, which
  # `stdout:` patterns match cleanly.
  containers_running:
    exec: /usr/bin/docker ps -a
    exit-status: 0
    stdout:
    - "botwork-config-broker"
    - "botwork-control-plane"
    - "botwork-envoy"
    - "botwork-postgres"
    - "botwork-session-broker"


  # ── Network topology assertions ────────────────────────────────────────────
  # PR1 of the network split (vm#84) introduces a two-network topology:
  #   botwork-internal  – brokers only
  #   botwork-plugin    – spawned plugin sessions; envoy bridges the two
  # Each assertion below pins one corner of the topology so a future change
  # that collapses, renames, or re-attaches a container surfaces as a single
  # failing check rather than a smoke-test mystery.

  docker_network_internal_exists:
    exec: /usr/bin/docker network inspect botwork-internal
    exit-status: 0

  docker_network_plugin_exists:
    exec: /usr/bin/docker network inspect botwork-plugin
    exit-status: 0

  # The legacy single network must NOT exist post-rename; a stale
  # `botwork` network would silently keep old configs working and mask
  # split regressions.
  docker_network_legacy_botwork_absent:
    exec: /usr/bin/docker network inspect botwork
    exit-status: 1

  # Brokers must be reachable on botwork-internal *only* — never on
  # botwork-plugin. We pipe `docker network inspect` JSON into `jq -e`
  # rather than using docker's `-f` go-template flag, because goss
  # renders the entire gossfile as a go-template (against its TmplVars
  # context) BEFORE parsing it as YAML. That means any literal
  # double-curly-brace pair anywhere in this file — even inside a
  # `#`-prefixed YAML comment, since the templater runs on raw text —
  # is parsed as a template action and fails with errors like
  # "can't evaluate field Containers in type *goss.TmplVars" or
  # "unexpected <.> in operand". So: no double-curly-brace pairs
  # anywhere in this file, comments included.
  config_broker_on_internal_network:
    exec: |
      /usr/bin/docker network inspect botwork-internal \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-config-broker")'
    exit-status: 0

  session_broker_on_internal_network:
    exec: |
      /usr/bin/docker network inspect botwork-internal \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-session-broker")'
    exit-status: 0

  config_broker_not_on_plugin_network:
    # `index` returns null when absent; `| not` flips that to true, and
    # `jq -e` then exits 0. If present, `index` returns the numeric
    # position, `not` flips it to false, and jq exits non-zero.
    exec: |
      /usr/bin/docker network inspect botwork-plugin \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-config-broker") | not'
    exit-status: 0

  # session-broker MUST be on botwork-plugin: it needs DNS+TCP
  # reachability to spawned `mcp_session_<token>` containers (those
  # live on botwork-plugin) to run its cold-start readiness probe
  # (`probe_ready` in launcher.rs). Without this, every first request
  # to a plugin times out as a 504 because the probe can't connect.
  #
  # Note this is an asymmetric crossing: session-broker initiates to
  # plugin sessions, but plugin sessions must NOT be able to initiate
  # back to session-broker (no `--network-alias session_broker` on the
  # plugin side, and PR3 enforces this with iptables). config-broker
  # stays internal-only because nothing on the plugin side needs to
  # reach it.
  session_broker_on_plugin_network:
    exec: |
      /usr/bin/docker network inspect botwork-plugin \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-session-broker")'
    exit-status: 0

  # control-plane must be reachable on botwork-internal only -- it is
  # consumed by session-broker (on both networks) and by the future
  # egress-envoy (on internal), and nothing on the plugin network
  # initiates to it. Same posture as config-broker.
  control_plane_on_internal_network:
    exec: |
      /usr/bin/docker network inspect botwork-internal \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-control-plane")'
    exit-status: 0

  control_plane_not_on_plugin_network:
    exec: |
      /usr/bin/docker network inspect botwork-plugin \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-control-plane") | not'
    exit-status: 0

  # envoy is the only allowed crossing: it MUST appear on both networks.
  envoy_on_internal_network:
    exec: |
      /usr/bin/docker network inspect botwork-internal \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-envoy")'
    exit-status: 0

  envoy_on_plugin_network:
    exec: |
      /usr/bin/docker network inspect botwork-plugin \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-envoy")'
    exit-status: 0

  # Envoy admin port must be bound to loopback only; the public ingress
  # (8080) stays on 0.0.0.0. `docker port` prints `<container-port>/tcp ->
  # <host-bind>:<host-port>` lines we can grep.
  envoy_admin_bound_to_loopback:
    exec: /usr/bin/docker port botwork-envoy 9901/tcp
    exit-status: 0
    stdout:
    - "127.0.0.1:9901"

  envoy_admin_not_on_wildcard:
    exec: |
      set -e
      if /usr/bin/docker port botwork-envoy 9901/tcp | grep -q '^0\.0\.0\.0:'; then
        exit 1
      fi
      exit 0
    exit-status: 0

  envoy_public_ingress_on_wildcard:
    exec: /usr/bin/docker port botwork-envoy 8080/tcp
    exit-status: 0
    stdout:
    - "0.0.0.0:8080"

  # Launcher must announce its default plugin network via environment, since
  # botwork 0.1.4 makes BOTWORK_LAUNCHER_DEFAULT_NETWORK a required env var.
  # `systemctl show -p Environment` returns the resolved environment block.
  launcher_default_network_env_set:
    exec: /usr/bin/systemctl show -p Environment botwork-launcher.service
    exit-status: 0
    stdout:
    - BOTWORK_LAUNCHER_DEFAULT_NETWORK=botwork-plugin

  # Assert the rust session-broker reached the point of binding its gRPC
  # listener on 0.0.0.0:9001. We grep its own startup log line rather than
  # TCP-probing, because:
  #   - the broker image has no shell tools (no python, no nc, no bash);
  #   - goss runs `exec:` via /bin/sh, so bash-only features like `[[ ]]`
  #     and `</dev/tcp/...` cannot be used reliably here;
  #   - the broker is on botwork-internal with no host port-publish, so
  #     probing from the host needs network discovery.
  # The log line below is emitted by the broker the moment it starts
  # serving, which is exactly what this check is meant to verify.
  session_broker_listens_on_9001:
    timeout: 30000
    exec: |
      i=0
      while [ "$i" -lt 40 ]; do
        if docker logs botwork-session-broker 2>&1 \
            | grep -q 'starting gRPC ext_proc service on 0.0.0.0:9001'; then
          exit 0
        fi
        i=$((i + 1))
        sleep 0.5
      done
      exit 1
    exit-status: 0

  # config-broker emits its bind log immediately after parsing plugins.yaml,
  # so passing this also doubles as evidence that the registry parse
  # succeeded (a parse error makes config-broker exit before the bind log
  # is emitted, since `build_app_state` runs before `bind_from_env`).
  # Same image-tooling caveats as session-broker apply.
  config_broker_listens_on_9200:
    timeout: 30000
    exec: |
      i=0
      while [ "$i" -lt 40 ]; do
        if docker logs botwork-config-broker 2>&1 \
            | grep -q 'starting on 0\.0\.0\.0:9200'; then
          exit 0
        fi
        i=$((i + 1))
        sleep 0.5
      done
      exit 1
    exit-status: 0

  # session-broker logs its resolved config-broker endpoint at startup; this
  # confirms env-var + default agree and the value session-broker will
  # actually call points at the alias config-broker registers.
  session_broker_logs_config_broker_endpoint:
    timeout: 30000
    exec: |
      i=0
      while [ "$i" -lt 40 ]; do
        if docker logs botwork-session-broker 2>&1 \
            | grep -q 'config-broker endpoint: http://config_broker:9200'; then
          exit 0
        fi
        i=$((i + 1))
        sleep 0.5
      done
      exit 1
    exit-status: 0

  # control-plane emits two bind logs immediately after constructing the
  # router and the xDS gRPC service. Passing both proves the image started
  # cleanly (and -- since `main.rs` exits non-zero on bind failure for
  # either transport -- that both ports are actually bound and reachable
  # at 0.0.0.0:9300 / 0.0.0.0:9301 from inside the container).
  #
  # Wording changed in botwork 0.2.1 (control-plane xDS landed):
  # the "starting on 0.0.0.0:9300" log split into "starting HTTP …" +
  # "starting xDS gRPC …" once the binary started two transports.
  # Pinning both forms here so a future revert of either is a fail-fast.
  #
  # Same shell-tooling caveat as config-broker / session-broker applies.
  control_plane_listens_on_9300:
    timeout: 30000
    exec: |
      i=0
      while [ "$i" -lt 40 ]; do
        if docker logs botwork-control-plane 2>&1 \
            | grep -q 'starting HTTP on 0\.0\.0\.0:9300'; then
          exit 0
        fi
        i=$((i + 1))
        sleep 0.5
      done
      exit 1
    exit-status: 0

  # New in botwork 0.2.1: control-plane runs a second listener for the
  # ADS / xDS gRPC service consumed by the (future) egress envoy. Same
  # trust boundary as 9300; both alias as `control_plane` on
  # botwork-internal. The egress envoy bootstrap (lands in a follow-up
  # vm PR for cycle 2B) pins `control_plane:9301` as its
  # api_config_source endpoint, so a missing or moved 9301 bind would
  # surface there as a silent "envoy never gets a Listener pushed";
  # this assertion fires loudly at boot time instead.
  control_plane_listens_on_9301_xds:
    timeout: 30000
    exec: |
      i=0
      while [ "$i" -lt 40 ]; do
        if docker logs botwork-control-plane 2>&1 \
            | grep -q 'starting xDS gRPC on 0\.0\.0\.0:9301'; then
          exit 0
        fi
        i=$((i + 1))
        sleep 0.5
      done
      exit 1
    exit-status: 0

  # control-plane's cold-start recovery sync (botwork 0.1.8+, see #87)
  # polls session-broker's `GET /control-plane/sessions` admin endpoint
  # before binding. The success log is what proves both halves work:
  #
  #   * session-broker's admin server was reachable on the alias the
  #     env var defaults to (`http://session_broker:9002`),
  #   * the response parsed against the agreed wire shape,
  #   * control-plane is starting with a known (possibly empty) store,
  #     not the silent "empty by guess" mode that would break the
  #     future xDS feeder.
  #
  # Fresh-deploy boot has zero live sessions, so we expect the count
  # to be 0 here. Long timeout (40 × 1s) because the recovery retry
  # interval is 5s in production and we want at least one attempt to
  # land cleanly before failing.
  control_plane_recovery_sync_completed:
    timeout: 60000
    exec: |
      i=0
      while [ "$i" -lt 60 ]; do
        if docker logs botwork-control-plane 2>&1 \
            | grep -q 'cold-start recovery complete: 0 session(s) seeded'; then
          exit 0
        fi
        i=$((i + 1))
        sleep 1
      done
      exit 1
    exit-status: 0

  # session-broker logs its resolved control-plane endpoint at startup
  # alongside the config-broker one; this confirms the new
  # BOTWORK_CONTROL_PLANE_ENDPOINT env var defaulting agrees with the
  # alias control-plane registers. Without this, a typo in the default
  # would only surface on the first spawn (as a hard-gate 503), which
  # is much harder to debug than a missing log line at boot.
  session_broker_logs_control_plane_endpoint:
    timeout: 30000
    exec: |
      i=0
      while [ "$i" -lt 40 ]; do
        if docker logs botwork-session-broker 2>&1 \
            | grep -q 'control-plane endpoint: http://control_plane:9300'; then
          exit 0
        fi
        i=$((i + 1))
        sleep 0.5
      done
      exit 1
    exit-status: 0

  # botwork 0.1.9+ (#88) makes `egress:` mandatory on every plugin in
  # plugins.yaml -- config-broker refuses to start without it. Catch
  # missing-egress entries on disk before the broker does so the failure
  # names the plugin instead of bubbling up as a service-failed-to-start
  # in the journal. The valid forms (`all`, `none`, `{ allow: [...] }`)
  # are validated by config-broker itself; here we only assert presence.
  plugins_registry_every_plugin_has_egress:
    exec: |
      python3 - <<'PY'
      import pathlib, sys, yaml
      payload = yaml.safe_load(
          pathlib.Path('/etc/botwork/plugins.yaml').read_text(encoding='utf-8')
      )
      plugins = (payload.get('plugins') or {})
      missing = [name for name, entry in plugins.items()
                 if isinstance(entry, dict) and 'egress' not in entry]
      if missing:
          print(f"plugins missing required 'egress:' field: {missing}", file=sys.stderr)
          sys.exit(1)
      sys.exit(0)
      PY
    exit-status: 0

  # plugins-base.yaml must declare a non-empty `config:` block on echo so
  # the smoke test downstream can assert that config injection actually
  # flowed through. This catches the regression where someone trims the
  # fixture back to a bare `image: …` entry.
  plugins_registry_echo_has_config:
    exec: |
      python3 - <<'PY'
      import pathlib, yaml, sys
      payload = yaml.safe_load(
          pathlib.Path('/etc/botwork/plugins.yaml').read_text(encoding='utf-8')
      )
      cfg = ((payload.get('plugins') or {}).get('echo') or {}).get('config') or {}
      sys.exit(0 if cfg.get('vm_smoke_marker') == 'vm-base-config-injection-ok' else 1)
      PY
    exit-status: 0

  # plugins.yaml MUST NOT carry an explicit `network:` field on any plugin
  # entry: botwork 0.1.4 dropped per-plugin network membership in favour of
  # BOTWORK_LAUNCHER_DEFAULT_NETWORK, and config-broker now rejects entries
  # that still set it. This assertion fails fast (before runtime) on any
  # fixture that has drifted.
  plugins_registry_no_per_plugin_network:
    exec: |
      python3 - <<'PY'
      import pathlib, yaml, sys
      payload = yaml.safe_load(
          pathlib.Path('/etc/botwork/plugins.yaml').read_text(encoding='utf-8')
      )
      plugins = (payload.get('plugins') or {})
      offenders = [name for name, entry in plugins.items()
                   if isinstance(entry, dict) and 'network' in entry]
      if offenders:
          print(f"plugins with stale 'network:' field: {offenders}", file=sys.stderr)
          sys.exit(1)
      sys.exit(0)
      PY
    exit-status: 0

  # Payload-agnostic: the base image ships an echo-only registry and the
  # overlay bootstrap expands it to the full plugin set, so we only assert
  # the file is a well-formed `plugins:` mapping rather than its contents.
  # Positive assertions about the expanded registry live in the downstream
  # (botwork) goss-payload spec.
  plugins_registry_yaml_valid:
    exec: |
      python3 - <<'PY'
      import pathlib, sys, yaml
      raw = pathlib.Path('/etc/botwork/plugins.yaml').read_text(encoding='utf-8')
      payload = yaml.safe_load(raw)
      ok = isinstance(payload, dict) and isinstance(payload.get('plugins'), dict)
      sys.exit(0 if ok else 1)
      PY
    exit-status: 0

  # ── Egress envoy (botwork-launcher 0.2.2+ / cycle 2B) ─────────────────────
  # The egress envoy is the forward proxy plugin containers route their
  # outbound HTTP through. It bridges botwork-plugin (where plugins reach
  # it via the `egress_envoy:3128` alias) to the upstream world via the
  # dynamic_forward_proxy cluster, with RBAC pushed dynamically by
  # control-plane over ADS. Assertions here pin the four wire-contract
  # pieces:
  #   1. the systemd unit + container are alive,
  #   2. the dual-network attachment with alias on botwork-plugin only,
  #   3. the launcher unit is configured to inject HTTPS_PROXY pointing
  #      at us,
  #   4. envoy successfully completed its ADS handshake against
  #      control-plane (the LDS push log is what proves the bootstrap +
  #      control-plane wire shape are in agreement).
  #
  # The iptables lockdown block lives further down -- egress envoy first,
  # because it's the half plugins use cooperatively; iptables is the half
  # that makes the cooperative path the only possible path.

  systemd_egress_envoy_active:
    exec: /bin/systemctl is-active botwork-egress-envoy.service
    exit-status: 0
    stdout:
    - active

  containers_egress_envoy_running:
    exec: /usr/bin/docker ps
    exit-status: 0
    stdout:
    - "botwork-egress-envoy"

  egress_envoy_on_plugin_network:
    exec: |
      /usr/bin/docker network inspect botwork-plugin \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-egress-envoy")'
    exit-status: 0

  # The envoy joins botwork-internal too (so it can dial
  # control_plane:9301 for ADS), but ASYMMETRICALLY: alias only on the
  # plugin network. The alias presence check below confirms the
  # asymmetric attachment landed correctly.
  egress_envoy_on_internal_network:
    exec: |
      /usr/bin/docker network inspect botwork-internal \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-egress-envoy")'
    exit-status: 0

  # `egress_envoy` MUST resolve on botwork-plugin (that's how plugin
  # containers reach it). The alias is set via --network-alias on the
  # initial docker create, which only takes effect on the network the
  # container is created with.
  #
  # We pull this from `docker inspect <container>` rather than `docker
  # network inspect <net>` because aliases live on the container
  # endpoint object (`.NetworkSettings.Networks.<net>.Aliases`), not
  # on the network's Containers list (which only has Name / IP /
  # MAC). The first iteration of this check used the network-side
  # query and was always empty -- failed in CI on PR1.
  #
  # The bracket form `["botwork-plugin"]` is required because jq
  # can't dot-index a key with a hyphen. Same trick as the launcher's
  # docker-inspect format string -- we worked around the equivalent
  # Go-template gotcha in botwork #86.
  egress_envoy_alias_resolves_on_plugin:
    exec: |
      /usr/bin/docker inspect botwork-egress-envoy \
        | /usr/bin/jq -e '.[0].NetworkSettings.Networks["botwork-plugin"].Aliases | index("egress_envoy")'
    exit-status: 0

  # Admin port: same loopback discipline as the ingress envoy. Operator
  # debug via SSH tunnel only; never on the LAN. The CONNECT proxy port
  # (3128) is NOT --publish'd at all (plugins reach it via docker alias,
  # not via the host).
  egress_envoy_admin_bound_to_loopback:
    exec: /usr/bin/docker port botwork-egress-envoy 9902/tcp
    exit-status: 0
    stdout:
    - "127.0.0.1:9902"

  egress_envoy_admin_not_on_wildcard:
    exec: |
      set -e
      if /usr/bin/docker port botwork-egress-envoy 9902/tcp | grep -q '^0\.0\.0\.0:'; then
        exit 1
      fi
      exit 0
    exit-status: 0

  # 3128 must NOT show up in `docker port` output at all (we don't
  # publish it). `docker port <name> <port>` exits non-zero when the
  # port isn't published, which is exactly the result we want.
  egress_envoy_proxy_port_not_published:
    exec: /usr/bin/docker port botwork-egress-envoy 3128/tcp
    exit-status: 1

  # botwork-launcher 0.2.2+ accepts BOTWORK_LAUNCHER_EGRESS_PROXY=<url>
  # and injects HTTPS_PROXY / HTTP_PROXY / NO_PROXY into every spawned
  # plugin container. The vm-side wiring is to set the env on the
  # launcher's systemd unit pointing at the docker alias the egress
  # envoy registers (`egress_envoy:3128`). Missing this env would
  # silently break enforcement -- plugins would still talk directly
  # to the world even though the iptables DROP would catch most of it,
  # so assert it at boot.
  launcher_egress_proxy_env_set:
    exec: /usr/bin/systemctl show -p Environment botwork-launcher.service
    exit-status: 0
    stdout:
    - BOTWORK_LAUNCHER_EGRESS_PROXY=http://egress_envoy:3128

  # The control-plane xDS log line that proves the ADS handshake
  # completed and a Listener was pushed to the egress envoy. The grep
  # is on the control-plane container's log rather than envoy's because
  # the envoy image has no shell tools (no nc/curl/python); docker logs
  # work uniformly. control-plane's xds.rs logs "push LDS to <peer>"
  # for every push; if envoy never connects, this never fires.
  #
  # Long-ish timeout because the envoy → control-plane handshake
  # happens after BOTH containers are up and envoy has parsed its
  # bootstrap. 40 × 1s = 40s budget.
  control_plane_logged_lds_push_to_egress_envoy:
    timeout: 60000
    exec: |
      i=0
      while [ "$i" -lt 40 ]; do
        if docker logs botwork-control-plane 2>&1 \
            | grep -q 'push LDS to'; then
          exit 0
        fi
        i=$((i + 1))
        sleep 1
      done
      exit 1
    exit-status: 0

  # ── Egress iptables lockdown ──────────────────────────────────────────────
  # The egress envoy is the cooperative path: plugins that honour
  # HTTPS_PROXY route through it. The iptables rules below are the
  # enforced path: a plugin that does `curl --noproxy '*'` or anything
  # else that ignores the env var hits DROP at the bridge regardless.
  # Together they make the egress envoy the ONLY way out for plugin
  # traffic, and incidentally prevent inter-plugin communication and
  # plugin → broker callbacks.
  #
  # The unit installs four rules (see firstboot/botwork-egress-iptables);
  # we check the systemd state + the presence of each rule's
  # distinguishing match in `iptables -L` output.

  systemd_egress_iptables_active:
    exec: /bin/systemctl is-active botwork-egress-iptables.service
    exit-status: 0
    stdout:
    - active

  # Rule 1: 169.254.169.254 (cloud metadata) DROP. Applies everywhere,
  # not just the plugin bridge -- if a future container is wired up
  # with weird permissions, this remains the floor.
  iptables_blocks_cloud_metadata:
    exec: /usr/sbin/iptables -L DOCKER-USER -n
    exit-status: 0
    stdout:
    - "DROP"
    - "169.254.169.254"

  # Rules 2-4: scoped to the plugin bridge. We grep the bridge prefix
  # `br-` because the trailing 12-char id is generated by docker and
  # would make the assertion brittle if we hard-coded it. Both ACCEPT
  # (for the egress envoy IP / RELATED,ESTABLISHED) and DROP must be
  # present.
  iptables_plugin_bridge_rules_present:
    exec: /usr/sbin/iptables -L DOCKER-USER -n -v
    exit-status: 0
    stdout:
    - "br-"
    - "DROP"
    - "ACCEPT"

  # Conntrack rule for response packets to envoy-initiated MCP
  # connections (ingress envoy reaching into a plugin via ext_proc).
  # Without it the catch-all plugin-side DROP would also drop these
  # response packets, breaking the MCP flow.
  iptables_conntrack_related_established_present:
    exec: |
      /usr/sbin/iptables -L DOCKER-USER -n -v \
        | grep -q 'RELATED,ESTABLISHED'
    exit-status: 0

  # ── DB readiness + topology + on-disk evidence (RFE 97) ────────────────────
  # These assertions are the killer signal that the persistence-layer
  # boot chain converged end-to-end inside the baked VM:
  #
  #   1. The secret env-file exists with the right perms (db-init ran).
  #   2. postgres is reachable on the docker network and accepts the
  #      credential.
  #   3. `seaql_migrations` exists in public schema (db-migrate ran
  #      Migrator::up against postgres, and the bookkeeping table is
  #      the on-disk evidence — even with an empty migrations vec).
  #   4. postgres is on botwork-internal only (same trust-boundary
  #      posture as config-broker / control-plane: nothing on the
  #      plugin network should ever see the DB).

  db_secret_env_present_and_mode:
    exec: |
      set -e
      f=/var/lib/botwork-db/secret.env
      [ -f "${f}" ] || { echo "missing ${f}" >&2; exit 1; }
      perms="$(stat -c '%a %U %G' "${f}")"
      [ "${perms}" = "600 root root" ] || { echo "unexpected perms: ${perms}" >&2; exit 1; }
      grep -q '^POSTGRES_PASSWORD=' "${f}"
      grep -q '^BOTWORK_DATABASE_URL=postgres://botwork:' "${f}"
    exit-status: 0

  # postgres accepts connections under the rendered credential. We
  # don't grep `docker logs` here because the official postgres image
  # produces verbose log lines that may not include the exact "ready
  # to accept connections" string across versions; `pg_isready`
  # against the running container is the contract.
  postgres_accepts_connections:
    timeout: 60000
    exec: |
      i=0
      while [ "$i" -lt 30 ]; do
        if docker exec botwork-postgres pg_isready -U botwork -d botwork >/dev/null 2>&1; then
          exit 0
        fi
        i=$((i + 1))
        sleep 1
      done
      exit 1
    exit-status: 0

  postgres_on_internal_network:
    exec: |
      /usr/bin/docker network inspect botwork-internal \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-postgres")'
    exit-status: 0

  postgres_not_on_plugin_network:
    exec: |
      /usr/bin/docker network inspect botwork-plugin \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-postgres") | not'
    exit-status: 0

  # postgres MUST NOT publish 5432 to the host (same posture as every
  # other broker; the docker network is the trust boundary). `docker
  # port` exits non-zero when the port isn't published, which is
  # exactly the result we want — mirror the egress envoy's proxy
  # port assertion.
  postgres_not_published_to_host:
    exec: /usr/bin/docker port botwork-postgres 5432/tcp
    exit-status: 1

  # The on-disk proof that botwork-db-migrate.service actually
  # connected, ran Migrator::up, and committed the seaql_migrations
  # tracking table. If any of (db-init wrote the env, postgres came
  # up, db-migrate could authenticate, sea-orm-migration's first-run
  # path executed) is broken, this assertion is the one that says so
  # in one line. Mirrors botwork's containers.yml smoke for db-migrate
  # so the cargo-side and image-side proofs are the same shape.
  seaql_migrations_table_exists:
    exec: |
      result="$(docker exec botwork-postgres psql -U botwork -d botwork -tAc \
        "SELECT to_regclass('public.seaql_migrations')")"
      [ "${result}" = "seaql_migrations" ]
    exit-status: 0
