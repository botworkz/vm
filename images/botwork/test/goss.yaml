user:
  debian:
    exists: true
  bot:
    exists: true
    shell: /bin/bash
    groups:
    - bot
    - docker

package:
  git:
    installed: true
  curl:
    installed: true
  ca-certificates:
    installed: true
  python3:
    installed: true
  jq:
    installed: true
  openssh-server:
    installed: true
  unattended-upgrades:
    installed: true
  docker-ce:
    installed: true

service:
  ssh:
    enabled: true
  unattended-upgrades:
    enabled: true
  docker:
    enabled: true
  botwork-image-loader:
    enabled: true
  botwork-network:
    enabled: true
  # ── Persistence layer (RFE 97 / botwork #97) ─────────────────────────────
  # botwork-db-init renders the random POSTGRES_PASSWORD +
  # BOTWORK_DATABASE_URL into /var/lib/botwork-db/secret.env on first boot;
  # botwork-postgres runs the long-lived DB container; botwork-db-migrate
  # is a oneshot (RemainAfterExit=yes) that runs `Migrator::up` against
  # the empty migrations vec, which still creates the seaql_migrations
  # bookkeeping table — the on-disk evidence asserted further down.
  botwork-db-init:
    enabled: true
  botwork-postgres:
    enabled: true
  botwork-db-migrate:
    enabled: true
  # RFE #106 PR4 (botwork#118 + this PR): replaces botwork-bootstrap
  # with a host-side oneshot that calls `botwork-tools bootstrap`
  # against api. Same yaml shape, same idempotent-upsert
  # semantics; the write side now goes through HTTP+JSON instead
  # of sea-orm-directly.
  botwork-import:
    enabled: true
  botwork-api:
    enabled: true
  botwork-ui:
    enabled: true
  botwork-launcher:
    enabled: true
  botwork-config-broker:
    enabled: true
  botwork-control-plane:
    enabled: true
  botwork-session-broker:
    enabled: true
  botwork-envoy:
    enabled: true
  botwork-network-ingress:
    enabled: true
  botwork-envoy-frontdoor:
    enabled: true

file:
  /etc/botwork/bootstrap.yaml:
    exists: true
    filetype: file
  /etc/botwork/envoy/frontdoor/envoy.yaml:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0644"
  /etc/botwork/envoy/frontdoor/bootstrap_extensions.yaml:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0644"
  /etc/botwork/envoy/frontdoor/lds/listener.yaml:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0644"
  /etc/botwork/envoy/frontdoor/lds/active.yaml:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0644"
  /etc/botwork/envoy/frontdoor/cds/clusters.yaml:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0644"
  /etc/botwork/envoy/frontdoor/rds/active.yaml:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0644"
  /etc/botwork/envoy/frontdoor/modules:
    exists: true
    filetype: directory
    owner: root
    group: root
    mode: "0755"
  /etc/botwork/envoy/frontdoor/sds:
    exists: true
    filetype: directory
    owner: root
    group: root
    mode: "0755"
  /etc/botwork/envoy/frontdoor/sds/active.yaml:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0644"
  /etc/botwork/envoy/frontdoor/sds/placeholder.cert.pem:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0644"
  /etc/botwork/envoy/frontdoor/sds/placeholder.key.pem:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0644"
  /var/lib/botwork/frontdoor/acme:
    exists: true
    filetype: directory
  /etc/apt/apt.conf.d/52botwork-unattended-upgrades:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0644"
  /usr/local/bin/botwork-launcher:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0755"
  /usr/local/bin/botwork-tools:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0755"
  # First-boot image loader: the script + its baked tarballs must both be
  # present so `botwork-image-loader.service` is self-contained on every
  # boot (no network fetch).
  /usr/local/sbin/botwork-image-loader:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0755"
  /usr/share/botwork/images/session-broker.tar:
    exists: true
    filetype: file
  /usr/share/botwork/images/config-broker.tar:
    exists: true
    filetype: file
  /usr/share/botwork/images/control-plane.tar:
    exists: true
    filetype: file
  /usr/share/botwork/images/db-migrate.tar:
    exists: true
    filetype: file
  # RFE #106 PR4 (botwork#118 + this PR): bootstrap.tar retires
  # alongside the legacy bootstrap container. The host-side
  # `botwork-import.service` replaces it with `botwork-tools bootstrap`.
  /usr/share/botwork/images/api.tar:
    exists: true
    filetype: file
  # ui image tarball (RFE #106 follow-up). Loaded by the
  # image-loader oneshot like every other broker image.
  /usr/share/botwork/images/ui.tar:
    exists: true
    filetype: file
  /usr/share/botwork/images/postgres.tar:
    exists: true
    filetype: file
  /usr/share/botwork/images/mcp-echo.tar:
    exists: true
    filetype: file
  # curl baked so the api goss probes can `docker run … botwork/curl:local`
  # without pulling docker.io live (intermittent Docker Hub anonymous-token
  # 404s were the source of the recent main-branch flake).
  /usr/share/botwork/images/curl.tar:
    exists: true
    filetype: file
  # botwork-db-init's script — paired with the unit; runs every boot.
  /usr/local/sbin/botwork-db-init:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0755"
  /etc/systemd/system/botwork-launcher.socket:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0644"
  /etc/systemd/system/botwork-config-broker.service:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0644"
  /etc/systemd/system/botwork-control-plane.service:
    exists: true
    filetype: file
    owner: root
    group: root
    mode: "0644"

command:
  systemd_apt_daily_timer_enabled:
    exec: /bin/systemctl is-enabled apt-daily.timer
    exit-status: 0
    stdout:
    - enabled
  systemd_apt_daily_upgrade_timer_enabled:
    exec: /bin/systemctl is-enabled apt-daily-upgrade.timer
    exit-status: 0
    stdout:
    - enabled
  docker-images-local-mcp:
    exec: /usr/bin/docker image ls
    exit-status: 0
    stdout:
    - botwork/mcp-echo

  docker-images-mcp-echo:
    exec: /usr/bin/docker image inspect botwork/mcp-echo:local
    exit-status: 0

  docker-images-config-broker:
    exec: /usr/bin/docker image inspect botwork/config-broker:local
    exit-status: 0

  docker-images-session-broker:
    exec: /usr/bin/docker image inspect botwork/session-broker:local
    exit-status: 0

  docker-images-control-plane:
    exec: /usr/bin/docker image inspect botwork/control-plane:local
    exit-status: 0

  # Persistence-layer images (RFE 97). db-migrate is built from
  # botwork's db/migration crate; postgres is the upstream
  # postgres:16-bookworm digest pinned in shasset.yaml. Both are
  # retagged to botwork/<svc>:local by the image-loader so the
  # systemd units reference a stable local tag.
  docker-images-db-migrate:
    exec: /usr/bin/docker image inspect botwork/db-migrate:local
    exit-status: 0

  # bootstrap image probe retired under RFE #106 PR4 (botwork#118 +
  # this PR): the host-side `botwork-import.service` calls
  # `botwork-tools bootstrap` against api, so the bootstrap
  # container no longer ships and there is no botwork/bootstrap:local
  # tag to assert.

  # api image (RFE #106 PR1). Same retag-to-:local posture as
  # the other broker images; the systemd unit pins
  # botwork/api:local so this assertion catches a missed
  # image-loader entry or a broken shasset digest in one line.
  docker-images-api:
    exec: /usr/bin/docker image inspect botwork/api:local
    exit-status: 0

  # ui image (RFE #106 follow-up). Same retag-to-:local posture
  # as the other broker images; the systemd unit pins
  # botwork/ui:local so this assertion catches a missed
  # image-loader entry or a broken shasset digest in one line.
  docker-images-ui:
    exec: /usr/bin/docker image inspect botwork/ui:local
    exit-status: 0

  docker-images-postgres:
    exec: /usr/bin/docker image inspect botwork/postgres:local
    exit-status: 0

  # ── Service-state diagnostics ─────────────────────────────────────────────
  # When the topology assertions further down fail, goss tells us only that
  # `docker network inspect` didn't list a container we expected. These
  # checks fire *first* so the failure output captures the actual state of
  # each unit + container at goss-time -- which is the difference between
  # "service crashed and is in restart loop" and "service is fine but
  # took 31s to settle and we lost the race".
  #
  # All four are EXPECTED TO PASS in a healthy boot; they fail only when
  # the underlying service is in trouble, and the goss diff in the failure
  # then names the unit + state directly.

  systemd_config_broker_active:
    exec: /bin/systemctl is-active botwork-config-broker.service
    exit-status: 0
    stdout:
    - active

  systemd_control_plane_active:
    exec: /bin/systemctl is-active botwork-control-plane.service
    exit-status: 0
    stdout:
    - active

  systemd_session_broker_active:
    exec: /bin/systemctl is-active botwork-session-broker.service
    exit-status: 0
    stdout:
    - active

  systemd_envoy_active:
    exec: /bin/systemctl is-active botwork-envoy.service
    exit-status: 0
    stdout:
    - active

  # Persistence-layer units (RFE 97). db-init is a oneshot with
  # RemainAfterExit=yes so its "active" state pins the env-file having
  # been rendered; postgres is the long-lived DB; db-migrate is another
  # oneshot whose "active" state is the killer signal that Migrator::up
  # exited 0.
  systemd_db_init_active:
    exec: /bin/systemctl is-active botwork-db-init.service
    exit-status: 0
    stdout:
    - active

  systemd_postgres_active:
    exec: /bin/systemctl is-active botwork-postgres.service
    exit-status: 0
    stdout:
    - active

  systemd_db_migrate_active:
    exec: /bin/systemctl is-active botwork-db-migrate.service
    exit-status: 0
    stdout:
    - active

  # RFE #106 PR4 (botwork#118 + this PR): botwork-bootstrap.service
  # retires in favour of botwork-import.service. The new unit is also
  # `Type=oneshot RemainAfterExit=yes`, so "active" is the killer
  # signal that `botwork-tools bootstrap` completed exit 0 against
  # api. A failed import means /etc/botwork/bootstrap.yaml has
  # validation issues, api was unreachable, or a row got
  # rejected mid-apply — all surface as unit failure.
  systemd_import_active:
    exec: /bin/systemctl is-active botwork-import.service
    exit-status: 0
    stdout:
    - active

  # api (RFE #106 PR1). Long-running server with Restart=always,
  # so "active" here is the killer signal that the binary started
  # cleanly (connected to postgres, bound 0.0.0.0:9400, didn't die).
  # The end-to-end /api/health probe lives further down.
  systemd_api_active:
    exec: /bin/systemctl is-active botwork-api.service
    exit-status: 0
    stdout:
    - active

  # ui (RFE #106 follow-up). Long-running server with
  # Restart=always, so "active" here is the killer signal that the
  # binary started cleanly (bound 0.0.0.0:9500, no DB connection
  # needed). The end-to-end /healthz + /admin/ probes live further
  # down.
  systemd_ui_active:
    exec: /bin/systemctl is-active botwork-ui.service
    exit-status: 0
    stdout:
    - active

  # docker ps view: each of the four broker containers + envoy should
  # appear in the running set. Captures the case where systemd thinks the
  # unit is active but the container under it has exited or is in a
  # restart loop (config-broker parse failure → docker run exits 1 →
  # systemd Restart= cycles forever). `docker ps -a` is used so we *also*
  # see exited containers in the goss diagnostic output -- which is the
  # one diagnostic that would distinguish "never started" from "crashed
  # immediately".
  #
  # No --format flag here: goss renders this file as a go-template before
  # YAML parse, so any literal double-open-brace anywhere in the file
  # (including comments -- yes, even this one) trips the templater with
  # errors like "unexpected <docker> in operand". The default
  # `docker ps -a` table layout puts the name in the final column, which
  # `stdout:` patterns match cleanly.
  containers_running:
    exec: /usr/bin/docker ps -a
    exit-status: 0
    stdout:
    - "botwork-api"
    - "botwork-ui"
    - "botwork-config-broker"
    - "botwork-control-plane"
    - "botwork-envoy"
    - "botwork-postgres"
    - "botwork-session-broker"
    - "botwork-envoy-frontdoor"


  # ── Network topology assertions ────────────────────────────────────────────
  # PR1 of the network split (vm#84) introduces a two-network topology:
  #   botwork-internal  – brokers only
  #   botwork-plugin    – spawned plugin sessions; envoy bridges the two
  # Each assertion below pins one corner of the topology so a future change
  # that collapses, renames, or re-attaches a container surfaces as a single
  # failing check rather than a smoke-test mystery.

  docker_network_internal_exists:
    exec: /usr/bin/docker network inspect botwork-internal
    exit-status: 0

  docker_network_plugin_exists:
    exec: /usr/bin/docker network inspect botwork-plugin
    exit-status: 0

  docker_network_ingress_exists:
    exec: /usr/bin/docker network inspect botwork-ingress
    exit-status: 0

  # The legacy single network must NOT exist post-rename; a stale
  # `botwork` network would silently keep old configs working and mask
  # split regressions.
  docker_network_legacy_botwork_absent:
    exec: /usr/bin/docker network inspect botwork
    exit-status: 1

  # Brokers must be reachable on botwork-internal *only* — never on
  # botwork-plugin. We pipe `docker network inspect` JSON into `jq -e`
  # rather than using docker's `-f` go-template flag, because goss
  # renders the entire gossfile as a go-template (against its TmplVars
  # context) BEFORE parsing it as YAML. That means any literal
  # double-curly-brace pair anywhere in this file — even inside a
  # `#`-prefixed YAML comment, since the templater runs on raw text —
  # is parsed as a template action and fails with errors like
  # "can't evaluate field Containers in type *goss.TmplVars" or
  # "unexpected <.> in operand". So: no double-curly-brace pairs
  # anywhere in this file, comments included.
  config_broker_on_internal_network:
    exec: |
      /usr/bin/docker network inspect botwork-internal \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-config-broker")'
    exit-status: 0

  session_broker_on_internal_network:
    exec: |
      /usr/bin/docker network inspect botwork-internal \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-session-broker")'
    exit-status: 0

  config_broker_not_on_plugin_network:
    # `index` returns null when absent; `| not` flips that to true, and
    # `jq -e` then exits 0. If present, `index` returns the numeric
    # position, `not` flips it to false, and jq exits non-zero.
    exec: |
      /usr/bin/docker network inspect botwork-plugin \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-config-broker") | not'
    exit-status: 0

  # session-broker MUST be on botwork-plugin: it needs DNS+TCP
  # reachability to spawned `mcp_session_<token>` containers (those
  # live on botwork-plugin) to run its cold-start readiness probe
  # (`probe_ready` in launcher.rs). Without this, every first request
  # to a plugin times out as a 504 because the probe can't connect.
  #
  # Note this is an asymmetric crossing: session-broker initiates to
  # plugin sessions, but plugin sessions must NOT be able to initiate
  # back to session-broker (no `--network-alias session_broker` on the
  # plugin side, and PR3 enforces this with iptables). config-broker
  # stays internal-only because nothing on the plugin side needs to
  # reach it.
  session_broker_on_plugin_network:
    exec: |
      /usr/bin/docker network inspect botwork-plugin \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-session-broker")'
    exit-status: 0

  # control-plane must be reachable on botwork-internal only -- it is
  # consumed by session-broker (on both networks) and by the future
  # egress-envoy (on internal), and nothing on the plugin network
  # initiates to it. Same posture as config-broker.
  control_plane_on_internal_network:
    exec: |
      /usr/bin/docker network inspect botwork-internal \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-control-plane")'
    exit-status: 0

  # api joins botwork-internal only (RFE #106 PR1). Same posture
  # as config-broker / control-plane: nothing on the plugin network
  # needs to reach it, and the eventual operator-facing exposure goes
  # through the ingress envoy's ext_authz seam (separate overlay PR).
  api_on_internal_network:
    exec: |
      /usr/bin/docker network inspect botwork-internal \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-api")'
    exit-status: 0

  api_not_on_plugin_network:
    exec: |
      /usr/bin/docker network inspect botwork-plugin \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-api") | not'
    exit-status: 0

  # api MUST NOT publish 9400 to the host (same posture as every
  # other broker). The eventual operator-facing exposure comes from
  # the ingress envoy adding an `/api/*` route; api itself
  # stays behind the docker network until that overlay lands.
  api_not_published_to_host:
    exec: /usr/bin/docker port botwork-api 9400/tcp
    exit-status: 1

  # ui joins botwork-internal only (RFE #106 follow-up). Same
  # posture as api / config-broker / control-plane: nothing on
  # the plugin network needs to reach the operator-facing chrome, and
  # the eventual external exposure goes through the ingress envoy's
  # ext_authz seam (separate overlay PR).
  ui_on_internal_network:
    exec: |
      /usr/bin/docker network inspect botwork-internal \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-ui")'
    exit-status: 0

  ui_not_on_plugin_network:
    exec: |
      /usr/bin/docker network inspect botwork-plugin \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-ui") | not'
    exit-status: 0

  # ui MUST NOT publish 9500 to the host. Same posture as
  # api: the trust boundary is the docker network and the
  # eventual operator-facing exposure comes from the ingress envoy
  # adding `/admin/*` (UI) and `/api/*` (JSON) routes in front
  # of the existing ext_authz seam.
  ui_not_published_to_host:
    exec: /usr/bin/docker port botwork-ui 9500/tcp
    exit-status: 1

  control_plane_not_on_plugin_network:
    exec: |
      /usr/bin/docker network inspect botwork-plugin \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-control-plane") | not'
    exit-status: 0

  # envoy is the only allowed crossing: it MUST appear on both networks.
  envoy_on_internal_network:
    exec: |
      /usr/bin/docker network inspect botwork-internal \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-envoy")'
    exit-status: 0

  envoy_on_plugin_network:
    exec: |
      /usr/bin/docker network inspect botwork-plugin \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-envoy")'
    exit-status: 0

  # Ingress envoy admin port is NOT published to the host (no more 9901 host-publish).
  # Reachable only via `docker exec`. Assert docker port returns exit 1.
  envoy_admin_not_published_to_host:
    exec: /usr/bin/docker port botwork-envoy 9901/tcp
    exit-status: 1

  # Ingress envoy 8080 is NOT published to the host (frontdoor is now the only
  # public-facing port). Assert docker port returns exit 1.
  envoy_ingress_port_not_published_to_host:
    exec: /usr/bin/docker port botwork-envoy 8080/tcp
    exit-status: 1

  # Launcher must announce its default plugin network via environment, since
  # botwork 0.1.4 makes BOTWORK_LAUNCHER_DEFAULT_NETWORK a required env var.
  # `systemctl show -p Environment` returns the resolved environment block.
  launcher_default_network_env_set:
    exec: /usr/bin/systemctl show -p Environment botwork-launcher.service
    exit-status: 0
    stdout:
    - BOTWORK_LAUNCHER_DEFAULT_NETWORK=botwork-plugin

  # Assert the rust session-broker reached the point of binding its gRPC
  # listener on 0.0.0.0:9001. We grep its own startup log line rather than
  # TCP-probing, because:
  #   - the broker image has no shell tools (no python, no nc, no bash);
  #   - goss runs `exec:` via /bin/sh, so bash-only features like `[[ ]]`
  #     and `</dev/tcp/...` cannot be used reliably here;
  #   - the broker is on botwork-internal with no host port-publish, so
  #     probing from the host needs network discovery.
  # The log line below is emitted by the broker the moment it starts
  # serving, which is exactly what this check is meant to verify.
  session_broker_listens_on_9001:
    timeout: 30000
    exec: |
      i=0
      while [ "$i" -lt 40 ]; do
        if docker logs botwork-session-broker 2>&1 \
            | grep -q 'starting gRPC ext_proc service on 0.0.0.0:9001'; then
          exit 0
        fi
        i=$((i + 1))
        sleep 0.5
      done
      exit 1
    exit-status: 0

  # config-broker emits its bind log after the DB pool has connected
  # (post-RFE #101 PR2; pre-cutover this fired after parsing
  # plugins.yaml). Passing this doubles as evidence that
  # BOTWORK_DATABASE_URL is well-formed and the credential is correct
  # — a bad DSN or unreachable postgres makes the binary exit with a
  # specific non-zero code before the bind log is ever emitted. Same
  # image-tooling caveats as session-broker apply.
  config_broker_listens_on_9200:
    timeout: 30000
    exec: |
      i=0
      while [ "$i" -lt 40 ]; do
        if docker logs botwork-config-broker 2>&1 \
            | grep -q 'starting on 0\.0\.0\.0:9200'; then
          exit 0
        fi
        i=$((i + 1))
        sleep 0.5
      done
      exit 1
    exit-status: 0

  # session-broker logs its resolved config-broker endpoint at startup; this
  # confirms env-var + default agree and the value session-broker will
  # actually call points at the alias config-broker registers.
  session_broker_logs_config_broker_endpoint:
    timeout: 30000
    exec: |
      i=0
      while [ "$i" -lt 40 ]; do
        if docker logs botwork-session-broker 2>&1 \
            | grep -q 'config-broker endpoint: http://config_broker:9200'; then
          exit 0
        fi
        i=$((i + 1))
        sleep 0.5
      done
      exit 1
    exit-status: 0

  # control-plane emits two bind logs immediately after constructing the
  # router and the xDS gRPC service. Passing both proves the image started
  # cleanly (and -- since `main.rs` exits non-zero on bind failure for
  # either transport -- that both ports are actually bound and reachable
  # at 0.0.0.0:9300 / 0.0.0.0:9301 from inside the container).
  #
  # Wording changed in botwork 0.2.1 (control-plane xDS landed):
  # the "starting on 0.0.0.0:9300" log split into "starting HTTP …" +
  # "starting xDS gRPC …" once the binary started two transports.
  # Pinning both forms here so a future revert of either is a fail-fast.
  #
  # Same shell-tooling caveat as config-broker / session-broker applies.
  control_plane_listens_on_9300:
    timeout: 30000
    exec: |
      i=0
      while [ "$i" -lt 40 ]; do
        if docker logs botwork-control-plane 2>&1 \
            | grep -q 'starting HTTP on 0\.0\.0\.0:9300'; then
          exit 0
        fi
        i=$((i + 1))
        sleep 0.5
      done
      exit 1
    exit-status: 0

  # New in botwork 0.2.1: control-plane runs a second listener for the
  # ADS / xDS gRPC service consumed by the (future) egress envoy. Same
  # trust boundary as 9300; both alias as `control_plane` on
  # botwork-internal. The egress envoy bootstrap (lands in a follow-up
  # vm PR for cycle 2B) pins `control_plane:9301` as its
  # api_config_source endpoint, so a missing or moved 9301 bind would
  # surface there as a silent "envoy never gets a Listener pushed";
  # this assertion fires loudly at boot time instead.
  control_plane_listens_on_9301_xds:
    timeout: 30000
    exec: |
      i=0
      while [ "$i" -lt 40 ]; do
        if docker logs botwork-control-plane 2>&1 \
            | grep -q 'starting xDS gRPC on 0\.0\.0\.0:9301'; then
          exit 0
        fi
        i=$((i + 1))
        sleep 0.5
      done
      exit 1
    exit-status: 0

  # control-plane's cold-start recovery sync. botwork 0.1.8 (#87)
  # introduced it as an HTTP poll against session-broker's
  # `GET /control-plane/sessions` admin endpoint; botwork#135
  # (RFE #105 round-3 final) cut that read over to a direct
  # postgres JOIN (`session_worker` ⨝ `agent_session` ⨝
  # tenant/workspace/plugin). The success log line is unchanged
  # ("cold-start recovery complete: N session(s) seeded") so this
  # assertion keeps working across the cutover — only the path
  # control-plane took to produce it changed.
  #
  # What this probe still proves:
  #   * postgres was reachable from control-plane on the alias
  #     (`postgres` on botwork-internal),
  #   * BOTWORK_DATABASE_URL was rendered correctly by
  #     botwork-db-init and surfaced via EnvironmentFile=,
  #   * the JOIN ran without DbErr (no schema drift),
  #   * control-plane is starting with a known (possibly empty)
  #     store, not the silent "empty by guess" mode that would
  #     break the xDS feeder.
  #
  # We match ANY non-negative count, not specifically 0. goss.yaml is
  # re-validated post-restart by loader-redeploy-simulation (this same
  # spec runs twice), and at that point control-plane's recovery is
  # rehydrating the session_worker rows that the prior echo-mcp-smoke
  # left in postgres — so the count is 1, not 0. Pinning ==0 was a
  # fresh-boot-only assumption that worked accidentally before
  # `mcp-echo-smoke` surfaced an agent-session-id; once the smoke
  # started writing real persistence rows, the post-restart re-run
  # caught the count change and failed loudly. The killer signal we
  # actually want here is "the log line fired" — that proves the JOIN
  # ran without DbErr and control-plane bound. The specific count is
  # surface noise.
  #
  # Long timeout (60 × 1s) because the recovery retry interval is 5s
  # in production and we want at least one attempt to land cleanly
  # before failing.
  control_plane_recovery_sync_completed:
    timeout: 60000
    exec: |
      i=0
      while [ "$i" -lt 60 ]; do
        if docker logs botwork-control-plane 2>&1 \
            | grep -Eq 'cold-start recovery complete: [0-9]+ session\(s\) seeded'; then
          exit 0
        fi
        i=$((i + 1))
        sleep 1
      done
      exit 1
    exit-status: 0

  # session-broker logs its resolved control-plane endpoint at startup
  # alongside the config-broker one; this confirms the new
  # BOTWORK_CONTROL_PLANE_ENDPOINT env var defaulting agrees with the
  # alias control-plane registers. Without this, a typo in the default
  # would only surface on the first spawn (as a hard-gate 503), which
  # is much harder to debug than a missing log line at boot.
  session_broker_logs_control_plane_endpoint:
    timeout: 30000
    exec: |
      i=0
      while [ "$i" -lt 40 ]; do
        if docker logs botwork-session-broker 2>&1 \
            | grep -q 'control-plane endpoint: http://control_plane:9300'; then
          exit 0
        fi
        i=$((i + 1))
        sleep 0.5
      done
      exit 1
    exit-status: 0

  # botwork 0.1.9+ (#88) makes `egress:` mandatory on every plugin in
  # plugins.yaml -- config-broker refuses to start without it. Catch
  # missing-egress entries on disk before the broker does so the failure
  # names the plugin instead of bubbling up as a service-failed-to-start
  # in the journal. The valid forms (`all`, `none`, `{ allow: [...] }`)
  # are validated by config-broker itself; here we only assert presence.
  plugins_registry_every_plugin_has_egress:
    # bootstrap.yaml's top-level `plugins:` is a sequence of objects
    # post-RFE #101 PR2 (was a map keyed by name pre-cutover). The
    # bootstrap binary's validator enforces this rule too, but goss
    # surfaces the offender at boot time before the unit fails.
    exec: |
      python3 - <<'PY'
      import pathlib, sys, yaml
      payload = yaml.safe_load(
          pathlib.Path('/etc/botwork/bootstrap.yaml').read_text(encoding='utf-8')
      )
      plugins = payload.get('plugins') or []
      missing = [entry.get('name', '<unnamed>') for entry in plugins
                 if isinstance(entry, dict) and 'egress' not in entry]
      if missing:
          print(f"plugins missing required 'egress:' field: {missing}", file=sys.stderr)
          sys.exit(1)
      sys.exit(0)
      PY
    exit-status: 0

  # plugins-base.yaml must declare a non-empty `config:` block on echo so
  # the smoke test downstream can assert that config injection actually
  # flowed through. This catches the regression where someone trims the
  # fixture back to a bare `image: …` entry.
  plugins_registry_echo_has_config:
    # Per-binding `config:` lives under
    # `tenants[].workspaces[].plugins[].config` in bootstrap.yaml. The
    # base-image smoke fixture pins (tenant=mcp, workspace=demo,
    # binding=echo) so the edge URL-shape lua in lds/listener.yaml
    # resolves cleanly through config-broker on a healthy boot. See
    # envoy/plugins-base.yaml for the matching triple.
    exec: |
      python3 - <<'PY'
      import pathlib, yaml, sys
      payload = yaml.safe_load(
          pathlib.Path('/etc/botwork/bootstrap.yaml').read_text(encoding='utf-8')
      )
      cfg = {}
      for tenant in (payload.get('tenants') or []):
          if tenant.get('name') != 'mcp':
              continue
          for ws in (tenant.get('workspaces') or []):
              if ws.get('name') != 'demo':
                  continue
              for binding in (ws.get('plugins') or []):
                  if binding.get('name') == 'echo':
                      cfg = binding.get('config') or {}
                      break
      sys.exit(0 if cfg.get('vm_smoke_marker') == 'vm-base-config-injection-ok' else 1)
      PY
    exit-status: 0

  # plugins.yaml MUST NOT carry an explicit `network:` field on any plugin
  # entry: botwork 0.1.4 dropped per-plugin network membership in favour of
  # BOTWORK_LAUNCHER_DEFAULT_NETWORK, and config-broker now rejects entries
  # that still set it. This assertion fails fast (before runtime) on any
  # fixture that has drifted.
  plugins_registry_no_per_plugin_network:
    exec: |
      python3 - <<'PY'
      import pathlib, yaml, sys
      payload = yaml.safe_load(
          pathlib.Path('/etc/botwork/bootstrap.yaml').read_text(encoding='utf-8')
      )
      plugins = payload.get('plugins') or []
      offenders = [entry.get('name', '<unnamed>') for entry in plugins
                   if isinstance(entry, dict) and 'network' in entry]
      if offenders:
          print(f"plugins with stale 'network:' field: {offenders}", file=sys.stderr)
          sys.exit(1)
      sys.exit(0)
      PY
    exit-status: 0

  # Payload-agnostic: the base image ships an echo-only registry and the
  # overlay bootstrap expands it to the full plugin set, so we only assert
  # the file is a well-formed `plugins:` mapping rather than its contents.
  # Positive assertions about the expanded registry live in the downstream
  # (botwork) goss-payload spec.
  plugins_registry_yaml_valid:
    # bootstrap.yaml is required to be a well-formed top-level object
    # with a `plugins:` sequence and a `tenants:` sequence. Positive
    # assertions about row counts live in the downstream goss-payload
    # spec.
    exec: |
      python3 - <<'PY'
      import pathlib, sys, yaml
      raw = pathlib.Path('/etc/botwork/bootstrap.yaml').read_text(encoding='utf-8')
      payload = yaml.safe_load(raw)
      ok = (
          isinstance(payload, dict)
          and isinstance(payload.get('plugins'), list)
          and isinstance(payload.get('tenants'), list)
      )
      sys.exit(0 if ok else 1)
      PY
    exit-status: 0

  # ── Frontdoor (botwork-envoy-frontdoor) ──────────────────────────────────
  # Frontdoor is the only public-facing envoy. It joins botwork-ingress only
  # (not botwork-internal or botwork-plugin). :80 and :443 are the only
  # host-published app ports in the stack. The holding page is served via
  # Envoy direct_response on :80 (no upstream container) until rds/active.yaml
  # is swapped to route to ingress; :443 binds placeholder TLS and returns an
  # inert 503 until an overlay activates it.

  systemd_network_ingress_active:
    exec: /bin/systemctl is-active botwork-network-ingress.service
    exit-status: 0
    stdout:
    - active

  systemd_envoy_frontdoor_active:
    exec: /bin/systemctl is-active botwork-envoy-frontdoor.service
    exit-status: 0
    stdout:
    - active

  # Frontdoor publishes :80 and :443 on 0.0.0.0 — the only host-published app
  # ports in the stack.
  frontdoor_port_80_published_on_wildcard:
    exec: /usr/bin/docker port botwork-envoy-frontdoor 80/tcp
    exit-status: 0
    stdout:
    - "0.0.0.0:80"

  frontdoor_port_443_published_on_wildcard:
    exec: /usr/bin/docker port botwork-envoy-frontdoor 443/tcp
    exit-status: 0
    stdout:
    - "0.0.0.0:443"

  # Frontdoor admin :9903 is NOT published to the host.
  frontdoor_admin_not_published_to_host:
    exec: /usr/bin/docker port botwork-envoy-frontdoor 9903/tcp
    exit-status: 1

  # Frontdoor is on botwork-ingress only.
  frontdoor_on_ingress_network:
    exec: |
      /usr/bin/docker network inspect botwork-ingress \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-envoy-frontdoor")'
    exit-status: 0

  frontdoor_modules_mount_present:
    exec: |
      /usr/bin/docker inspect botwork-envoy-frontdoor \
        | /usr/bin/jq -e '.[0].Mounts
          | map(select(.Source == "/etc/botwork/envoy/frontdoor/modules"
                       and .Destination == "/etc/envoy/modules"
                       and .RW == false))
          | length == 1'
    exit-status: 0

  frontdoor_sds_mount_present:
    exec: |
      /usr/bin/docker inspect botwork-envoy-frontdoor \
        | /usr/bin/jq -e '.[0].Mounts
          | map(select(.Source == "/etc/botwork/envoy/frontdoor/sds"
                       and .Destination == "/etc/envoy/sds"
                       and .RW == false))
          | length == 1'
    exit-status: 0

  frontdoor_acme_state_mount_present:
    exec: |
      /usr/bin/docker inspect botwork-envoy-frontdoor \
        | /usr/bin/jq -e '.[0].Mounts
          | map(select(.Source == "/var/lib/botwork/frontdoor/acme"
                       and .Destination == "/var/lib/botwork/frontdoor/acme"
                       and .RW == true))
          | length == 1'
    exit-status: 0

  # Ingress envoy (botwork-envoy) also joins botwork-ingress so frontdoor
  # can resolve it via docker DNS.
  envoy_on_ingress_network:
    exec: |
      /usr/bin/docker network inspect botwork-ingress \
        | /usr/bin/jq -e '.[0].Containers | to_entries | map(.value.Name) | index("botwork-envoy")'
    exit-status: 0

  # curl http://127.0.0.1/ returns 200 with holding-page body served via
  # Envoy direct_response (no upstream container needed).
  frontdoor_curl_hello_world:
    timeout: 30000
    exec: |
      i=0
      while [ "$i" -lt 30 ]; do
        body="$(curl -fsS http://127.0.0.1/ 2>/dev/null || true)"
        if printf '%s' "${body}" | grep -q 'frontdoor: hello world'; then
          exit 0
        fi
        i=$((i + 1))
        sleep 1
      done
      echo "frontdoor did not return hello-world body after 30s" >&2
      curl -v http://127.0.0.1/ >&2 || true
      exit 1
    exit-status: 0
