type: test
steps:
- on: guest
  name: base-goss
  uploads:
  - src: build/goss-0.4.9
    dest: /tmp/goss
  - src: images/botwork/test/goss.yaml
    dest: /tmp/goss.yaml
  - src: images/botwork/test/dump-container-logs.sh
    dest: /tmp/dump-container-logs.sh
  run: |
    sudo install -m 0755 /tmp/goss /usr/local/bin/goss
    sudo install -m 0755 /tmp/dump-container-logs.sh /usr/local/bin/dump-container-logs
    status=0
    sudo goss -g /tmp/goss.yaml validate || status=$?
    if [ "${status}" -ne 0 ]; then
      sudo /usr/local/bin/dump-container-logs || true
    fi
    exit "${status}"
- on: guest
  name: host-listener-allowlist
  uploads:
  - src: images/botwork/test/host-listener-allowlist.sh
    dest: /tmp/host-listener-allowlist.sh
  run: |
    sudo install -m 0755 /tmp/host-listener-allowlist.sh \
      /usr/local/bin/host-listener-allowlist \
      && sudo /usr/local/bin/host-listener-allowlist
- on: guest
  name: enable-dummy-auth
  uploads:
  - src: build/dummy-auth-broker.tar
    dest: /tmp/dummy-auth-broker.tar
  - src: images/botwork/test/enable-dummy-auth.sh
    dest: /tmp/enable-dummy-auth.sh
  run: |
    sudo install -m 0755 /tmp/enable-dummy-auth.sh /usr/local/bin/enable-dummy-auth \
      && sudo /usr/local/bin/enable-dummy-auth
- on: guest
  name: echo-mcp-smoke
  uploads:
  - src: images/botwork/test/mcp-echo-smoke.sh
    dest: /tmp/mcp-echo-smoke.sh
  - src: images/botwork/test/dump-container-logs.sh
    dest: /tmp/dump-container-logs.sh
  run: |
    sudo install -m 0755 /tmp/mcp-echo-smoke.sh /usr/local/bin/mcp-echo-smoke
    sudo install -m 0755 /tmp/dump-container-logs.sh /usr/local/bin/dump-container-logs
    status=0
    sudo /usr/local/bin/mcp-echo-smoke || status=$?
    if [ "${status}" -ne 0 ]; then
      sudo /usr/local/bin/dump-container-logs || true
    fi
    exit "${status}"
# RFE #105 round-3 follow-up: the seeded-state probes must run AFTER
# echo-mcp-smoke has spawned a live container and surfaced an
# agent-session-id via params._meta. Putting them in goss.yaml would
# fail every fresh-boot CI run, because base-goss runs before any
# session has been spawned. See goss-seeded.yaml's header for the
# full rationale on each probe.
- on: guest
  name: seeded-goss
  uploads:
  - src: images/botwork/test/goss-seeded.yaml
    dest: /tmp/goss-seeded.yaml
  run: |
    sudo goss -g /tmp/goss-seeded.yaml validate
# Simulates the botspace redeploy topology (fresh boot disk, persistent
# data disk) by dropping the baked botwork/<svc>:local tags, restarting
# the image-loader, asserting the tags reappear, and re-running goss
# against the post-redeploy state. See the script header for the full
# rationale — this test exists because PR #92 was caught at deploy time,
# not in CI. The base-goss + echo-mcp-smoke steps above run first, so
# this step inherits a /tmp/goss + /tmp/goss.yaml that are already in
# place for the post-redeploy re-validation.
- on: guest
  name: loader-redeploy-simulation
  uploads:
  - src: images/botwork/test/loader-redeploy-simulation.sh
    dest: /tmp/loader-redeploy-simulation.sh
  run: |
    sudo install -m 0755 /tmp/loader-redeploy-simulation.sh \
      /usr/local/bin/loader-redeploy-simulation \
      && sudo /usr/local/bin/loader-redeploy-simulation
diagnostics_units:
- ssh
- docker
- botwork-image-loader
- botwork-network
- botwork-db-init
- botwork-postgres
- botwork-db-migrate
- botwork-import
- botwork-api
- botwork-ui
- botwork-launcher
- botwork-config-broker
- botwork-control-plane
- botwork-session-broker
- botwork-envoy
