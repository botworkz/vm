name: Botwork/build

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Assert no sibling-mode envs are set
      env:
        BOTWORK_TOOLS_IMAGES_REF: ${{ env.BOTWORK_TOOLS_IMAGES_REF }}
        BOTWORKZ_MCP_IMAGES_REF: ${{ env.BOTWORKZ_MCP_IMAGES_REF }}
      run: |
        for var in BOTWORK_TOOLS_IMAGES_REF BOTWORKZ_MCP_IMAGES_REF; do
          val="${!var:-}"
          if [[ -n "${val}" && "${val}" != "registry" ]]; then
            echo "ERROR: ${var}=${val} is set in CI. Sibling-mode is for local iteration only." >&2
            echo "Unset ${var} (or set it to 'registry') and re-run." >&2
            exit 1
          fi
        done

    - name: shellcheck build scripts
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends shellcheck
        shellcheck \
          scripts/test-packed.sh \
          scripts/lib/*.sh \
          images/*/payload/firstboot/* \
          images/*/test/*.sh

    - name: Validate image build specs (YAML)
      run: |
        sudo apt-get install -y --no-install-recommends python3-yaml
        python3 - <<'PY'
        import pathlib, sys, yaml
        ok = True
        for spec in sorted(pathlib.Path("images").glob("*/build.yaml")):
            try:
                data = yaml.safe_load(spec.read_text(encoding="utf-8"))
            except yaml.YAMLError as exc:
                print(f"FAIL {spec}: {exc}", file=sys.stderr)
                ok = False
                continue
            if not isinstance(data, dict):
                print(f"FAIL {spec}: top-level must be a mapping", file=sys.stderr)
                ok = False
                continue
            steps = data.get("steps", [])
            if not isinstance(steps, list):
                print(f"FAIL {spec}: steps: must be a list", file=sys.stderr)
                ok = False
                continue
            print(f"OK   {spec} ({len(steps)} steps)")
        sys.exit(0 if ok else 1)
        PY

  botwork-base-build:
    permissions:
      contents: read
      packages: read
    needs: validate
    uses: ./.github/workflows/_build.yml
    with:
      name: botwork-base
      build-hash: |
        images/botwork-base/**
        images/manifest.yaml
        scripts/test-packed.sh
        scripts/lib/**
        compose.yml
        deps/container/botforge.Dockerfile
        .github/workflows/image-build.yml
        .github/workflows/_build.yml

  botwork-docker-build:
    permissions:
      contents: read
      packages: read
    needs:
    - validate
    - botwork-base-build
    uses: ./.github/workflows/_build.yml
    with:
      name: botwork-docker
      base-image: botwork-base
      build-hash: |
        images/botwork-base/**
        images/botwork-docker/**
        images/manifest.yaml
        scripts/test-packed.sh
        scripts/lib/**
        compose.yml
        deps/container/botforge.Dockerfile
        .github/workflows/image-build.yml
        .github/workflows/_build.yml

  botwork-build:
    permissions:
      contents: read
      packages: read
    needs:
    - validate
    - botwork-base-build
    - botwork-docker-build
    uses: ./.github/workflows/_build.yml
    with:
      name: botwork
      base-image: botwork-docker
      build-hash: |
        images/botwork-base/**
        images/botwork-docker/**
        images/botwork/**
        images/manifest.yaml
        scripts/test-packed.sh
        scripts/lib/**
        compose.yml
        deps/container/botforge.Dockerfile
        .github/workflows/image-build.yml
        .github/workflows/_build.yml
