name: image-build

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # Belt-and-braces: fail immediately if a sibling-mode env var slipped through.
    # scripts/lib/images.sh also guards this at runtime, but catching it here
    # gives a clearer error before any build work starts.
    - name: Assert no sibling-mode envs are set
      env:
        BOTWORK_TOOLS_IMAGES_REF: ${{ env.BOTWORK_TOOLS_IMAGES_REF }}
        BOTWORKZ_MCP_IMAGES_REF: ${{ env.BOTWORKZ_MCP_IMAGES_REF }}
      run: |
        for var in BOTWORK_TOOLS_IMAGES_REF BOTWORKZ_MCP_IMAGES_REF; do
          val="${!var:-}"
          if [[ -n "${val}" && "${val}" != "registry" ]]; then
            echo "ERROR: ${var}=${val} is set in CI. Sibling-mode is for local iteration only." >&2
            echo "Unset ${var} (or set it to 'registry') and re-run." >&2
            exit 1
          fi
        done

    - name: shellcheck build scripts
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends shellcheck
        # Lint host-side scripts and first-boot bash scripts under bash
        # (default). Provisioners under images/_shared/provisioners/ run
        # under dash inside the libguestfs appliance (virt-customize --run
        # ignores the shebang and uses /bin/sh), so lint them under dash —
        # `-s sh` catches `[[ ]]`, `local`, `pipefail`, etc.
        shellcheck \
          scripts/pack.sh \
          scripts/test-packed.sh \
          scripts/build-deps.sh \
          scripts/lib/*.sh \
          images/*/payload/firstboot/*
        shellcheck -s sh \
          images/_shared/provisioners/*.sh

    # Per-image build specs are YAML now; pre-parse them so a typo fails
    # the validate job before any /dev/kvm runner spins up. botforge build
    # itself re-validates (with deny_unknown_fields + step variants), so
    # this is purely a fast-fail.
    - name: Validate image build specs (YAML)
      run: |
        sudo apt-get install -y --no-install-recommends python3-yaml
        python3 - <<'PY'
        import pathlib, sys, yaml
        ok = True
        for spec in sorted(pathlib.Path("images").glob("*/build.yaml")):
            try:
                data = yaml.safe_load(spec.read_text(encoding="utf-8"))
            except yaml.YAMLError as exc:
                print(f"FAIL {spec}: {exc}", file=sys.stderr)
                ok = False
                continue
            if not isinstance(data, dict):
                print(f"FAIL {spec}: top-level must be a mapping", file=sys.stderr)
                ok = False
                continue
            steps = data.get("steps", [])
            if not isinstance(steps, list):
                print(f"FAIL {spec}: steps: must be a list", file=sys.stderr)
                ok = False
                continue
            print(f"OK   {spec} ({len(steps)} steps)")
        sys.exit(0 if ok else 1)
        PY

  build:
    runs-on: ubuntu-latest
    needs: validate
    steps:
    - uses: actions/checkout@v4

    - name: Enable KVM via udev
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
          | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Build image
      run: ./scripts/pack.sh --compress

    - name: Upload qcow2 artifact
      uses: actions/upload-artifact@v4
      with:
        name: debian-13-botwork
        path: build/debian-13-botwork-compressed.qcow2
        retention-days: 7

  smoke-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4

    - name: Enable KVM via udev
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
          | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Download qcow2 artifact
      uses: actions/download-artifact@v4
      with:
        name: debian-13-botwork
        path: build

    - name: Run smoke test
      run: ./scripts/test-packed.sh
