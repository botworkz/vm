name: Release

# Release flow:
# - Keep VERSION at a pre-release value during development (e.g. 0.1.0-dev).
# - To cut a release, update VERSION to MAJOR.MINOR.PATCH (no suffix) and merge to main.
# - publish creates/publishes artifacts (qcow2) and then release event triggers bump.
# - bump advances VERSION to next minor -dev and pushes back to main.
# - If a clean VERSION sits on main for more than one push (e.g. a chore
#   commit lands before the next -dev bump), publish's Read VERSION step
#   probes Releases for v${VERSION} and warn-and-bails on collision instead
#   of silently re-uploading the qcow2 over an existing release.
on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    if: github.event_name != 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
    - uses: actions/checkout@v4
    - name: Read VERSION
      id: version
      shell: bash
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail
        VERSION="$(tr -d '[:space:]' < VERSION)"
        if [[ -z "$VERSION" ]]; then
          echo "VERSION is empty" >&2
          exit 1
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        if [[ "$VERSION" == *-* ]]; then
          echo "is_release=false" >> "$GITHUB_OUTPUT"
          echo "Skipping release for pre-release version: $VERSION"
          exit 0
        fi
        tag="v${VERSION}"
        # `gh release view` exits 0 if the release exists, non-zero otherwise.
        # When VERSION is non-dev but a release for the tag already exists, the
        # publish path would silently update the GitHub Release in place and
        # re-upload botwork-vm-${VERSION}.qcow2 built from a different commit.
        # Refuse to do that — warn loudly and treat this run as a no-op.
        # Recovery is to bump VERSION (either to the next -dev for ongoing
        # development, or to the next MAJOR.MINOR.PATCH if you actually meant
        # to cut a new release).
        if gh release view "${tag}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
          echo "is_release=false" >> "$GITHUB_OUTPUT"
          echo "::warning::VERSION=${VERSION} is non-dev but release ${tag} already exists" \
            "— refusing to republish (would re-upload botwork-vm-${VERSION}.qcow2" \
            "from a different commit). Bump VERSION and re-run."
        else
          echo "is_release=true" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"
        fi

    # Belt-and-braces: fail immediately if a sibling-mode env var slipped through
    # into a release build. scripts/lib/images.sh also guards this at runtime,
    # but catching it here means we never even start staging deps for a release
    # qcow2 from a sibling checkout.
    - name: Assert no sibling-mode envs are set
      if: steps.version.outputs.is_release == 'true'
      env:
        BOTWORK_TOOLS_IMAGES_REF: ${{ env.BOTWORK_TOOLS_IMAGES_REF }}
        BOTWORKZ_MCP_IMAGES_REF: ${{ env.BOTWORKZ_MCP_IMAGES_REF }}
      run: |
        for var in BOTWORK_TOOLS_IMAGES_REF BOTWORKZ_MCP_IMAGES_REF; do
          val="${!var:-}"
          if [[ -n "${val}" && "${val}" != "registry" ]]; then
            echo "ERROR: ${var}=${val} is set during a release build. Sibling-mode is for local iteration only." >&2
            echo "Unset ${var} (or set it to 'registry') and re-run." >&2
            exit 1
          fi
        done

    - name: Enable KVM via udev
      if: steps.version.outputs.is_release == 'true'
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
          | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Build compressed qcow2 image
      if: steps.version.outputs.is_release == 'true'
      run: ./scripts/pack.sh --compress

    - name: Stage release asset
      if: steps.version.outputs.is_release == 'true'
      run: |
        cp build/debian-13-botwork-compressed.qcow2 \
          "build/botwork-vm-${{ steps.version.outputs.version }}.qcow2"

    - name: Create GitHub Release
      if: steps.version.outputs.is_release == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: v${{ steps.version.outputs.version }}
        files: |
          build/botwork-vm-${{ steps.version.outputs.version }}.qcow2
        fail_on_unmatched_files: true

  bump:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout main
      uses: actions/checkout@v4
      with:
        ref: main

    - name: Bump VERSION to next minor -dev
      shell: bash
      run: |
        set -euo pipefail
        CURRENT_RAW="$(tr -d '[:space:]' < VERSION)"
        CURRENT="${CURRENT_RAW#v}"
        BASE="${CURRENT%%-*}"

        IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
        : "${MAJOR:?}" "${MINOR:?}" "${PATCH:?}"

        NEXT_MINOR=$((MINOR + 1))
        NEXT="${MAJOR}.${NEXT_MINOR}.0-dev"

        echo "$NEXT" > VERSION

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        if git diff --quiet -- VERSION; then
          echo "VERSION unchanged; nothing to commit"
          exit 0
        fi

        git add VERSION
        git commit -m "chore: bump VERSION to ${NEXT} [skip ci]"
        git push
