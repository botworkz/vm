type: build
image: >-
  @artifact://botwork-docker/botwork-docker.qcow2
output: botwork.qcow2
disk_size: 16G

compress:
  enabled: true
  compressor_args:
    cluster_size: "1M"
  compressor_opts: -T0 -19
  reclaim: fstrim

uploads:
- src: "@://botwork/payload/envoy/*.yaml"
  dest: /etc/botwork/envoy/
- src: "@://botwork/payload/envoy/**/*"
  dest: /etc/botwork/envoy/
  parents: true
- src: "@://botwork/payload/systemd/*.service"
  dest: /usr/lib/systemd/system/
- src: "@://botwork/payload/systemd/*.socket"
  dest: /usr/lib/systemd/system/
- src: "@://botwork/payload/firstboot/*"
  dest: /usr/local/sbin/
  mode: "0755"

- src: "@botwork-launcher"
  dest: /usr/local/bin/
  mode: "0755"
- src: "@botwork-tools"
  dest: /usr/local/bin/
  mode: "0755"

- src: "@session-broker"
  dest: /usr/share/botwork/images/
- src: "@config-broker"
  dest: /usr/share/botwork/images/
- src: "@control-plane"
  dest: /usr/share/botwork/images/
- src: "@db-migrate"
  dest: /usr/share/botwork/images/
- src: "@api"
  dest: /usr/share/botwork/images/
- src: "@ui"
  dest: /usr/share/botwork/images/
- src: "@postgres"
  dest: /usr/share/botwork/images/
- src: "@mcp-echo"
  dest: /usr/share/botwork/images/
- src: "@curl"
  dest: /usr/share/botwork/images/

steps:
- name: botwork-stack
  run: |
    export DEBIAN_FRONTEND=noninteractive
    install -m 0644 /etc/botwork/envoy/plugins-base.yaml /etc/botwork/bootstrap.yaml
    getent group  broker >/dev/null 2>&1 || groupadd --system --gid 1100 broker
    getent passwd broker >/dev/null 2>&1 || useradd  --system --uid 1100 --gid 1100 \
                                                     --home-dir /nonexistent --no-create-home \
                                                     --shell /usr/sbin/nologin broker

    systemctl start docker.service
    docker_started=1

    install -d -m 0750 -o broker -g broker /var/lib/botwork
    install -d -m 0700 -o broker -g broker /var/lib/botwork/tenants
    install -d -m 0750 -o broker -g broker /var/lib/botwork-db
    install -d -m 0755 -o broker -g broker /usr/share/botwork/images

    docker_ready=0
    for _ in $(seq 1 60); do
      if docker info >/dev/null 2>&1; then
        docker_ready=1
        break
      fi
      sleep 0.5
    done
    [ "${docker_ready}" -eq 1 ] || { echo "docker daemon did not become ready in time" >&2; exit 1; }

    /usr/local/sbin/botwork-image-loader

    for tar in /usr/share/botwork/images/*.tar; do
      [ -f "${tar}" ] || continue
      svc="$(basename "${tar}" .tar)"
      docker image inspect "botwork/${svc}:local" >/dev/null 2>&1 \
        || { echo "missing loaded image tag: botwork/${svc}:local" >&2; exit 1; }
    done

    rm -f /usr/share/botwork/images/*.tar
    docker container prune -f >/dev/null 2>&1 || true
    docker image prune -f >/dev/null 2>&1 || true
    docker network prune -f >/dev/null 2>&1 || true
    docker builder prune -f >/dev/null 2>&1 || true

    install -d -m 0755 /etc/systemd/resolved.conf.d
    cat > /etc/systemd/resolved.conf.d/no-llmnr.conf <<'EOF'
    [Resolve]
    LLMNR=no
    MulticastDNS=no
    EOF
    chmod 0644 /etc/systemd/resolved.conf.d/no-llmnr.conf

    install -d -m 0755 /usr/lib/systemd/system

    systemctl daemon-reload || true
    systemctl enable \
      botwork-image-loader.service \
      botwork-network.service \
      botwork-db-init.service \
      botwork-postgres.service \
      botwork-db-migrate.service \
      botwork-import.service \
      botwork-api.service \
      botwork-ui.service \
      botwork-launcher.socket \
      botwork-launcher.service \
      botwork-config-broker.service \
      botwork-control-plane.service \
      botwork-session-broker.service \
      botwork-envoy.service \
      botwork-egress-envoy.service \
      botwork-egress-iptables.service

    rm -rf /tmp/botwork-build-context

- name: cleanup
  run: |
    apt-get autoremove --purge -y || true

    apt-get clean || true
    rm -rf /var/lib/apt/lists/*
    rm -f /etc/dpkg/dpkg.cfg.d/02apt-speedup
    cat >/etc/apt/apt.conf.d/99-no-translations <<'EOF'
    Acquire::Languages "none";
    EOF
    chmod 0644 /etc/apt/apt.conf.d/99-no-translations
    rm -f /var/cache/debconf/*-old
    rm -f /var/cache/ldconfig/aux-cache

    truncate -s 0 /etc/machine-id
    rm -f /var/lib/dbus/machine-id
    ln -s /etc/machine-id /var/lib/dbus/machine-id
    if command -v journalctl >/dev/null 2>&1; then
        journalctl --rotate 2>/dev/null || true
        journalctl --vacuum-time=1s 2>/dev/null || true
    fi
    rm -rf /var/log/journal/* 2>/dev/null || true
    find /var/log -type f ! -path '/var/log/journal/*' -exec truncate -s 0 {} \;
    rm -rf /home/debian/.ssh /home/bot/.ssh /root/.ssh || true
    rm -f /etc/ssh/ssh_host_*
    rm -f /var/lib/systemd/random-seed

    if command -v cloud-init >/dev/null 2>&1; then
        cloud-init clean --logs --seed || true
    fi
    rm -f /root/.bash_history /home/debian/.bash_history /home/bot/.bash_history || true
    rm -rf /tmp/* /tmp/.* /var/tmp/* 2>/dev/null || true
    rm -rf /var/lib/dhcp/* /var/lib/NetworkManager/* 2>/dev/null || true
    find /usr/share/locale -mindepth 1 -maxdepth 1 -type d \
      ! -name 'en*' ! -name 'C' ! -name 'POSIX' \
      -exec rm -rf {} +
