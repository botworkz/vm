type: botforge/build
name: botwork
image: "@artifact://botwork-docker/botwork-docker.qcow2"
output: botwork.qcow2
disk_size: 16G

cloud_init:
  bootcmd:
  - - cloud-init-per
    - once
    - apt-cache-tmpfs
    - sh
    - -c
    - >-
      install -d -m 0755 /var/cache/apt && mountpoint -q /var/cache/apt ||
      mount -t tmpfs -o size=512M,nodev,nosuid tmpfs /var/cache/apt
  - - cloud-init-per
    - once
    - apt-lists-tmpfs
    - sh
    - -c
    - >-
      install -d -m 0755 /var/lib/apt/lists && mountpoint -q /var/lib/apt/lists
      || mount -t tmpfs -o size=256M,nodev,nosuid tmpfs /var/lib/apt/lists
  - - cloud-init-per
    - once
    - debconf-cache-tmpfs
    - sh
    - -c
    - >-
      install -d -m 0755 /var/cache/debconf && mountpoint -q /var/cache/debconf
      || mount -t tmpfs -o size=64M,nodev,nosuid tmpfs /var/cache/debconf
  - - cloud-init-per
    - once
    - dpkg-no-locales
    - sh
    - -c
    - >-
      printf
      'path-exclude=/usr/share/locale/*\npath-include=/usr/share/locale/en*\npath-include=/usr/share/locale/C*\npath-include=/usr/share/locale/locale.alias\n'
      > /etc/dpkg/dpkg.cfg.d/99-no-locales
  - - cloud-init-per
    - once
    - apt-services-mask
    - sh
    - -c
    - >-
      systemctl stop unattended-upgrades.service apt-daily.service
      apt-daily-upgrade.service 2>/dev/null || true; systemctl disable
      unattended-upgrades.service apt-daily.timer apt-daily-upgrade.timer
      2>/dev/null || true; systemctl mask unattended-upgrades.service
      apt-daily.service apt-daily-upgrade.service 2>/dev/null || true
  - - cloud-init-per
    - once
    - apt-no-recommends
    - sh
    - -c
    - >-
      printf 'APT::Install-Recommends "false";\nAPT::Install-Suggests "false";\n'
      > /etc/apt/apt.conf.d/00no-recommends
  - - cloud-init-per
    - once
    - broker-group
    - sh
    - -c
    - >-
      getent group broker >/dev/null 2>&1 || groupadd --system --gid 1100
      broker
  users:
  - name: broker
    uid: 1100
    primary_group: broker
    system: true
    homedir: /nonexistent
    no_create_home: true
    shell: /usr/sbin/nologin
    lock_passwd: true
  package_update: true
  package_upgrade: true
  packages:
  - qemu-guest-agent
  runcmd:
  - [systemctl, unmask, unattended-upgrades.service, apt-daily.service, apt-daily-upgrade.service]
  - [systemctl, enable, unattended-upgrades.service, apt-daily.timer, apt-daily-upgrade.timer]
  - [systemctl, enable, ssh]

compress:
  enabled: true
  compressor_args:
    cluster_size: "1M"
  compressor_opts: -T0 -19
  reclaim: fstrim

files:
- src: "@://botwork/plugins-base.yaml"
  dest: /etc/botwork/bootstrap.yaml

- src: "@://botwork/envoy/*.yaml"
  dest: /etc/botwork/envoy/
- src: "@://botwork/envoy/**/*"
  dest: /etc/botwork/envoy/
  parents: true
- src: "@://botwork/systemd/*.service"
  dest: /usr/lib/systemd/system/
- src: "@://botwork/systemd/*.socket"
  dest: /usr/lib/systemd/system/
- src: "@://botwork/firstboot/*"
  dest: /usr/local/sbin/
  mode: "0755"
- src: "@://botwork/resolve.conf.d/*"
  dest: /etc/systemd/resolved.conf.d/

- src: "@botctl"
  dest: /usr/local/bin/
  mode: "0755"
- src: "@bw"
  dest: /usr/local/bin/
  mode: "0755"

- src: "@api"
  dest: /usr/share/botwork/images/
- src: "@auth-broker"
  dest: /usr/share/botwork/images/auth-broker.tar
- src: "@botwork-launcher"
  dest: /usr/local/bin/
  mode: "0755"
- src: "@config-broker"
  dest: /usr/share/botwork/images/
- src: "@control-plane"
  dest: /usr/share/botwork/images/
- src: "@db-migrate"
  dest: /usr/share/botwork/images/
- src: "@session-broker"
  dest: /usr/share/botwork/images/
- src: "@ui"
  dest: /usr/share/botwork/images/

- src: "@curl"
  dest: /usr/share/botwork/images/
- src: "@postgres"
  dest: /usr/share/botwork/images/

- src: "@mcp-echo"
  dest: /usr/share/botwork/images/

steps:
- name: botwork-stack
  run: |
    install -d -m 0750 -o broker -g broker /var/lib/botwork
    install -d -m 0700 -o broker -g broker /var/lib/botwork/tenants
    install -d -m 0750 -o broker -g broker /var/lib/botwork-db
    install -d -m 0755 -o broker -g broker /usr/share/botwork/images
    install -d -m 0755 /usr/lib/systemd/system
- name: Load images
  run: |
    /usr/local/sbin/botwork-image-loader
- name: Systemd enable
  run: |
    systemctl daemon-reload || true
    systemctl enable \
      botwork-auth-broker.service \
      botwork-image-loader.service \
      botwork-network.service \
      botwork-db-init.service \
      botwork-postgres.service \
      botwork-db-migrate.service \
      botwork-import.service \
      botwork-api.service \
      botwork-ui.service \
      botwork-launcher.socket \
      botwork-launcher.service \
      botwork-config-broker.service \
      botwork-control-plane.service \
      botwork-session-broker.service \
      botwork-envoy.service \
      botwork-egress-envoy.service \
      botwork-egress-iptables.service
- name: Cleanup (botwork)
  run: |
    rm -f /usr/share/botwork/images/*.tar
    rm -rf /tmp/botwork-build-context
- uses: "@://shared/cleanup.steps.yaml"
- uses: "@://shared/report.steps.yaml"
