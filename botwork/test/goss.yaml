command:
  # Prove masking works without a move-aside now that vendor units live in
  # /usr/lib/systemd/system/ and /etc/systemd/system/ is free for the mask
  # symlink. goss commands run as the unprivileged smoke user, so mask/unmask
  # (which edit /etc) need sudo; bot/debian are NOPASSWD sudo (10-bot-user.sh).
  # Use botwork-egress-iptables.service as the guinea pig — it's enabled but
  # nothing in the active graph Requires= it, so mask+unmask can't disturb a
  # running container. Assert is-enabled reports `masked` (the observable
  # post-state of a successful bare `systemctl mask`), then unmask to restore.
  botwork-mask-without-move-aside:
    exec: |
      set -e
      sudo -n systemctl mask botwork-egress-iptables.service >/dev/null 2>&1
      state="$(systemctl is-enabled botwork-egress-iptables.service 2>/dev/null || true)"
      sudo -n systemctl unmask botwork-egress-iptables.service >/dev/null 2>&1
      echo "$state"
    exit-status: 0
    stdout:
    - masked
    timeout: 10000
