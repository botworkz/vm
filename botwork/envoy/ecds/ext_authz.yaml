resources:
- "@type": type.googleapis.com/envoy.config.core.v3.TypedExtensionConfig
  # Contract: this name matches the reserved listener filter name.
  name: envoy.filters.http.ext_authz
  typed_config:
    "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
    http_service:
      server_uri:
        uri: http://auth_broker:9100/auth/check
        cluster: auth_broker
        timeout: 5s
      authorization_request:
        allowed_headers:
          patterns:
          - exact: authorization
          - exact: content-type
          - exact: mcp-session-id
        headers_to_add:
        - key: x-envoy-original-path
          value: "%REQ(:PATH)%"
      authorization_response:
        # Propagate the broker-minted plugin capability for the downstream
        # session-broker /secrets/fetch exchange. The cap is bound to the plugin
        # segment at mint time, so even if exposed it is only usable for that
        # plugin-specific path.
        allowed_upstream_headers:
          patterns:
          - exact: x-botwork-tenant
          - exact: x-botwork-cap
    failure_mode_allow: false
