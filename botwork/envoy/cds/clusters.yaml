resources:
- "@type": type.googleapis.com/envoy.config.cluster.v3.Cluster
  # ── Upstream: session-broker ──────────────────────────────────────────────
  name: session_broker_grpc
  connect_timeout: 5s
  type: STRICT_DNS
  dns_lookup_family: V4_ONLY
  typed_extension_protocol_options:
    envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
      "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
      explicit_http_config:
        http2_protocol_options: {}
  load_assignment:
    cluster_name: session_broker_grpc
    endpoints:
    - lb_endpoints:
      - endpoint:
          address:
            socket_address:
              address: session_broker
              port_value: 9001

- "@type": type.googleapis.com/envoy.config.cluster.v3.Cluster
  # ── Upstream: dynamic DNS-selected MCP runners ────────────────────────────
  name: dynamic_forward_proxy_cluster
  connect_timeout: 5s
  lb_policy: CLUSTER_PROVIDED
  cluster_type:
    name: envoy.clusters.dynamic_forward_proxy
    typed_config:
      "@type": type.googleapis.com/envoy.extensions.clusters.dynamic_forward_proxy.v3.ClusterConfig
      dns_cache_config:
        name: dynamic_forward_proxy_cache_config
        dns_lookup_family: V4_ONLY

- "@type": type.googleapis.com/envoy.config.cluster.v3.Cluster
  # ── Upstream: vault-backed auth broker ────────────────────────────────────
  name: auth_broker
  connect_timeout: 5s
  type: STRICT_DNS
  dns_lookup_family: V4_ONLY
  load_assignment:
    cluster_name: auth_broker
    endpoints:
    - lb_endpoints:
      - endpoint:
          address:
            socket_address:
              address: auth_broker
              port_value: 9100

- "@type": type.googleapis.com/envoy.config.cluster.v3.Cluster
  # ── Upstream: api (RFE #106) ────────────────────────────────────────
  # HTTP+JSON CRUD service over botwork-entity. Joins botwork-internal
  # with alias `api`, bound on 9400, never --publish'd to the host.
  # The /api/* route in listener.yaml lands here.
  #
  # HTTP/1.1 (no typed_extension_protocol_options block); api is
  # a plain axum HTTP/1.1 server.
  name: api
  connect_timeout: 5s
  type: STRICT_DNS
  dns_lookup_family: V4_ONLY
  load_assignment:
    cluster_name: api
    endpoints:
    - lb_endpoints:
      - endpoint:
          address:
            socket_address:
              address: api
              port_value: 9400

- "@type": type.googleapis.com/envoy.config.cluster.v3.Cluster
  # ── Upstream: ui (RFE #106 follow-up) ───────────────────────────────
  # Distroless static-bundle server (Leptos CSR). Joins botwork-internal
  # with alias `ui`, bound on 9500, never --publish'd. The //*
  # route in listener.yaml lands here (the more-specific /api/*
  # route catches the JSON paths first).
  name: ui
  connect_timeout: 5s
  type: STRICT_DNS
  dns_lookup_family: V4_ONLY
  load_assignment:
    cluster_name: ui
    endpoints:
    - lb_endpoints:
      - endpoint:
          address:
            socket_address:
              address: ui
              port_value: 9500
