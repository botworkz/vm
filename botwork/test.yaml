type: botforge/test
name: botwork
image: "@artifact://botwork/botwork.qcow2"
ports:
- 8080

assert:
  users:
    bot:
      exists: true
      shell: /bin/bash
      groups:
      - bot
      - docker
  packages:
    ca-certificates:
      installed: true
    curl:
      installed: true
    docker-ce:
      installed: true
    git:
      installed: true
    jq:
      installed: true
    openssh-server:
      installed: true
    python3:
      installed: true
    unattended-upgrades:
      installed: true
  files:
    /etc/apt/apt.conf.d/52botwork-unattended-upgrades:
      exists: true
      filetype: file
      owner: root
      group: root
      mode: "0644"
    /etc/botwork/bootstrap.yaml:
      exists: true
      filetype: file
    /etc/sudoers.d/90-botwork:
      exists: true
      filetype: file
      owner: root
      group: root
      mode: "0440"
    /usr/lib/systemd/system/botwork-config-broker.service:
      exists: true
      filetype: file
      owner: root
      group: root
      mode: "0644"
    /usr/lib/systemd/system/botwork-control-plane.service:
      exists: true
      filetype: file
      owner: root
      group: root
      mode: "0644"
    /usr/lib/systemd/system/botwork-launcher.socket:
      exists: true
      filetype: file
      owner: root
      group: root
      mode: "0644"
    /usr/local/bin/botwork-launcher:
      exists: true
      filetype: file
      owner: root
      group: root
      mode: "0755"
    /usr/local/bin/botctl:
      exists: true
      filetype: file
      owner: root
      group: root
      mode: "0755"
    /usr/local/sbin/botwork-db-init:
      exists: true
      filetype: file
      owner: root
      group: root
      mode: "0755"
    /usr/local/sbin/botwork-image-loader:
      exists: true
      filetype: file
      owner: root
      group: root
      mode: "0755"
    /usr/share/botwork/images/api.tar:
      exists: false
    /usr/share/botwork/images/config-broker.tar:
      exists: false
    /usr/share/botwork/images/control-plane.tar:
      exists: false
    /usr/share/botwork/images/curl.tar:
      exists: false
    /usr/share/botwork/images/db-migrate.tar:
      exists: false
    /usr/share/botwork/images/mcp-echo.tar:
      exists: false
    /usr/share/botwork/images/postgres.tar:
      exists: false
    /usr/share/botwork/images/session-broker.tar:
      exists: false
    /usr/share/botwork/images/ui.tar:
      exists: false
  services:
    botwork-api:
    botwork-auth-broker:
    botwork-config-broker:
    botwork-control-plane:
    botwork-db-init:
    botwork-db-migrate:
    botwork-envoy:
    botwork-image-loader:
    botwork-import:
    botwork-launcher:
    botwork-network:
    botwork-postgres:
    botwork-session-broker:
    botwork-ui:
    docker:
    ssh:
    unattended-upgrades:
  docker:
    images:
      "botwork/api:local": {}
      "botwork/curl:local": {}
      "botwork/auth-broker:local": {}
      "botwork/config-broker:local": {}
      "botwork/control-plane:local": {}
      "botwork/db-migrate:local": {}
      "botwork/mcp-echo:local": {}
      "botwork/postgres:local": {}
      "botwork/session-broker:local": {}
      "botwork/ui:local": {}
    networks:
      botwork-internal: {}
      botwork-plugin: {}
    containers:
      botwork-api:
        exists: true
        running: true
        networks:
        - "botwork-internal"
        - "!botwork-plugin"
        ports:
        - "!9400/tcp"
      botwork-auth-broker:
        exists: true
        running: true
        networks:
        - "botwork-internal"
        - "!botwork-plugin"
      botwork-config-broker:
        exists: true
        running: true
        networks:
        - "botwork-internal"
        - "!botwork-plugin"
        logs:
          contains:
          - "starting on 0.0.0.0:9200"
          timeout: 30
      botwork-control-plane:
        exists: true
        running: true
        networks:
        - "botwork-internal"
        - "!botwork-plugin"
        logs:
          contains:
          - "starting HTTP on 0.0.0.0:9300"
          - "starting xDS gRPC on 0.0.0.0:9301"
          timeout: 30
      botwork-envoy:
        exists: true
        running: true
        networks:
        - "botwork-internal"
        - "botwork-plugin"
        ports:
        - "!9901/tcp"
      botwork-session-broker:
        exists: true
        running: true
        networks:
        - "botwork-internal"
        - "botwork-plugin"
        logs:
          contains:
          - "control-plane endpoint: http://control_plane:9300"
          timeout: 30
      botwork-ui:
        exists: true
        running: true
        networks:
        - "botwork-internal"
        - "!botwork-plugin"
        ports:
        - "!9500/tcp"
steps:
- uses: "@://test/botwork.system.steps.yaml"
- uses: "@://test/botwork.plugin.steps.yaml"
- uses: "@://test/botwork.acceptance.steps.yaml"
  with:
    port: "8080"


diagnostics_units:
- ssh
- docker
- botwork-image-loader
- botwork-network
- botwork-db-init
- botwork-postgres
- botwork-db-migrate
- botwork-import
- botwork-api
- botwork-ui
- botwork-launcher
- botwork-config-broker
- botwork-control-plane
- botwork-session-broker
- botwork-envoy
