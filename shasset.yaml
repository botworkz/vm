  postgres:
    # Docker Hub's *registry* hostname is `registry-1.docker.io`. The
    # bare `docker.io` host is a www redirect (302 → www.docker.com),
    # so `https://docker.io/v2/...` does not resolve to the OCI registry
    # API and shasset's manifest fetch fails before it ever inspects
    # the digest. Mirroring podman / containerd / buildx defaults here.
    uri: oci://registry-1.docker.io/library/postgres
