x-botforge-base: &botforge-base
  image: ${BOTFORGE_IMAGE:?BOTFORGE_IMAGE must be set by the wrapper}
  user: "${HOST_UID:?}:${HOST_GID:?}"
  working_dir: ${REPO_ROOT:?}
  environment:
    HOME: /tmp
    XDG_CACHE_HOME: /tmp/.cache
    HOST_UID: ${HOST_UID}
    HOST_GID: ${HOST_GID}
    HOST_KVM_GID: ${HOST_KVM_GID}
  volumes:
    - ${REPO_ROOT}:${REPO_ROOT}

services:
  # scripts/pack.sh — needs /dev/kvm to run the qemu build inside botforge
  pack:
    <<: *botforge-base
    devices:
    - /dev/kvm:/dev/kvm

  # scripts/test-packed.sh — needs /dev/kvm only
  test:
    <<: *botforge-base
    devices:
    - /dev/kvm:/dev/kvm

  # scripts/build-deps.sh — fetches binaries + image tarballs via shasset oci://
  deps:
    <<: *botforge-base
