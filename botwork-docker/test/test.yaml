type: test

image: "@artifact://botwork-docker/botwork-docker.qcow2"

files:
- src: "@goss"
  dest: /usr/local/bin/goss
  mode: 0755

steps:
- name: assert-services
  run: |
    for svc in docker ssh unattended-upgrades apt-daily.timer apt-daily-upgrade.timer; do
      systemctl is-enabled "${svc}"
    done
  expect:
    exit: 0

assert:
  users:
    bot:
      exists: true
      shell: /bin/bash
      groups:
      - bot
      - docker
    debian:
      exists: true
  packages:
    docker-ce:
      installed: true
  files:
    /etc/apt/apt.conf.d/52botwork-unattended-upgrades:
      exists: true
      filetype: file
      owner: root
      group: root
      mode: "0644"
    /etc/sudoers.d/90-botwork:
      exists: true
      filetype: file
      owner: root
      group: root
      mode: "0440"

diagnostics_units:
- ssh
- docker
