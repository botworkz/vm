type: test

image: "@artifact://botwork-docker/botwork-docker.qcow2"

uploads:
- src: "@goss"
  dest: /usr/local/bin/goss
  mode: 0755
- src: "@://botwork-docker/test/goss.yaml"
  dest: /tmp/goss.yaml

steps:
- on: guest
  name: base-goss
  run: goss -g /tmp/goss.yaml validate

diagnostics_units:
- ssh
- docker
