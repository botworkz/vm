type: botforge/test
name: botwork-docker
image: "@artifact://botwork-docker/botwork-docker.qcow2"

assert:
  users:
    bot:
      shell: /bin/bash
      groups:
      - bot
      - docker
  packages:
    ca-certificates:
    curl:
    docker-ce:
    git:
    jq:
    openssh-server:
    python3:
    unattended-upgrades:
  files:
    /etc/apt/apt.conf.d/52botwork-unattended-upgrades:
    /etc/sudoers.d/90-botwork:
      mode: "0440"
  services:
    apt-daily.timer:
    apt-daily-upgrade.timer:
    docker:
    unattended-upgrades:
