  packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin
  - jq
  - rsync
  users:
  - name: bot
    groups:
    - docker
  runcmd:
  - [systemctl, unmask, unattended-upgrades.service, apt-daily.service, apt-daily-upgrade.service]
  - [systemctl, enable, unattended-upgrades.service, apt-daily.timer, apt-daily-upgrade.timer]
  - [systemctl, enable, --now, docker.service]

compress:
  enabled: true
  compressor_args:
    cluster_size: "1M"
  compressor_opts: -T0 -19
  reclaim: fstrim

steps:
- name: Add bot to docker group
  run: |
    gpasswd -a bot docker
- name: cleanup
  run: |
    apt-get autoremove --purge -y || true

    apt-get clean || true
    # runcmd starts docker so the unit is wired post-install; drop any daemon
    # runtime state before committing the image.
    systemctl stop docker.service containerd.service 2>/dev/null || true
    rm -rf /var/lib/docker/* /var/lib/containerd/* 2>/dev/null || true
    # Belt-and-suspenders: the bootcmd tmpfs mount already keeps this scratch
    # out of the committed image.
    rm -rf /var/lib/apt/lists/*
    rm -f /etc/dpkg/dpkg.cfg.d/02apt-speedup

    cat >/etc/apt/apt.conf.d/99-no-translations <<'EOF'
    Acquire::Languages "none";
    EOF
    chmod 0644 /etc/apt/apt.conf.d/99-no-translations

    rm -f /var/cache/debconf/*-old
    rm -f /var/cache/ldconfig/aux-cache

    truncate -s 0 /etc/machine-id
    rm -f /var/lib/dbus/machine-id
    ln -s /etc/machine-id /var/lib/dbus/machine-id

    if command -v journalctl >/dev/null 2>&1; then
      journalctl --rotate 2>/dev/null || true
      journalctl --vacuum-time=1s 2>/dev/null || true
    fi
    rm -rf /var/log/journal/* 2>/dev/null || true

    find /var/log -type f ! -path '/var/log/journal/*' -exec truncate -s 0 {} \;
    rm -rf /home/debian/.ssh /home/bot/.ssh /root/.ssh || true

    rm -f /etc/ssh/ssh_host_*

    rm -f /var/lib/systemd/random-seed

    if command -v cloud-init >/dev/null 2>&1; then
      cloud-init clean --logs --seed || true
    fi
    rm -f /root/.bash_history /home/debian/.bash_history /home/bot/.bash_history || true

    rm -rf /tmp/* /tmp/.* /var/tmp/* 2>/dev/null || true

    rm -rf /var/lib/dhcp/* /var/lib/NetworkManager/* 2>/dev/null || true

    find /usr/share/locale -mindepth 1 -maxdepth 1 -type d \
      ! -name 'en*' ! -name 'C' ! -name 'POSIX' \
      -exec rm -rf {} +
